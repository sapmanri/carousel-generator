<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAPMANRI · Postcard Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Sans+KR:wght@300;400;500&family=JetBrains+Mono:wght@300;400&family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Black+Han+Sans&family=Bebas+Neue&family=Nanum+Myeongjo:wght@400;700&family=DM+Serif+Display:ital@0;1&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1a1a;--s1:#222222;--s2:#2a2a2a;--s3:#323232;
  --border:#333333;--border2:#444444;
  --text:#ffffff;--muted:rgba(255,255,255,0.6);--dim:rgba(255,255,255,0.3);
  --accent:#b87a6e;--accent2:#8a5a50;--green:#8aaa88;--red:#c47a6a;--orange:#E8762C;
  --serif:"Gowun Batang","Cormorant Garamond",Georgia,serif;
  --sans:"Noto Sans KR","Helvetica Neue",Arial,sans-serif;
  --mono:'JetBrains Mono',monospace;
  --f-mag-title:"Playfair Display",Georgia,serif;
  --f-typo-word:"Black Han Sans","Bebas Neue",Impact,sans-serif;
  --f-story-title:"Nanum Myeongjo","Gowun Batang",serif;
  --f-story-body:"Lato","Noto Sans KR",sans-serif;
  --f-edit-title:"DM Serif Display",Georgia,serif;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--sans);font-weight:300;min-height:100vh}
a{color:inherit}

header{
  height:48px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 20px;
}
.logo{font-family:var(--serif);font-size:14px;letter-spacing:0.08em;color:var(--muted);display:flex;align-items:center;gap:10px}
.logo .build-tag{font-family:var(--mono);font-size:9px;letter-spacing:0.05em;color:var(--dim)}
.logo em{color:var(--orange);font-style:normal}
.header-right{display:flex;align-items:center;gap:8px}
.btn-ghost{
  background:none;border:1px solid var(--border);color:var(--muted);
  font-family:var(--mono);font-size:10px;padding:5px 10px;border-radius:4px;cursor:pointer;
  transition:all .15s;white-space:nowrap;text-decoration:none;display:inline-block;
}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.btn-ghost.ok{color:var(--green);border-color:var(--green)}
.key-field{
  background:var(--s1);border:1px solid var(--border);color:var(--text);
  font-family:var(--mono);font-size:11px;padding:5px 10px;border-radius:4px;
  width:0;overflow:hidden;opacity:0;transition:width .3s,opacity .3s;outline:none;
}
.key-field.open{width:190px;opacity:1}
.key-field:focus{border-color:var(--accent)}

.app{max-width:1100px;margin:0 auto;padding:20px;display:flex;flex-direction:column;gap:20px}

.section{border:1px solid var(--border);border-radius:6px;padding:16px;background:var(--s1)}
.section-title{
  font-family:var(--mono);font-size:10px;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--dim);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.section-title span{white-space:nowrap}
.hint{font-size:11px;color:var(--dim);line-height:1.6;margin-top:6px}

/* ── 업로드 존 ── */
.upload-zone{
  border:1px dashed var(--border);border-radius:8px;padding:32px 24px;text-align:center;
  cursor:pointer;background:var(--bg);transition:all .15s;position:relative;
}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--border2);background:var(--s2)}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-zone p{font-size:12px;color:var(--muted);margin-top:10px}
.upload-zone span{font-size:10px;color:var(--dim);margin-top:4px;display:block}
.upload-zone svg{margin:0 auto;display:block}

/* ── 라이브러리 그리드 ── */
.lib-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;
}
.lib-item{
  position:relative;aspect-ratio:1;border-radius:4px;overflow:hidden;cursor:pointer;
  border:2px solid transparent;background:var(--s2);
}
.lib-item img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.lib-item.selected{border-color:var(--orange)}
.lib-item.selected::after{
  content:'✓';position:absolute;top:4px;right:4px;width:18px;height:18px;border-radius:50%;
  background:var(--orange);color:#1a1a1a;font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
}
.lib-item.used{opacity:0.45}
.lib-used-badge{
  position:absolute;bottom:4px;left:4px;background:rgba(0,0,0,0.6);color:#fff;
  font-size:9px;letter-spacing:0.05em;padding:2px 5px;border-radius:3px;
}

/* ── 포스트카드 카드 ── */
.pc-list{display:flex;flex-direction:column;gap:16px}
.pc-card{
  border:1px solid var(--border);border-radius:6px;background:var(--s2);
  padding:14px;display:flex;gap:16px;flex-direction:column;
}
.pc-preview-wrap{flex-shrink:0;width:372px}
.pc-preview-pair{display:flex;gap:12px}
.pc-preview-side{flex:1;display:flex;flex-direction:column;gap:4px}
.pc-preview-side .pc-canvas{position:relative;width:100%;padding-bottom:150%;border-radius:2px;overflow:hidden}
.pc-preview-side .hint{font-size:9px;text-align:center;color:var(--dim);letter-spacing:0.08em}
.pc-fields{flex:1;min-width:240px;display:flex;flex-direction:column;gap:8px}
.field label{display:block;font-size:10px;letter-spacing:0.1em;color:var(--dim);margin-bottom:4px;text-transform:uppercase}
.field-lang label{display:flex;justify-content:space-between;align-items:center}
.lang-toggle{display:flex;gap:3px}
.lang-toggle button{background:none;border:1px solid var(--border);color:var(--dim);font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:3px;cursor:pointer;line-height:1.4}
.lang-toggle button.active{border-color:var(--orange);color:var(--orange);background:rgba(232,118,44,0.08)}
.field input,.field select,.field textarea{
  width:100%;background:var(--s1);border:1px solid var(--border);color:var(--text);
  font-family:var(--sans);font-weight:300;font-size:13px;padding:8px 10px;border-radius:4px;outline:none;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field-row{display:flex;gap:8px}
.field-row .field{flex:1}
.pc-actions{display:flex;gap:8px;align-items:center;margin-top:4px}
.icon-btn{
  background:none;border:1px solid var(--border);color:var(--dim);
  width:28px;height:28px;border-radius:4px;cursor:pointer;font-size:13px;
  display:flex;align-items:center;justify-content:center;
}
.icon-btn:hover{color:var(--text);border-color:var(--border2)}

.btn-primary{
  background:var(--accent);border:1px solid var(--accent);color:#fff;
  font-family:var(--sans);font-weight:500;font-size:13px;padding:10px 18px;border-radius:4px;cursor:pointer;
}
.btn-primary:hover{background:var(--accent2)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}

.spinner{
  display:inline-block;width:10px;height:10px;border:1.5px solid var(--dim);
  border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;
  margin-right:6px;vertical-align:-1px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── 포스트카드 미리보기 (2:3, 인쇄용 비율) ── */
.pc-canvas{
  width:100%;aspect-ratio:2/3;position:relative;overflow:hidden;border-radius:2px;
  background:#FAF5EE;color:#1A1A1A;font-family:var(--serif);
}
.pc-canvas .pc-photo{position:absolute;inset:11% 8% 32% 8%;overflow:hidden;background:#1d1815}
.pc-canvas .pc-photo img{width:100%;height:100%;object-fit:cover;display:block}
.pc-canvas .pc-top{position:absolute;top:4%;left:8%;right:8%;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;font-family:var(--sans);font-weight:300}
.pc-canvas .pc-label{font-size:6px;letter-spacing:0.15em;text-transform:uppercase;line-height:1.6;flex:1;min-width:0;overflow:hidden}
.pc-canvas .pc-label .l1{opacity:0.5}
.pc-canvas .pc-number{font-family:var(--serif);font-weight:700;font-size:20px;line-height:1;color:#1A1A1A;flex-shrink:0}
.pc-canvas .pc-bottom{position:absolute;left:8%;right:8%;bottom:5%}
.pc-canvas .pc-title{font-family:var(--serif);font-weight:700;font-size:13px;line-height:1.35;margin-bottom:10px;word-break:keep-all}
.pc-canvas .pc-meta{display:flex;justify-content:space-between;align-items:flex-end;font-family:var(--sans);gap:8px}
.pc-canvas .pc-meta-text{font-size:5px;line-height:1.7;color:rgba(0,0,0,0.4);min-width:0}
.pc-canvas .pc-meta-full .pc-meta-text{width:100%}
.pc-canvas .pc-qr{width:13%;aspect-ratio:1;background:#fff;border:1px solid rgba(0,0,0,0.08)}
.pc-canvas .pc-qr canvas{width:100%;height:100%;display:block}

/* ── 뒷면 (우편엽서 레이아웃) ── */
.pc-canvas .pc-back{position:absolute;inset:0;padding:6% 6%;display:flex;flex-direction:column;font-family:var(--sans)}
.pc-canvas .pc-back-header{font-family:var(--serif);font-weight:700;font-size:11px;letter-spacing:0.3em;text-align:center;color:#1A1A1A;margin-bottom:6%}
.pc-canvas .pc-back-body{flex:1;display:flex;gap:4%}
.pc-canvas .pc-back-left{flex:1.1;display:flex;flex-direction:column;justify-content:flex-end;padding-right:4%}
.pc-canvas .pc-back-brand{font-family:var(--serif);font-weight:700;font-size:9px;letter-spacing:0.15em;color:var(--orange);margin-bottom:6%}
.pc-canvas .pc-back-caption{font-family:var(--serif);font-size:11px;line-height:1.6;color:#1A1A1A;margin-bottom:8%;word-break:keep-all}
.pc-canvas .pc-back-sub{font-size:5px;line-height:1.8;color:rgba(0,0,0,0.35)}
.pc-canvas .pc-back-divider{width:1px;background:rgba(0,0,0,0.12)}
.pc-canvas .pc-back-right{flex:1;display:flex;flex-direction:column}
.pc-canvas .pc-back-stamp{width:22%;aspect-ratio:4/5;border:1px solid rgba(0,0,0,0.2);align-self:flex-end;margin-bottom:8%}
.pc-canvas .pc-back-addrlines{display:flex;flex-direction:column;gap:10%;margin-top:auto}
.pc-canvas .pc-back-addr-label{font-size:6px;letter-spacing:0.15em;color:rgba(0,0,0,0.35);margin-bottom:4%}
.pc-canvas .pc-back-line{height:1px;background:rgba(0,0,0,0.15)}

/* ── Mag 01 ── */
.pc-canvas .pc-mag01{position:absolute;inset:0;background:#F8F4EE;padding:4.5% 7%;display:flex;flex-direction:column;gap:0}
.pc-canvas .pc-mag01-header{display:flex;justify-content:space-between;align-items:flex-start;border-top:1px solid #1A1A1A;padding-top:2%;margin-bottom:1.5%}
.pc-canvas .pc-mag01-meta{display:flex;flex-direction:column;gap:2px}
.pc-canvas .pc-mag01-brand{font-family:var(--sans);font-size:5px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(26,26,26,0.45)}
.pc-canvas .pc-mag01-label{font-family:var(--sans);font-size:6px;font-weight:500;letter-spacing:0.08em}
.pc-canvas .pc-mag01-num{font-family:var(--f-mag-title);font-weight:700;font-size:26px;line-height:1;color:#1A1A1A}
.pc-canvas .pc-mag01-title-over{font-family:var(--f-mag-title);font-weight:900;font-size:28px;line-height:1.1;color:#1A1A1A;margin-bottom:2%;word-break:keep-all}
.pc-canvas .pc-mag01-photo{flex:1;overflow:hidden;background:#1d1815}
.pc-canvas .pc-mag01-photo img{width:100%;height:100%;object-fit:cover;display:block}
.pc-canvas .pc-mag01-footer{display:flex;justify-content:space-between;align-items:flex-end;margin-top:2%;border-top:1px solid rgba(26,26,26,0.12);padding-top:1.5%}
.pc-canvas .pc-mag01-desc{font-family:var(--sans);font-size:5.5px;color:rgba(26,26,26,0.5);letter-spacing:0.06em}
.pc-canvas .pc-mag01-sig{font-family:var(--sans);font-size:5px;color:rgba(26,26,26,0.35);text-align:right;line-height:1.7}

/* ── Typo 01 ── */
.pc-canvas .pc-typo01{position:absolute;inset:0;background:#FAFAFA;display:flex}
.pc-canvas .pc-typo01-side{writing-mode:vertical-rl;transform:rotate(180deg);font-family:var(--sans);font-size:5px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(26,26,26,0.28);padding:5% 0 5% 4.5%;white-space:nowrap;align-self:flex-end}
.pc-canvas .pc-typo01-main{flex:1;padding:4% 6% 4% 2%;display:flex;flex-direction:column;justify-content:space-between}
.pc-canvas .pc-typo01-word{font-family:var(--f-typo-word);font-weight:900;font-size:52px;line-height:0.92;color:#1A1A1A;letter-spacing:-0.02em;word-break:break-all}
.pc-canvas .pc-typo01-quote{padding:4% 0}
.pc-canvas .pc-typo01-qq{font-family:Georgia,serif;font-size:32px;color:#1A1A1A;line-height:1}
.pc-canvas .pc-typo01-qtext{font-family:var(--f-story-body);font-size:10px;font-weight:300;line-height:1.7;color:#1A1A1A;margin-top:1%;word-break:keep-all}
.pc-canvas .pc-typo01-attr{font-family:var(--sans);font-size:6px;color:rgba(26,26,26,0.4);margin-top:4%}
.pc-canvas .pc-typo01-photo{flex:1;overflow:hidden;background:#1d1815;max-height:37%}
.pc-canvas .pc-typo01-photo img{width:100%;height:100%;object-fit:cover;display:block}
.pc-canvas .pc-typo01-sig{font-family:var(--sans);font-size:5px;color:rgba(26,26,26,0.3);letter-spacing:0.1em;margin-top:2%}

/* ── Story 01 ── */
.pc-canvas .pc-story01{position:absolute;inset:0;background:#F5F3EF;padding:4.5% 7%;display:flex;flex-direction:column}
.pc-canvas .pc-story01-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8%;margin-bottom:2%;padding-bottom:2%;border-bottom:1px solid rgba(26,26,26,0.12)}
.pc-canvas .pc-story01-titlewrap{flex:1;min-width:0}
.pc-canvas .pc-story01-label{font-family:var(--sans);font-size:5.5px;color:rgba(26,26,26,0.4);letter-spacing:0.12em;margin-bottom:2%}
.pc-canvas .pc-story01-title{font-family:var(--f-story-title);font-weight:700;font-size:22px;line-height:1.2;color:#1A1A1A;word-break:keep-all}
.pc-canvas .pc-story01-datetag{text-align:right;flex-shrink:0}
.pc-canvas .pc-story01-brand{font-family:var(--sans);font-size:5px;font-weight:700;letter-spacing:0.15em;color:var(--orange);margin-bottom:3%}
.pc-canvas .pc-story01-date{font-family:var(--f-story-body);font-weight:700;font-size:16px;line-height:1.1;color:#1A1A1A}
.pc-canvas .pc-story01-dow{font-family:var(--sans);font-size:5.5px;color:rgba(26,26,26,0.4);margin-top:2%}
.pc-canvas .pc-story01-photo{flex:1;overflow:hidden;background:#1d1815}
.pc-canvas .pc-story01-photo img{width:100%;height:100%;object-fit:cover;display:block}
.pc-canvas .pc-story01-footer{display:flex;justify-content:space-between;align-items:center;margin-top:2%}
.pc-canvas .pc-story01-side{font-family:var(--sans);font-size:5px;color:rgba(26,26,26,0.35);letter-spacing:0.08em}
.pc-canvas .pc-story01-num{font-family:var(--serif);font-weight:700;font-size:8px;color:#1A1A1A}

/* ── Edit 01 ── */
.pc-canvas .pc-edit01{position:absolute;inset:0;background:#FAFAFA;padding:4% 7%;display:flex;flex-direction:column}
.pc-canvas .pc-edit01-title{font-family:var(--f-edit-title);font-weight:700;font-size:32px;line-height:1;color:#1A1A1A;word-break:keep-all}
.pc-canvas .pc-edit01-sub{font-family:var(--sans);font-size:6px;color:rgba(26,26,26,0.4);margin-top:1.5%;letter-spacing:0.08em;border-bottom:1px solid rgba(26,26,26,0.1);padding-bottom:2%;margin-bottom:2%}
.pc-canvas .pc-edit01-grid{display:flex;gap:2%;height:46%}
.pc-canvas .pc-edit01-photoa{flex:1.4;overflow:hidden;background:#1d1815}
.pc-canvas .pc-edit01-photoa img{width:100%;height:100%;object-fit:cover;display:block}
.pc-canvas .pc-edit01-photob{flex:1;overflow:hidden;background:#1d1815}
.pc-canvas .pc-edit01-photob img{width:100%;height:100%;object-fit:cover;display:block;filter:brightness(.75) contrast(1.1)}
.pc-canvas .pc-edit01-body{flex:1;display:flex;flex-direction:column;justify-content:space-between;margin-top:3%}
.pc-canvas .pc-edit01-text{font-family:var(--sans);font-size:8.5px;font-weight:300;line-height:1.75;color:rgba(26,26,26,0.55);word-break:keep-all}
.pc-canvas .pc-edit01-sig{display:flex;justify-content:space-between;align-items:flex-end}
.pc-canvas .pc-edit01-brand{font-family:var(--serif);font-weight:700;font-size:9px;color:#1A1A1A}
.pc-canvas .pc-edit01-num{font-family:var(--sans);font-size:5.5px;color:rgba(26,26,26,0.35)}

/* ── Back Modern ── */
.pc-canvas .pc-back-modern{position:absolute;inset:0;background:#FAFAFA;padding:5% 6%;display:flex;flex-direction:column}
.pc-canvas .pc-bm-header{display:flex;justify-content:space-between;align-items:flex-start}
.pc-canvas .pc-bm-brand{font-family:var(--sans);font-size:5px;letter-spacing:0.15em;color:rgba(26,26,26,0.35)}
.pc-canvas .pc-bm-post{font-family:var(--serif);font-weight:700;font-size:15px;line-height:1.1;color:#1A1A1A;letter-spacing:0.15em;text-align:right}
.pc-canvas .pc-bm-divider{height:1px;background:rgba(26,26,26,0.1);margin:5% 0}
.pc-canvas .pc-bm-body{flex:1;display:flex}
.pc-canvas .pc-bm-left{flex:1}
.pc-canvas .pc-bm-right{flex:1;display:flex;flex-direction:column;justify-content:center;gap:10%}
.pc-canvas .pc-bm-to{font-family:var(--sans);font-size:6px;letter-spacing:0.2em;color:rgba(26,26,26,0.45);margin-bottom:3%}
.pc-canvas .pc-bm-lines{display:flex;flex-direction:column;gap:14%}
.pc-canvas .pc-bm-line{height:1px;background:rgba(26,26,26,0.18)}
.pc-canvas .pc-bm-line.accent{background:var(--orange);height:2px}
.pc-canvas .pc-bm-footer{font-family:var(--sans);font-size:4.5px;color:rgba(26,26,26,0.28);margin-top:4%}

/* ── Back Centre ── */
.pc-canvas .pc-back-centre{position:absolute;inset:0;background:#F8F6F3;padding:5% 6%;display:flex;flex-direction:column}
.pc-canvas .pc-bc-brand{font-family:var(--sans);font-size:5.5px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(26,26,26,0.38);text-align:center;margin-bottom:4%}
.pc-canvas .pc-bc-body{flex:1;display:flex;gap:5%}
.pc-canvas .pc-bc-photo{flex:1;overflow:hidden;background:#1d1815}
.pc-canvas .pc-bc-photo img{width:100%;height:100%;object-fit:cover;display:block}
.pc-canvas .pc-bc-right{flex:1;display:flex;flex-direction:column;padding-top:4%}
.pc-canvas .pc-bc-label{font-family:var(--sans);font-size:5px;letter-spacing:0.1em;color:rgba(26,26,26,0.35);margin-bottom:8%}
.pc-canvas .pc-bc-to{font-family:var(--sans);font-size:6px;letter-spacing:0.18em;color:rgba(26,26,26,0.45);margin-bottom:6%}
.pc-canvas .pc-bc-lines{display:flex;flex-direction:column;gap:16%;flex:1;justify-content:center}
.pc-canvas .pc-bc-line{height:1px;background:rgba(26,26,26,0.15)}
.pc-canvas .pc-bc-footer{font-family:var(--sans);font-size:4.5px;color:rgba(26,26,26,0.3);margin-top:3%}

/* ── Back Seal ── */
.pc-canvas .pc-back-seal{position:absolute;inset:0;background:#FAF8F5;padding:5% 6%;display:flex;flex-direction:column}
.pc-canvas .pc-bs-header{display:flex;justify-content:space-between;align-items:flex-start}
.pc-canvas .pc-bs-from{display:flex;flex-direction:column;gap:4%}
.pc-canvas .pc-bs-brand{font-family:var(--sans);font-size:6px;font-weight:700;letter-spacing:0.15em;color:var(--orange)}
.pc-canvas .pc-bs-addr{font-family:var(--sans);font-size:4.5px;color:rgba(26,26,26,0.35);margin-top:4%}
.pc-canvas .pc-bs-web{font-family:var(--sans);font-size:4.5px;color:rgba(26,26,26,0.28);margin-top:2%}

<script src="../magazine/image-library.js?v=20260614g"></script>
<script src="./postcards-templates.js?v=20260614g"></script>
<script src="./postcards-core.js?v=20260614g"></script>
<script>
// ── 업로드존: 파일 선택/드래그앤드롭 → ImageLibrary에 등록 → 라이브러리 그리드 새로고침 ──
(function(){
  const zone = document.getElementById('uploadZone');
  const input = document.getElementById('fileInput');
  const status = document.getElementById('uploadStatus');

  function readAsDataUrl(file){
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(r.result);
      r.onerror = reject;
      r.readAsDataURL(file);
    });
  }

  async function handleFiles(files){
    if (!files || !files.length) return;
    if (!window.ImageLibrary) { status.textContent = '이미지 라이브러리 모듈을 불러오지 못했습니다.'; return; }
    let done = 0, skipped = 0, failed = 0;
    for (const file of files) {
      try {
        const dataUrl = await readAsDataUrl(file);
        const result = await window.ImageLibrary.uploadIfNeeded(dataUrl, file.type);
        if (result.existed) skipped++; else done++;
      } catch (e) {
        failed++;
        console.error(e);
      }
    }
    let msg = `업로드 완료: 신규 ${done}장`;
    if (skipped) msg += `, 이미 존재함 ${skipped}장`;
    if (failed) msg += `, 실패 ${failed}장 (GitHub Token 확인 필요)`;
    status.textContent = msg;
    if (done > 0 && typeof loadLibrary === 'function') loadLibrary();
  }

  zone.addEventListener('click', e => { if (e.target.tagName !== 'INPUT') input.click(); });
  input.addEventListener('change', e => handleFiles(e.target.files));
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('dragover');
    handleFiles(e.dataTransfer.files);
  });
})();
</script>
