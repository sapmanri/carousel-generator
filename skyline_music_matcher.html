<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Skyline Music Matcher — 감성찾아삽만리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--serif:"Cormorant Garamond","Noto Serif KR",Georgia,serif;--sans:"Noto Sans KR","Helvetica Neue",Arial,sans-serif}
body{background:#0e0e0e;color:#e8e8e8;font-family:var(--sans);min-height:100vh}
header{padding:18px 24px;border-bottom:0.5px solid #222;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.brand h1{font-size:14px;font-weight:600;letter-spacing:0.04em;font-family:var(--serif)}
.brand p{font-size:9px;letter-spacing:0.14em;color:#444;margin-top:2px;text-transform:uppercase}
.key-wrap{display:flex;align-items:center;gap:8px}
.key-wrap input{background:#1a1a1a;border:0.5px solid #333;border-radius:4px;padding:7px 12px;font-size:12px;color:#aaa;width:200px;letter-spacing:0.05em;outline:none;transition:border-color 0.15s}
.key-wrap input:focus{border-color:#555}
.key-label{font-size:9px;letter-spacing:0.12em;color:#444;text-transform:uppercase}
main{max-width:1020px;margin:0 auto;padding:28px 24px 80px}

/* Upload */
.upload-zone{border:1px dashed #2a2a2a;border-radius:8px;padding:48px 24px;text-align:center;cursor:pointer;background:#111;transition:all 0.2s;position:relative}
.upload-zone:hover,.upload-zone.dragover{border-color:#444;background:#151515}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-zone p{font-size:14px;color:#555;margin-top:14px}
.upload-zone span{font-size:11px;color:#333;margin-top:6px;display:block}

/* Workspace: desktop = side panel | card preview */
.workspace{display:grid;grid-template-columns:300px 1fr;gap:24px;align-items:start}
.panel{display:flex;flex-direction:column;gap:18px}
.panel-section label{font-size:9px;letter-spacing:0.13em;color:#444;text-transform:uppercase;display:block;margin-bottom:9px}
.btn-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.btn-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.opt-btn{background:#141414;border:0.5px solid #2a2a2a;border-radius:6px;padding:11px 6px;cursor:pointer;color:#666;font-size:11px;text-align:center;transition:all 0.15s;font-family:var(--sans);-webkit-tap-highlight-color:transparent}
.opt-btn:hover{border-color:#3a3a3a;color:#999}
.opt-btn:active{transform:scale(0.97)}
.opt-btn.active-wave{border-color:#7c6fd4;background:#1a1830;color:#a99ef0}
.opt-btn.active-design{border-color:#b87a6e;background:#1f1510;color:#d4987c}
.opt-btn.active-fmt{border-color:#7c6fd4;background:#1a1830;color:#a99ef0}
.opt-btn .name{font-weight:500;font-size:11px;display:block}
.opt-btn .desc{font-size:9px;margin-top:2px;display:block;opacity:0.5}
.btn-analyze{width:100%;background:#e8e8e8;color:#0e0e0e;border:none;border-radius:6px;padding:14px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;font-family:var(--sans);-webkit-tap-highlight-color:transparent}
.btn-analyze:hover:not(:disabled){background:#fff}
.btn-analyze:active:not(:disabled){transform:scale(0.98)}
.btn-analyze:disabled{opacity:0.35;cursor:not-allowed}
.btn-secondary{width:100%;background:transparent;border:0.5px solid #2a2a2a;border-radius:6px;padding:11px;font-size:12px;cursor:pointer;transition:all 0.15s;font-family:var(--sans);-webkit-tap-highlight-color:transparent}
.btn-secondary:active{transform:scale(0.98)}
.btn-dl{color:#a99ef0;border-color:#2d2850;background:#1a1830;display:none}
.btn-dl:hover{background:#211e40}
.btn-reset{color:#444}
.btn-reset:hover{border-color:#3a3a3a;color:#666}

/* Card preview */
.card-preview{background:#111;border:0.5px solid #1e1e1e;border-radius:10px;overflow:hidden;display:flex;align-items:center;justify-content:center;min-height:400px}
.card-preview canvas{max-width:100%;max-height:580px;display:block;border-radius:4px}
.placeholder{text-align:center;padding:48px 24px;color:#2a2a2a}
.placeholder p{font-size:12px;margin-top:12px;line-height:1.7}
.spinner{width:24px;height:24px;border:2px solid #2a2a2a;border-top-color:#777;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── MOBILE ── */
@media(max-width:680px){
  header{padding:14px 16px}
  .key-wrap input{width:140px;font-size:11px}
  main{padding:20px 16px 60px}

  /* Single column, card column first */
  .workspace{grid-template-columns:1fr;grid-template-rows:auto auto}

  /* Panel becomes flex column so we can use order */
  .panel{display:flex;flex-direction:column;gap:14px;order:2}

  /* Card column comes first */
  .workspace > div:last-child{order:1}

  /* Card preview sizing */
  .card-preview{min-height:260px;border-radius:8px}
  .card-preview canvas{max-height:72vw}

  /* after-card items: pushed below card via panel order trick */
  /* We use a different approach — wrap panel into two sections */

  .opt-btn{padding:10px 4px;font-size:10px}
  .opt-btn .name{font-size:10px}
  .btn-analyze{padding:15px;font-size:14px}
  .btn-secondary{padding:12px}

  .design-scroll{display:grid;grid-template-columns:repeat(4,minmax(80px,1fr));gap:5px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch}
  .design-scroll::-webkit-scrollbar{display:none}
}
</style>
</head>
<body>
<header>
  <div class="brand"><h1>감성찾아삽만리</h1><p>Skyline Music Matcher</p></div>
  <div class="key-wrap">
    <input type="password" id="apiKey" placeholder="Anthropic KEY" autocomplete="off"/>
    <input type="password" id="googleKey" placeholder="Google KEY" autocomplete="off" style="width:160px"/>
  </div>
</header>
<main>
  <div id="uploadSection">
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept="image/*"/>
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.5" style="margin:0 auto">
        <path d="M12 16V4m0 0L8 8m4-4l4 4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M3 17v2a2 2 0 002 2h14a2 2 0 002-2v-2" stroke-linecap="round"/>
      </svg>
      <p>이미지를 끌어다 놓거나 클릭해서 업로드</p>
      <span>JPG · PNG · 스카이라인, 능선, 건물, 지평선</span>
    </div>
  </div>

  <div class="workspace" id="workspaceSection" style="display:none">
    <div class="panel">
      <div class="panel-section">
        <label>파형 스타일</label>
        <div class="btn-grid-3">
          <button class="opt-btn active-wave" data-wave="mirror" onclick="pickWave(this)">
            <span class="icon">⛰️</span><span class="name">미러</span><span class="desc">실루엣 반영</span>
          </button>
          <button class="opt-btn" data-wave="multiline" onclick="pickWave(this)">
            <span class="icon">≋≋≋</span><span class="name">멀티선</span><span class="desc">섬세한 겹선</span>
          </button>
          <button class="opt-btn" data-wave="dots" onclick="pickWave(this)">
            <span class="icon">⠿⠿⠿</span><span class="name">도트</span><span class="desc">그라디언트 바</span>
          </button>
        </div>
      </div>
      <div class="panel-section">
        <label>카드 디자인</label>
        <div class="design-scroll">
          <button class="opt-btn active-design" data-design="sapmanri" onclick="pickDesign(this)"><span class="name">감성찾아삽만리</span><span class="desc">다크 · 감성</span></button>
          <button class="opt-btn" data-design="magazine" onclick="pickDesign(this)"><span class="name">Magazine B</span><span class="desc">에디토리얼</span></button>
          <button class="opt-btn" data-design="theedit" onclick="pickDesign(this)"><span class="name">디에디트</span><span class="desc">큐레이션</span></button>
          <button class="opt-btn" data-design="stayfolio" onclick="pickDesign(this)"><span class="name">스테이폴리오</span><span class="desc">파인스테이</span></button>
          <button class="opt-btn" data-design="nike" onclick="pickDesign(this)"><span class="name">Nike</span><span class="desc">강렬 · 대문자</span></button>
          <button class="opt-btn" data-design="ohouse" onclick="pickDesign(this)"><span class="name">오늘의집</span><span class="desc">라이프스타일</span></button>
          <button class="opt-btn" data-design="apple" onclick="pickDesign(this)"><span class="name">Apple</span><span class="desc">미니멀 · 여백</span></button>
          <button class="opt-btn" data-design="girok" onclick="pickDesign(this)"><span class="name">기록</span><span class="desc">라이프로그</span></button>
        </div>
      </div>
      <div class="panel-section">
        <label>카드 포맷</label>
        <div class="btn-grid-2">
          <button class="opt-btn active-fmt" data-fmt="square" onclick="pickFmt(this)"><span class="name">1 : 1</span><span class="desc">인스타그램</span></button>
          <button class="opt-btn" data-fmt="vertical" onclick="pickFmt(this)"><span class="name">9 : 16</span><span class="desc">쇼츠 · 릴스</span></button>
        </div>
      </div>
      <button class="btn-analyze" id="analyzeBtn" onclick="analyze()">분석하기</button>

      <div class="panel-section after-card" style="border-top:0.5px solid #1e1e1e;padding-top:18px;">
        <label>파형 조절</label>
        <div style="display:flex;flex-direction:column;gap:12px;margin-top:2px;">
          <div>
            <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
              <span style="font-size:10px;color:#555;">밀도</span>
              <span style="font-size:10px;color:#666;" id="densityVal">80</span>
            </div>
            <input type="range" id="densitySlider" min="10" max="80" value="80"
              style="width:100%;accent-color:#7c6fd4;height:3px;cursor:pointer;"
              oninput="document.getElementById('densityVal').textContent=this.value; if(cachedResult)renderCard(cachedResult);" />
            <div style="display:flex;justify-content:space-between;margin-top:4px;font-size:9px;color:#333;"><span>잔잔</span><span>촘촘</span></div>
          </div>
          <div>
            <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
              <span style="font-size:10px;color:#555;">진폭</span>
              <span style="font-size:10px;color:#666;" id="ampVal">100%</span>
            </div>
            <input type="range" id="ampSlider" min="20" max="200" value="100"
              style="width:100%;accent-color:#7c6fd4;height:3px;cursor:pointer;"
              oninput="document.getElementById('ampVal').textContent=this.value+'%'; if(cachedResult)renderCard(cachedResult);" />
            <div style="display:flex;justify-content:space-between;margin-top:4px;font-size:9px;color:#333;"><span>낮게</span><span>높게</span></div>
          </div>
          <div>
            <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
              <span style="font-size:10px;color:#555;">글씨 크기</span>
              <span style="font-size:10px;color:#666;" id="textScaleVal">1.0×</span>
            </div>
            <input type="range" id="textScaleSlider" min="50" max="150" value="100"
              style="width:100%;accent-color:#7c6fd4;height:3px;cursor:pointer;"
              oninput="textScale=this.value/100; document.getElementById('textScaleVal').textContent=(this.value/100).toFixed(1)+'×'; if(cachedResult)renderCard(cachedResult);" />
            <div style="display:flex;justify-content:space-between;margin-top:4px;font-size:9px;color:#333;"><span>작게</span><span>크게</span></div>
          </div>
        </div>
      </div>

      <div class="panel-section after-card" style="border-top:0.5px solid #1e1e1e;padding-top:18px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
          <label style="margin-bottom:0;">캡션 직접 입력 <span style="font-size:9px;color:#333;font-weight:normal;text-transform:none;letter-spacing:0">— 비우면 AI 자동</span></label>
          <div style="display:flex;gap:4px;">
            <button class="lang-btn active-lang" data-lang="ko" onclick="pickLang(this)" style="background:#1a1830;border:0.5px solid #7c6fd4;border-radius:4px;padding:4px 10px;font-size:10px;color:#a99ef0;cursor:pointer;font-family:var(--sans);">한국어</button>
            <button class="lang-btn" data-lang="en" onclick="pickLang(this)" style="background:#141414;border:0.5px solid #2a2a2a;border-radius:4px;padding:4px 10px;font-size:10px;color:#666;cursor:pointer;font-family:var(--sans);">English</button>
          </div>
        </div>
        <textarea id="manualCaption" placeholder="줄바꿈으로 구분, 최대 3줄&#10;예)&#10;바람이 멈춘 오후,&#10;Here Comes the Sun 이 흐른다&#10;— 그냥, 아무것도 안 해도 괜찮은 날" rows="4"
          style="width:100%;background:#0a0a0a;border:0.5px solid #2a2a2a;border-radius:5px;padding:8px 11px;font-size:12px;color:#ccc;outline:none;font-family:var(--sans);resize:none;line-height:1.8;transition:border-color 0.15s;"
          onfocus="this.style.borderColor='#444'" onblur="this.style.borderColor='#2a2a2a'"
          oninput="if(cachedResult)renderCard(cachedResult)"></textarea>
      </div>

      <div class="after-card" style="border-top:0.5px solid #1e1e1e;padding-top:18px;">
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;">
          <input type="checkbox" id="videoRecToggle" checked
            style="width:14px;height:14px;accent-color:#7c6fd4;cursor:pointer;"
            onchange="if(cachedResult&&this.checked)findRelatedVideo();" />
          <span style="font-size:10px;letter-spacing:0.12em;color:#555;text-transform:uppercase;">채널 영상 추천</span>
        </label>
      </div>

      <button class="btn-secondary btn-dl after-card" id="downloadBtn" onclick="downloadCard()">↓ 카드 이미지 저장</button>
      <button class="btn-secondary btn-reset after-card" onclick="resetAll()">다른 사진 선택</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:16px;">
      <div class="card-preview" id="cardPreview">
        <div class="placeholder"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><p>분석하기를 누르면<br/>카드가 여기에 생성됩니다</p></div>
      </div>
      <div id="cropSliderWrap" style="display:none;background:#111;border:0.5px solid #1e1e1e;border-radius:8px;padding:14px 18px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
          <span style="font-size:10px;letter-spacing:0.12em;color:#444;text-transform:uppercase;">프레임 위치</span>
          <div style="display:flex;gap:6px;">
            <button onclick="setCrop(0)" style="background:#141414;border:0.5px solid #2a2a2a;border-radius:4px;padding:4px 10px;font-size:10px;color:#666;cursor:pointer;font-family:var(--sans);">◀ 좌</button>
            <button onclick="setCrop(0.5)" style="background:#141414;border:0.5px solid #2a2a2a;border-radius:4px;padding:4px 10px;font-size:10px;color:#666;cursor:pointer;font-family:var(--sans);">● 중앙</button>
            <button onclick="setCrop(1)" style="background:#141414;border:0.5px solid #2a2a2a;border-radius:4px;padding:4px 10px;font-size:10px;color:#666;cursor:pointer;font-family:var(--sans);">우 ▶</button>
          </div>
        </div>
        <input type="range" id="cropSlider" min="0" max="100" value="50"
          style="width:100%;accent-color:#7c6fd4;height:3px;cursor:pointer;"
          oninput="cropOffsetX=this.value/100; if(cachedResult)renderCard(cachedResult);" />
        <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:9px;color:#333;">
          <span>왼쪽</span><span>오른쪽</span>
        </div>
      </div>

      <!-- Panel position slider — always visible after analysis -->
      <div id="panelSliderWrap" style="display:none;background:#111;border:0.5px solid #1e1e1e;border-radius:8px;padding:14px 18px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
          <span style="font-size:10px;letter-spacing:0.12em;color:#444;text-transform:uppercase;">텍스트 패널 위치</span>
          <span style="font-size:10px;color:#666;" id="panelPosVal">50%</span>
        </div>
        <input type="range" id="panelSlider" min="20" max="80" value="50"
          style="width:100%;accent-color:#b87a6e;height:3px;cursor:pointer;"
          oninput="panelPos=this.value/100; document.getElementById('panelPosVal').textContent=this.value+'%'; if(cachedResult)renderCard(cachedResult);" />
        <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:9px;color:#333;">
          <span>위로</span><span>아래로</span>
        </div>
      </div>
      <div id="playerSection" style="display:none;">
        <div style="background:#111;border:0.5px solid #1e1e1e;border-radius:10px;overflow:hidden;">
          <div style="padding:14px 18px;border-bottom:0.5px solid #1e1e1e;display:flex;align-items:center;justify-content:space-between;gap:12px;">
            <div>
              <div id="playerSongTitle" style="font-size:13px;font-weight:500;color:#e8e8e8;"></div>
              <div id="playerArtist" style="font-size:11px;color:#555;margin-top:2px;"></div>
            </div>
            <button onclick="loadPlayer()" style="background:#1a1830;border:0.5px solid #2d2850;border-radius:6px;padding:8px 14px;font-size:11px;color:#a99ef0;cursor:pointer;white-space:nowrap;font-family:var(--sans);">▶ 재생</button>
          </div>
          <div id="ytPlayerWrap" style="display:none;position:relative;padding-bottom:56.25%;height:0;overflow:hidden;">
            <iframe id="ytFrame" style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;" allowfullscreen allow="autoplay"></iframe>
          </div>
        </div>
      </div>

      <!-- Instagram caption -->
      <div id="instaCapSection" style="display:none;">
        <div style="background:#111;border:0.5px solid #1e1e1e;border-radius:10px;overflow:hidden;">
          <div style="padding:12px 18px;border-bottom:0.5px solid #1e1e1e;display:flex;align-items:center;justify-content:space-between;">
            <span style="font-size:10px;letter-spacing:0.12em;color:#444;text-transform:uppercase;">Instagram Caption</span>
            <button onclick="generateInstaCaption()" id="instaCapBtn" style="background:#141414;border:0.5px solid #2a2a2a;border-radius:5px;padding:6px 12px;font-size:11px;color:#888;cursor:pointer;font-family:var(--sans);">✦ 캡션 생성</button>
          </div>
          <div id="instaCapText" style="display:none;padding:16px 18px;font-size:13px;color:#aaa;line-height:1.9;white-space:pre-wrap;font-family:var(--sans);"></div>
          <div id="instaCapHint" style="display:none;padding:0 18px 14px;font-size:10px;color:#333;letter-spacing:0.06em;">텍스트 선택 후 복사하세요</div>
        </div>
      </div>
      <!-- Channel video recommendation -->
      <div id="videoRecSection" style="display:none;">
        <div style="background:#111;border:0.5px solid #1e1e1e;border-radius:10px;overflow:hidden;">
          <div style="padding:12px 18px;border-bottom:0.5px solid #1e1e1e;">
            <span style="font-size:10px;letter-spacing:0.12em;color:#444;text-transform:uppercase;">감성찾아삽만리 추천 영상</span>
          </div>
          <div id="videoRecList" style="padding:14px 18px;display:flex;flex-direction:column;gap:10px;"></div>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
let imgSrc=null,b64=null,mtype='image/jpeg';
let waveStyle='mirror',cardDesign='sapmanri',cardFmt='square';
let cachedResult=null;

// Mobile layout reorder
function applyMobileLayout(){
  if(window.innerWidth > 680) return;
  const workspace = document.getElementById('workspaceSection');
  const panel = workspace.querySelector('.panel');
  const cardCol = workspace.querySelector('.panel + div');
  if(!cardCol) return;

  // Move card column before panel
  workspace.insertBefore(cardCol, panel);

  // Move after-card elements into card column
  const afterCards = panel.querySelectorAll('.after-card');
  afterCards.forEach(el => cardCol.appendChild(el));
}
window.addEventListener('load', applyMobileLayout);
const keyInput=document.getElementById('apiKey');
const savedKey=localStorage.getItem('smm_apikey');
if(savedKey)keyInput.value=savedKey;
keyInput.addEventListener('input',()=>localStorage.setItem('smm_apikey',keyInput.value));

const gKeyInput=document.getElementById('googleKey');
const savedGKey=localStorage.getItem('smm_gkey');
if(savedGKey)gKeyInput.value=savedGKey;
gKeyInput.addEventListener('input',()=>localStorage.setItem('smm_gkey',gKeyInput.value));

// File handling

${usedSongs.length > 0 ? `IMPORTANT: Do NOT suggest any of these songs that were already used for this image: ${usedSongs.join(', ')}. Pick a completely different song.` : ''}

Respond ONLY as valid JSON — no markdown, no extra text:

// ── RENDER CARD ───────────────────────────────────────────
function renderCard(d){
  const isV=cardFmt==='vertical', CW=1080, CH=isV?1920:1080;

  // Manual caption override — use if filled, else AI result
  const manualCapLines=document.getElementById('manualCaption').value.trim().split('\n').filter(l=>l.trim());

  // Waveform controls
  const density = parseInt(document.getElementById('densitySlider').value)||80;
  const ampRatio = (parseInt(document.getElementById('ampSlider').value)||100) / 100;

  // Downsample/resample line_points to desired density
  const rawPts = d.line_points || [];
  const resampledPts = [];
  for(let i=0; i<density; i++){
    const t = i/(density-1);
    const idx = t*(rawPts.length-1);
    const i0=Math.floor(idx), i1=Math.min(i0+1,rawPts.length-1);
    resampledPts.push(rawPts[i0]*(1-(idx-i0)) + rawPts[i1]*(idx-i0));
  }

  const rd={
    ...d,
    line_points: resampledPts,
    _ampRatio: ampRatio,
    caption_line1: manualCapLines[0] || d.caption_line1,
    caption_line2: manualCapLines[1] || d.caption_line2,
    caption_line3: manualCapLines[2] || d.caption_line3,
  };
  const canvas=document.createElement('canvas');
  canvas.width=CW; canvas.height=CH;
  const ctx=canvas.getContext('2d');
  const img=new Image();
  img.onload=()=>{
    const sc=Math.max(CW/img.naturalWidth,CH/img.naturalHeight);
    const sw=img.naturalWidth*sc, sh=img.naturalHeight*sc;
    // Apply cropOffsetX for horizontal positioning
    const maxOffsetX = Math.max(0, sw - CW);
    const ox = isV ? -(maxOffsetX * cropOffsetX) : (CW-sw)/2;
    const oy = (CH-sh)/2;
    ctx.drawImage(img, ox, oy, sw, sh);
    ({sapmanri:renderSapmanri,magazine:renderMagazine,theedit:renderTheEdit,stayfolio:renderStayfolio,nike:renderNike,ohouse:renderOhouse,apple:renderApple,girok:renderGirok})[cardDesign](ctx,rd,CW,CH,isV);
    canvas.style.cssText='max-width:100%;max-height:600px;display:block;border-radius:4px';
    const prev=document.getElementById('cardPreview');
    prev.innerHTML=''; prev.appendChild(canvas);
    window._cardCanvas=canvas;
    // Show crop slider if vertical
    document.getElementById('cropSliderWrap').style.display = isV ? 'block' : 'none';
  };
  img.src=imgSrc;
}

// ── WAVEFORM ENGINE ───────────────────────────────────────
function drawWave(ctx, pts, CW, baseY, maxH, color, glowColor, ampRatio){
  const aH = maxH * (ampRatio||1);
  const n = pts.length;

  if(waveStyle === 'mirror'){
    // ── Dotted pixel skyline — buildings made of scattered dots ──
    const dotSize = Math.max(CW / 160, 5);
    const dotGap = dotSize * 1.55;
    const cols = Math.floor(CW / dotGap);
    const colW = CW / cols;

    // Map pts to columns
    const getH = (col) => {
      const t = col / (cols - 1);
      const idx = t * (n - 1);
      const i0 = Math.floor(idx), i1 = Math.min(i0 + 1, n - 1);
      const frac = idx - i0;
      return (pts[i0] * (1 - frac) + pts[i1] * frac) / 100 * aH;
    };

    for(let col = 0; col < cols; col++){
      const cx = col * colW + colW * 0.5;
      const h = getH(col);
      const rows = Math.floor(h / dotGap);

      for(let row = 0; row < rows; row++){
        const progress = row / Math.max(rows - 1, 1); // 0=bottom, 1=top
        const cy = baseY - row * dotGap - dotGap * 0.5;

        // Density: both bottom AND top rows sparse, dense in middle
        const topFade = 1 - progress * 0.75;
        const bottomFade = Math.min(1, row / 3); // bottom 3 rows fade in
        const density = topFade * bottomFade;
        if(Math.random() > density) continue;

        // Size: top dots smaller
        const ds = dotSize * (0.5 + (1 - progress) * 0.5);

        // Alpha: bottom bright, top fades out
        const alpha = (0.85 - progress * 0.6) * (0.6 + Math.random() * 0.4);

        // Color: interpolate between glowColor (top) and color (bottom)
        ctx.globalAlpha = alpha;
        ctx.fillStyle = progress > 0.6 ? glowColor : color;

        ctx.beginPath();
        ctx.rect(cx - ds/2, cy - ds/2, ds, ds);
        ctx.fill();

        // Mirror reflection dot — below baseY, more visible
        if(row < rows * 0.7){
          const mirrorProgress = row / (rows * 0.7);
          const mirrorAlpha = alpha * 0.5 * (1 - mirrorProgress);
          ctx.globalAlpha = mirrorAlpha;
          ctx.fillStyle = progress > 0.4 ? glowColor : color;
          const ds2 = ds * (0.7 - mirrorProgress * 0.3);
          const mcy = baseY + row * dotGap + dotGap * 0.5;
          ctx.beginPath();
          ctx.rect(cx - ds2/2, mcy - ds2/2, ds2, ds2);
          ctx.fill();
        }
      }
    }
    ctx.globalAlpha = 1;

    // Subtle center line
    ctx.beginPath(); ctx.moveTo(0,baseY); ctx.lineTo(CW,baseY);
    ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.lineWidth=1; ctx.stroke();

  } else if(waveStyle === 'multiline'){
    // ── Image 3 style: multiple thin overlapping lines ───
    const layers = 8;
    ctx.lineJoin='round'; ctx.lineCap='round';

    for(let l=0; l<layers; l++){
      const t = l/(layers-1); // 0=outermost, 1=innermost
      const scale = 0.3 + t*0.7; // inner layers are taller
      const alpha = 0.08 + t*0.55;
      const jitter = (layers-l)*CW*0.0018;

      // top line
      ctx.beginPath();
      pts.forEach((p,i)=>{
        const x=(i/(n-1))*CW;
        const j=(Math.random()-0.5)*jitter;
        const y=baseY-(p/100)*aH*scale+j;
        i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      });
      ctx.strokeStyle=color.replace('1)',`${alpha})`).replace(/rgba\((.+),[\d.]+\)/,`rgba($1,${alpha})`);
      ctx.lineWidth=Math.max(CW/(600+l*80), 0.6);
      ctx.stroke();

      // mirror bottom line
      ctx.beginPath();
      pts.forEach((p,i)=>{
        const x=(i/(n-1))*CW;
        const j=(Math.random()-0.5)*jitter;
        const y=baseY+(p/100)*aH*scale*0.6+j;
        i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      });
      ctx.strokeStyle=glowColor.replace(/[\d.]+\)$/,`${alpha*0.6})`);
      ctx.lineWidth=Math.max(CW/(700+l*80), 0.5);
      ctx.stroke();
    }

    // Bright center line
    ctx.beginPath();
    pts.forEach((p,i)=>{
      const x=(i/(n-1))*CW, y=baseY-(p/100)*aH;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });
    ctx.strokeStyle='rgba(255,255,255,0.7)'; ctx.lineWidth=CW/700; ctx.stroke();

    ctx.beginPath(); ctx.moveTo(0,baseY); ctx.lineTo(CW,baseY);
    ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.lineWidth=1; ctx.stroke();

  } else if(waveStyle === 'dots'){
    // ── Image 2 style: dotted gradient bars ──────────────
    const barW = Math.max((CW/n)*0.38, 3);
    const dotH = Math.max(barW*0.9, 3);
    const dotGap = dotH*1.35;

    pts.forEach((p,i)=>{
      const x=(i/(n-1))*CW;
      const h=(p/100)*aH;
      const numDots = Math.ceil(h/dotGap);

      for(let d=0; d<numDots; d++){
        const progress = d/Math.max(numDots-1,1); // 0=center, 1=tip
        // Gradient color: warm pink→orange like image 2
        const alpha = 0.9 - progress*0.5;
        // Interpolate between two hues based on horizontal position
        const hueShift = (i/n); // 0=left, 1=right
        // color from glowColor/color with alpha
        const col = color.replace(/[\d.]+\)$/, `${alpha})`);

        const dotSize = barW*(0.5+progress*0.5);
        // top
        ctx.beginPath();
        ctx.arc(x, baseY - d*dotGap - dotH, dotSize/2, 0, Math.PI*2);
        ctx.fillStyle=col; ctx.fill();
        // bottom mirror
        if(d < numDots*0.7){
          const mirrorAlpha = alpha*0.45;
          ctx.beginPath();
          ctx.arc(x, baseY + d*dotGap + dotH, dotSize*0.45/2, 0, Math.PI*2);
          ctx.fillStyle=glowColor.replace(/[\d.]+\)$/, `${mirrorAlpha})`);
          ctx.fill();
        }
      }
    });
  }
}

// ── TEXT HELPERS ──────────────────────────────────────────
function setF(ctx,sz,wt,fam){ctx.font=`${wt} ${sz*textScale}px ${fam}`}
function fillWrap(ctx,text,x,y,maxW,lh,color){
  ctx.fillStyle=color;
  const words=text.split(' '); let line='',cy=y;
  words.forEach((w,i)=>{
    const t=line+(line?' ':'')+w;
    if(ctx.measureText(t).width>maxW&&line){ctx.fillText(line,x,cy);line=w;cy+=lh;}else line=t;
    if(i===words.length-1)ctx.fillText(line,x,cy);
  });return cy;
}
function brand(ctx,CW,CH,pad,color){
  setF(ctx,CW*0.016,'400','"Helvetica Neue",Arial,sans-serif');
  ctx.fillStyle=color; ctx.textAlign='right';
  ctx.fillText('© SAPMANRI',CW-pad*0.7,CH-CW*0.022); ctx.textAlign='left';
}

// ── DESIGN RENDERERS ─────────────────────────────────────

function renderSapmanri(ctx,d,CW,CH,isV){
  let g=ctx.createLinearGradient(0,0,0,CH*0.38); g.addColorStop(0,'rgba(0,0,0,0.28)'); g.addColorStop(1,'rgba(0,0,0,0)'); ctx.fillStyle=g; ctx.fillRect(0,0,CW,CH*0.38);
  g=ctx.createLinearGradient(0,CH*0.42,0,CH); g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(0.48,'rgba(0,0,0,0.78)'); g.addColorStop(1,'rgba(0,0,0,0.97)'); ctx.fillStyle=g; ctx.fillRect(0,CH*0.42,CW,CH*0.58);
  const wY=isV?CH*0.50:CH*0.50, wH=isV?CH*0.28:CH*0.32;
  drawWave(ctx,d.line_points,CW,wY,wH,'rgba(190,170,255,0.82)','rgba(140,100,255,0.35)',d._ampRatio||1);
  const pad=CW*0.08, base=isV?CH*0.72:CH*0.74;
  const titleSize=CW*0.052;
  setF(ctx,titleSize,'700','"Helvetica Neue",Arial,sans-serif');
  const afterT=fillWrap(ctx,d.song_title,pad,base,CW-pad*2,titleSize*1.25,'rgba(255,255,255,0.97)');
  const artistY=afterT+titleSize*0.7;
  setF(ctx,CW*0.026,'400','"Helvetica Neue",Arial,sans-serif'); ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.fillText(d.artist,pad,artistY);
  const sepY=artistY+CW*0.052;
  ctx.beginPath(); ctx.moveTo(pad,sepY); ctx.lineTo(pad+CW*0.065,sepY); ctx.strokeStyle='rgba(255,255,255,0.16)'; ctx.lineWidth=1; ctx.stroke();
  const cs=CW*0.024, cy=sepY+cs*2;
  setF(ctx,cs,'300','"Helvetica Neue",Arial,sans-serif'); ctx.fillStyle='rgba(255,255,255,0.48)'; ctx.fillText(d.caption_line1||'',pad,cy);
  setF(ctx,cs,'500','"Helvetica Neue",Arial,sans-serif'); ctx.fillStyle='rgba(255,255,255,0.88)'; ctx.fillText(d.caption_line2||'',pad,cy+cs*1.7);
  setF(ctx,cs*0.86,'300','"Helvetica Neue",Arial,sans-serif'); ctx.fillStyle='rgba(255,255,255,0.34)'; ctx.fillText(d.caption_line3||'',pad,cy+cs*3.3);
  brand(ctx,CW,CH,pad,'rgba(255,255,255,0.18)');
}

function renderMagazine(ctx,d,CW,CH,isV){
  const splitY = isV ? CW*(1.1 + panelPos*0.6) : CH*(0.38 + panelPos*0.4);
  let g=ctx.createLinearGradient(0,0,0,splitY); g.addColorStop(0,'rgba(10,8,6,0.22)'); g.addColorStop(1,'rgba(10,8,6,0)'); ctx.fillStyle=g; ctx.fillRect(0,0,CW,splitY);
  ctx.fillStyle='#f2f0ec'; ctx.fillRect(0,splitY,CW,CH-splitY);
  const wY=splitY*0.68, wH=splitY*0.38;
  drawWave(ctx,d.line_points,CW,wY,wH,'rgba(184,122,110,0.88)','rgba(184,122,110,0.28)',d._ampRatio||1);
  const pad=CW*0.07, ty=splitY+CW*0.048;
  setF(ctx,CW*0.013,'400','"Helvetica Neue",Arial,sans-serif'); ctx.fillStyle='rgba(136,133,128,0.6)'; ctx.fillText('SAPMANRI',pad,ty);
  ctx.fillStyle='#b87a6e'; ctx.fillRect(pad,ty+CW*0.02,CW*0.0018,CW*0.046);
  const titleSz=CW*0.042;
  setF(ctx,titleSz,'300','"Cormorant Garamond","Noto Serif KR",Georgia,serif');
  const afterT=fillWrap(ctx,d.song_title,pad+CW*0.011,ty+CW*0.088,CW-pad*2,titleSz*1.25,'#1a1a1a');
  setF(ctx,CW*0.022,'300','"Noto Serif KR",Georgia,serif'); ctx.fillStyle='#888580'; ctx.fillText(d.artist,pad+CW*0.011,afterT+CW*0.03);
  setF(ctx,CW*0.018,'300 italic','"Cormorant Garamond",Georgia,serif'); ctx.fillStyle='#888580';
  ctx.fillText(d.caption_line2||'',pad+CW*0.011,afterT+CW*0.075);
  ctx.fillText(d.caption_line3||'',pad+CW*0.011,afterT+CW*0.112);
  setF(ctx,CW*0.013,'400','"Helvetica Neue",Arial,sans-serif'); ctx.fillStyle='#b5b2ad'; ctx.textAlign='right'; ctx.fillText('SAPMANRI',CW-pad*0.8,CH-CW*0.02); ctx.textAlign='left';
}

function renderTheEdit(ctx,d,CW,CH,isV){
  let g=ctx.createLinearGradient(0,CH*0.45,0,CH); g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(0,0,0,0.5)'); ctx.fillStyle=g; ctx.fillRect(0,0,CW,CH);

async function findRelatedVideo(){
  const gkey=document.getElementById('googleKey').value.trim();

  if(!gkey||!akey||!cachedResult)return;

  const recList=document.getElementById('videoRecList');

  try{

    let videos=[], pageToken='';
    for(let page=0; page<4; page++){
      const url=`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&type=video&maxResults=50&order=date${pageToken?'&pageToken='+pageToken:''}&key=${gkey}`;
      const res=await fetch(url);

      if(data.error)throw new Error(data.error.message);
      videos.push(...(data.items||[]).map(v=>({
        id:v.id.videoId,
        title:v.snippet.title,
        thumb:v.snippet.thumbnails?.medium?.url||''
      })));
      if(!data.nextPageToken)break;
      pageToken=data.nextPageToken;
    }

    if(!videos.length)throw new Error('영상을 찾을 수 없어요');
    recList.innerHTML='<div style="font-size:12px;color:#444;padding:4px 0;">AI가 어울리는 영상 고르는 중...</div>';

    // 2. Ask Claude to pick 3 matching videos
    const d=cachedResult;
    const videoList=videos.map((v,i)=>`${i+1}. [${v.id}] ${v.title}`).join('\n');

    const prompt=`You are helping match YouTube videos from the channel 감성찾아삽만리 (SAPMANRI) to a photo.

Photo analysis:
- Subject/scene: ${d.image_description||d.line_description}
- Line description: ${d.line_description}

Channel videos (format: index. [videoId] title):
${videoList}

Pick the 3 most thematically and emotionally fitting videos. Consider: season, location type (countryside/water/urban/cafe), mood, time of day implied by the photo.

Respond ONLY as JSON, no markdown:
{"picks":[{"id":"videoId","title":"title","reason":"한국어로 1문장 추천 이유"}]}`;

    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':akey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:600,messages:[{role:'user',content:prompt}]})

    if(aiData.error)throw new Error(aiData.error.message);
    const picks=JSON.parse(aiData.content[0].text.replace(/```json|```/g,'').trim()).picks;

    recList.innerHTML=picks.map(p=>`
      <a href="https://www.youtube.com/watch?v=${p.id}" target="_blank"
        style="display:flex;gap:12px;align-items:flex-start;text-decoration:none;padding:10px;background:#0a0a0a;border-radius:7px;border:0.5px solid #1e1e1e;transition:border-color 0.15s;"
        onmouseover="this.style.borderColor='#333'" onmouseout="this.style.borderColor='#1e1e1e'">
        <img src="https://img.youtube.com/vi/${p.id}/mqdefault.jpg"
          style="width:96px;height:54px;object-fit:cover;border-radius:4px;flex-shrink:0;" />
        <div style="min-width:0;">
          <div style="font-size:12px;font-weight:500;color:#ccc;line-height:1.4;margin-bottom:4px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;">${p.title}</div>
          <div style="font-size:11px;color:#555;line-height:1.5;">${p.reason}</div>
        </div>
      </a>`).join('');

  }catch(err){
    recList.innerHTML=`<div style="font-size:12px;color:#555;padding:4px 0;">오류: ${err.message}</div>`;
  }
}

function renderGirok(ctx,d,CW,CH,isV){

    const tw=ctx.measureText(t).width+CW*0.05;
    const th=CW*0.04; const tx=px-tw; const tyy=divY+capSz*6.2;
    ctx.fillStyle='#F5F5FF';
    ctx.beginPath();
    if(ctx.roundRect)ctx.roundRect(tx,tyy,tw,th,th/2);
    else ctx.rect(tx,tyy,tw,th);
    ctx.fill();
    ctx.fillStyle='#9B91E0'; ctx.textAlign='center';
    ctx.fillText(t,tx+tw/2,tyy+th*0.68); ctx.textAlign='left';
    px=tx-CW*0.018;
  });

  // Branding — bottom, dark small
  setF(ctx,CW*0.016,'400','"Helvetica Neue",Arial,sans-serif');
  ctx.fillStyle='#CCCCCC'; ctx.textAlign='right';
  ctx.fillText('SAPMANRI',CW-pad*0.7,CH-CW*0.022); ctx.textAlign='left';
}

function downloadCard(){
  if(!window._cardCanvas)return;
  const a=document.createElement('a'); a.download=`sapmanri_${Date.now()}.jpg`;
  a.href=window._cardCanvas.toDataURL('image/jpeg',0.95); a.click();
}
</script>
