      <div class="jw-mini-page-dark" style="position:static;text-align:right;color:rgba(255,255,255,0.25)">${pageNum}</div>
    </div></div>`;
  }

  // ── 2단 사진+텍스트 ──
  if (pageType === 'split') {
    const lines = (slide.body || '').split('\n').filter(l=>l.trim());
    const linesHtml = lines.map(l => `<div>${l}</div>`).join('');
    const bgHtml = img ? `<img class="slide-bg-img" src="${img}"/>` : `<div style="position:absolute;inset:0;background:#ccc"></div>`;
    return `<div class="slide-card"><div class="jw-split-canvas">
      <div class="jw-split-photo">${bgHtml}<div class="jw-mini-mark" style="color:#fff">SAPMANRI</div><div class="jw-mini-page">${pageNum}</div></div>
      <div class="jw-split-text">
        <div class="jw-split-label">${slide.label || ''}</div>
        <div class="jw-split-text-lines">${linesHtml}</div>
      </div>
    </div></div>`;
  }

  // ── 그리드 콜라주 ──
  if (pageType === 'grid') {
    const idxs = (slide.image_indices || []).filter(idx => idx != null && allImages && idx < allImages.length);
    const layout = idxs.length >= 3 ? 'g1p2' : 'g2x2';
    const cellsHtml = idxs.slice(0,3).map((idx,j) => {
      const src = allImages[idx]?.dataUrl || '';
      const bigCls = (layout === 'g1p2' && j === 0) ? ' jw-grid-big' : '';
      return `<div class="jw-grid-cell${bigCls}">${src?`<img class="slide-bg-img" src="${src}"/>`:''}</div>`;
    }).join('');
    return `<div class="slide-card"><div class="jw-grid-canvas">
      <div class="jw-grid-title">${slide.label || '오후의 장면들'}</div>
      <div class="jw-grid-wrap ${layout}">${cellsHtml}</div>
      <div class="jw-mini-page-dark" style="position:static;text-align:right;margin-top:6px">${pageNum}</div>
    </div></div>`;
  }

  // ── 풀블리드 화보 (기본/fallback) ──
  const bgHtml = img ? `<img class="slide-bg-img" src="${img}"/>` : `<div style="position:absolute;inset:0;background:#ccc"></div>`;
  return `<div class="slide-card"><div class="jw-canvas">${bgHtml}
    <div class="jw-fullbleed-overlay"></div>
    <div class="jw-mini-mark" style="color:#fff">SAPMANRI</div>
    <div class="jw-mini-page">${pageNum}</div>
    <div class="jw-fullbleed-caption">
      <div class="jw-caption">${slide.headline || slide.body || ''}</div>
    </div>
  </div></div>`;
}


// 이미지 dataUrl을 S×S 정사각형 cover canvas dataUrl로 변환
function imgToCoverCanvas(dataUrl, S) {
  return new Promise((resolve) => {
    if (!dataUrl) { resolve(null); return; }
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = S; c.height = S;
      const ctx = c.getContext('2d');
      const scale = Math.max(S / img.width, S / img.height);
      const w = img.width * scale, h = img.height * scale;
      ctx.drawImage(img, (S - w) / 2, (S - h) / 2, w, h);
      resolve(c.toDataURL('image/jpeg', 0.92));
    };
    img.onerror = () => resolve(null);
    img.src = dataUrl;
  });
}

// iOS 판별
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

// 렌더된 PNG dataURL 캐시
let _iosPngs = [];
let _iosIdx = 0;

async function exportSlides() {
  if (!generatedSlides.length) return;
  const btn = document.querySelector('.btn-primary');
  const orig = btn.textContent;
  btn.disabled = true;
  btn.textContent = '렌더링 중...';

  try { await document.fonts.ready; } catch(e) {}
  const SIZE = 1080;

  // 모든 슬라이드 미리 렌더
  _iosPngs = [];
  for (let i = 0; i < generatedSlides.length; i++) {
    btn.textContent = '렌더링 ' + (i+1) + '/' + generatedSlides.length + '...';
    const slide = generatedSlides[i];
    const imgSrc = (slide.image_index != null && images[slide.image_index])
      ? images[slide.image_index].dataUrl : null;
    try {
      const canvas = await renderSlideToCanvas(slide, i, imgSrc, SIZE, images);
      _iosPngs.push(canvas.toDataURL('image/png'));
    } catch(e) { _iosPngs.push(null); console.error(e); }
  }

  btn.textContent = orig;
  btn.disabled = false;

  if (isIOS) {
    // iOS: 모달로 한 장씩 보여주기
    _iosIdx = 0;
    openIosModal();
  } else {
    // 데스크탑: 기존 일괄 다운로드
    for (let i = 0; i < _iosPngs.length; i++) {
      if (!_iosPngs[i]) continue;
      const link = document.createElement('a');
      link.download = 'sapmanri_slide_' + String(i+1).padStart(2,'0') + '.png';
      link.href = _iosPngs[i];
      link.click();
      await new Promise(r => setTimeout(r, 400));
    }
  }
}

function openIosModal() {
  const modal = document.getElementById('iosModal');
  modal.style.display = 'flex';
  updateIosModal();
}

function updateIosModal() {
  const img = document.getElementById('iosModalImg');
  const count = document.getElementById('iosModalCount');
  const prevBtn = document.getElementById('iosPrevBtn');
  const nextBtn = document.getElementById('iosNextBtn');
  img.src = _iosPngs[_iosIdx] || '';
  count.textContent = (_iosIdx+1) + ' / ' + _iosPngs.length;
  prevBtn.style.opacity = _iosIdx === 0 ? '0.3' : '1';
  prevBtn.disabled = _iosIdx === 0;
  if (_iosIdx === _iosPngs.length - 1) {
    nextBtn.textContent = '완료 ✓';
    nextBtn.onclick = closeIosModal;
  } else {
    nextBtn.textContent = '다음 ▶';
    nextBtn.onclick = iosModalNext;
  }
}

function iosModalNext() {
  if (_iosIdx < _iosPngs.length - 1) { _iosIdx++; updateIosModal(); }
}
function iosModalPrev() {
  if (_iosIdx > 0) { _iosIdx--; updateIosModal(); }
}
function closeIosModal() {
  document.getElementById('iosModal').style.display = 'none';
}

function renderSlideWithImages(slide, i, imgArr) {
  const style = document.getElementById('metaStyle').value;
  const img = slide.image_index != null ? imgArr[slide.image_index]?.dataUrl : null;
  const folio = slide.folio || String(i+1).padStart(2,'0') + ' — ' + String(generatedSlides.length).padStart(2,'0');
  const accent = slide.accent_color || '#b87a6e';
  const tag = document.getElementById('metaTag').value;

  if (slide.layout === 'pull_quote' || slide.type === 'pull_quote') return renderPullQuote(slide, i, style, accent, folio).replace(/<div class="slide-card"[^>]*>/, '').replace(/<\/div>\s*$/, '');
  if (style === 'ohouse') return renderOhouse(slide, i, img, folio, tag).replace(/<div class="slide-card"[^>]*>/, '').replace(/<\/div>\s*$/, '');

  const isNike = style === 'nike';
  const overlayMap = {overlay_bottom:'ov-bottom',overlay_top:'ov-top',overlay_left:'ov-left',overlay_right:'ov-right',split_bottom:'',dark_full:'ov-full'};
  const isSplit = slide.layout === 'split_bottom';
  const isDark = slide.type === 'closing';

  let bgHtml = '';
  if (img) {
    const ov = overlayMap[slide.layout] || 'ov-bottom';
    bgHtml = `<img style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover" src="${img}" />${ov ? `<div class="${ov}"></div>` : ''}`;
  }

  const txtClass = {bottom_left:'txt-bottom-left',top_left:'txt-top-left',center:'txt-center',left_half:'txt-left-half',split_bottom:'txt-split',dark_center:'txt-dark'}[slide.text_position] || 'txt-bottom-left';
  const hl = isNike ? (slide.headline||'').toUpperCase() : (slide.headline||'');
  const headlineCls = isDark ? (isNike?'nike-closing-hl':'s-headline-dark') : isSplit ? (isNike?'nike-headline-md':'s-headline-md') : (isNike?'nike-headline':'s-headline-lg');
  const bodyCls = isDark ? 's-body-dark' : isSplit ? 's-body-ink' : 's-body';
  const labelCls = isNike ? 'nike-label' : (isSplit?'s-label-ink':'s-label');

  let inner = '';
  if (slide.type === 'cover') {
    inner = `<span class="s-masthead">SAPMANRI</span><div style="flex:1"></div><div class="${headlineCls}">${hl}</div><div class="${bodyCls}">${slide.body||''}</div>`;
  } else if (isDark) {
    inner = `<span class="s-masthead-dark">SAPMANRI</span><div class="s-rule" style="background:${accent}"></div><div class="${headlineCls}">${hl}</div><div class="${bodyCls}">${slide.body||''}</div><span class="s-closing-tag" style="color:${accent}">${tag}</span>`;
  } else {
    inner = `<span class="${labelCls}" style="color:${accent}">${slide.label||''}</span><div class="${headlineCls}">${hl}</div><div class="${bodyCls}">${slide.body||''}</div>`;
  }

  const bgColor = isDark ? '#1a1a1a' : isSplit ? 'transparent' : '#f2f0ec';
  const folioClass = isDark ? 's-folio-dark' : isSplit ? 's-folio-ink' : 's-folio';

  return `<div class="slide-canvas" style="width:100%;height:100%;background:${bgColor}">${bgHtml}<div class="${txtClass}">${inner}</div><div class="${folioClass}">${folio}</div></div>`;
}

async function renderSlideToCanvas(slide, idx, imgDataUrl, SIZE, allImages) {
  const canvas = document.createElement('canvas');
  canvas.width = SIZE; canvas.height = SIZE;
  const ctx = canvas.getContext('2d');
  const style = document.getElementById('metaStyle').value;
  const accent = slide.accent_color || '#b87a6e';
  const tag = document.getElementById('metaTag').value;

  // 배경 이미지 — cover 방식으로 정확히 그리기
  async function drawBgImage(dataUrl, overlayType) {
    if (!dataUrl) return;
    return new Promise((res) => {
      const img = new Image();
      img.onload = () => {
        // cover: 이미지 비율 유지하며 canvas 꽉 채우기
        const scale = Math.max(SIZE / img.width, SIZE / img.height);
        const w = img.width * scale;
        const h = img.height * scale;
        const x = (SIZE - w) / 2;
        const y = (SIZE - h) / 2;
        ctx.drawImage(img, x, y, w, h);

        // overlay gradient
        const grad = ctx.createLinearGradient(0, 0, 0, SIZE);
        if (overlayType === 'overlay_bottom') {
          grad.addColorStop(0, 'rgba(0,0,0,0)');
          grad.addColorStop(0.45, 'rgba(0,0,0,0)');
          grad.addColorStop(1, 'rgba(10,8,6,0.78)');
        } else if (overlayType === 'overlay_top') {
          grad.addColorStop(0, 'rgba(10,8,6,0.72)');
          grad.addColorStop(0.5, 'rgba(0,0,0,0)');
          grad.addColorStop(1, 'rgba(0,0,0,0)');
        } else if (overlayType === 'overlay_left') {
          const gl = ctx.createLinearGradient(0,0,SIZE,0);
          gl.addColorStop(0, 'rgba(10,8,6,0.75)');
          gl.addColorStop(0.6, 'rgba(0,0,0,0)');
          ctx.fillStyle = gl; ctx.fillRect(0,0,SIZE,SIZE);
        } else if (overlayType === 'dark_full') {
          ctx.fillStyle = 'rgba(10,8,6,0.45)'; ctx.fillRect(0,0,SIZE,SIZE);
        }
        if (overlayType !== 'overlay_left') {
          ctx.fillStyle = grad; ctx.fillRect(0,0,SIZE,SIZE);
        }
        res();
      };
      img.onerror = res;
      img.src = dataUrl;
    });
  }

  // 폰트 설정
  // 스타일별 폰트 설정
  const serifFont = style === 'stayfolio'
    ? '"Cormorant Garamond", "Noto Serif KR", Georgia, serif'
    : '"Noto Serif KR", Georgia, serif';
  const sansFont = (style === 'theedit' || style === 'nike')
    ? '"Helvetica Neue", Arial, "Noto Sans KR", sans-serif'
    : '"Noto Sans KR", "Helvetica Neue", Arial, sans-serif';

  // 스타일별 헤드라인 폰트 — 디에디트는 산세리프 굵게, 스테이폴리오는 세리프 가늘게
  const headFont = (style === 'theedit' || style === 'nike' || style === 'sapmanri')
    ? '"Helvetica Neue", Arial, sans-serif'
    : style === 'stayfolio'
    ? '"Cormorant Garamond", "Noto Serif KR", serif'
    : style === 'applemd'
    ? '"Helvetica Neue", "Noto Sans KR", Arial, sans-serif'
    : serifFont;

  const headWeight = (style === 'theedit' || style === 'nike' || style === 'sapmanri') ? '700'
    : style === 'applemd' ? '200'
    : '300';

  function setFont(size, weight, family) {
    ctx.font = weight + ' ' + size + 'px ' + family;
  }

  function wrapText(text, maxW) {
    const words = text.split('');
    const lines = [];
    let cur = '';
    for (const ch of words) {
      const test = cur + ch;
      if (ctx.measureText(test).width > maxW && cur) {
        lines.push(cur); cur = ch;
      } else { cur = test; }
    }
    if (cur) lines.push(cur);
    return lines;
  }

  // ── 전원생활 매거진 슬라이드 ──
  if (style === 'jeonwon') {
    const pageType = slide.page_type || (slide.type === 'cover' ? 'cover' : slide.type === 'closing' ? 'closing' : 'fullbleed');
    const pageNum = slide.folio || String(idx+1).padStart(2,'0') + '/07';
    const ORANGE = '#E8762C', CREAM = '#FAF5EE', DARK = '#120E0C';
    const serif = '"Gowun Batang","Noto Serif KR",Georgia,serif';
    const R2 = (SIZE / 220) * textScale;

    if (pageType === 'cover') {
      ctx.fillStyle = '#ddd'; ctx.fillRect(0,0,SIZE,SIZE);
      if (imgDataUrl) await drawBgImage(imgDataUrl, 'none');
      // 상단 그라디언트
      let g = ctx.createLinearGradient(0,0,0,SIZE*0.22);
      g.addColorStop(0,'rgba(250,245,238,0.95)'); g.addColorStop(0.7,'rgba(250,245,238,0.7)'); g.addColorStop(1,'rgba(250,245,238,0)');
      ctx.fillStyle = g; ctx.fillRect(0,0,SIZE,SIZE*0.22);
      // 워드마크
      setFont(Math.round(22*R2), '700', serif);
      ctx.fillStyle = ORANGE; ctx.textAlign = 'center';
      ctx.fillText('SAPMANRI', SIZE/2, Math.round(16*R2));
      setFont(Math.round(6*R2), '300', sansFont);
      ctx.fillStyle = '#999';
      ctx.fillText('오늘도 느리게 · slow days', SIZE/2, Math.round(24*R2));
      ctx.textAlign = 'left';

      // 특집 라벨
      const labelY = Math.round(SIZE*0.18) + Math.round(7*R2);
      setFont(Math.round(7*R2), '600', sansFont);
      const labelText = slide.label || '이주의 이야기';
      const labelW = ctx.measureText(labelText).width + Math.round(14*R2);
      ctx.fillStyle = ORANGE; ctx.fillRect(Math.round(14*R2), labelY - Math.round(7*R2), labelW, Math.round(11*R2));
      ctx.fillStyle = '#fff';
      ctx.fillText(labelText, Math.round(14*R2)+Math.round(7*R2), labelY+Math.round(1*R2));

      // 헤드라인 (최대 2줄)
      setFont(Math.round(15*R2), '700', serif);
      ctx.fillStyle = '#fff';
      ctx.shadowColor = 'rgba(0,0,0,0.4)'; ctx.shadowBlur = Math.round(12*R2);
      const hlLines = (slide.headline || '').split('\n').slice(0,2);
      const hlY0 = labelY + Math.round(20*R2);
      hlLines.forEach((l,j) => ctx.fillText(l, Math.round(14*R2), hlY0 + j*Math.round(19*R2)));
      ctx.shadowBlur = 0;

      // 하단 그라디언트
      g = ctx.createLinearGradient(0,SIZE*0.78,0,SIZE);
      g.addColorStop(0,'rgba(250,245,238,0)'); g.addColorStop(0.4,'rgba(250,245,238,0.75)'); g.addColorStop(1,'rgba(250,245,238,0.97)');
      ctx.fillStyle = g; ctx.fillRect(0,SIZE*0.78,SIZE,SIZE*0.22);

      // 발행 정보
      const botY = SIZE - Math.round(14*R2);
      setFont(Math.round(16*R2), '700', sansFont);
      ctx.fillStyle = DARK;
      ctx.fillText(slide.issue_year || '2026', Math.round(14*R2), botY - Math.round(6*R2));
      setFont(Math.round(7*R2), '400', sansFont);
      ctx.fillStyle = '#999';
      ctx.fillText(slide.issue_sub || '', Math.round(14*R2), botY + Math.round(4*R2));

      // 기사 목록 (우측)
      const articles = (slide.article_list || []).slice(0,4);
      setFont(Math.round(8*R2), '400', serif);
      ctx.fillStyle = '#444'; ctx.textAlign = 'right';
      const lineH2 = Math.round(15*R2);
      const startY = botY - (articles.length-1)*lineH2 - Math.round(4*R2);
      articles.forEach((a,j) => ctx.fillText(a, SIZE-Math.round(14*R2), startY + j*lineH2));
      ctx.textAlign = 'left';
      return canvas;
    }

    if (pageType === 'closing') {
      ctx.fillStyle = DARK; ctx.fillRect(0,0,SIZE,SIZE);
      if (imgDataUrl) await drawBgImage(imgDataUrl, 'none');
      ctx.fillStyle = 'rgba(18,14,12,0.55)'; ctx.fillRect(0,0,SIZE,SIZE);

      const pad = Math.round(16*R2);
      let y = SIZE - Math.round(14*R2);

      // 워드마크 (맨 아래)
      setFont(Math.round(18*R2), '700', serif);
      ctx.fillStyle = ORANGE;
      ctx.fillText('SAPMANRI', pad, y);
      y -= Math.round(28*R2);

      // CTA
      setFont(Math.round(7*R2), '400', sansFont);
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillText(tag || '@sapmanri · 유튜브에서 전체 영상 보기', pad, y);
      y -= Math.round(18*R2);

      // body
      setFont(Math.round(8*R2), '300', sansFont);
      ctx.fillStyle = 'rgba(255,255,255,0.75)';
      const blines = wrapText(slide.body||'', SIZE-pad*2);
      const bodyY0 = y - (blines.length-1)*Math.round(13*R2);
      blines.forEach((l,j) => ctx.fillText(l, pad, bodyY0 + j*Math.round(13*R2)));
      y = bodyY0 - Math.round(14*R2);

      // headline
      setFont(Math.round(20*R2), '700', serif);
      ctx.fillStyle = '#fff';
      const hlines = wrapText(slide.headline||'', SIZE-pad*2);
      const hlY0 = y - (hlines.length-1)*Math.round(26*R2);
      hlines.forEach((l,j) => ctx.fillText(l, pad, hlY0 + j*Math.round(26*R2)));

      // page num
      setFont(Math.round(7*R2), '400', sansFont);
      ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.textAlign = 'right';
      ctx.fillText(pageNum, SIZE-Math.round(12*R2), Math.round(16*R2));
      ctx.textAlign = 'left';
      return canvas;
    }

    if (pageType === 'quote') {
      ctx.fillStyle = DARK; ctx.fillRect(0,0,SIZE,SIZE);
      const pad = Math.round(24*R2);
      // rule top
      const ruleW = Math.round(24*R2);
      const cy = SIZE/2;
      setFont(Math.round(20*R2), '700', serif);
      const qtext = slide.headline || slide.body || '';
      const qlines = wrapText(qtext, SIZE-pad*2);
      const lineH3 = Math.round(30*R2);
      const totalH = qlines.length*lineH3;
      const startY = cy - totalH/2 + Math.round(20*R2);

      // 위 rule
      ctx.fillStyle = ORANGE;
      ctx.fillRect(SIZE/2 - ruleW/2, startY - Math.round(28*R2), ruleW, Math.round(2*R2));

      ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
      qlines.forEach((l,j) => ctx.fillText(l, SIZE/2, startY + j*lineH3));

      // 아래 rule
      ctx.fillStyle = ORANGE;
      ctx.fillRect(SIZE/2 - ruleW/2, startY + qlines.length*lineH3 + Math.round(8*R2), ruleW, Math.round(2*R2));

      // context
      setFont(Math.round(7*R2), '400', sansFont);
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.fillText(slide.label || '', SIZE/2, startY + qlines.length*lineH3 + Math.round(26*R2));
      ctx.textAlign = 'left';

      // page num
      setFont(Math.round(7*R2), '400', sansFont);
      ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.textAlign = 'right';
      ctx.fillText(pageNum, SIZE-Math.round(12*R2), Math.round(16*R2));
      ctx.textAlign = 'left';
      return canvas;
    }

    // ── 인덱스/목차 ──
    if (pageType === 'index') {
      ctx.fillStyle = DARK; ctx.fillRect(0,0,SIZE,SIZE);
      const pad = Math.round(16*R2);
      setFont(Math.round(7*R2), '400', sansFont);
      ctx.fillStyle = ORANGE;
      ctx.fillText('CONTENTS', pad, pad + Math.round(7*R2));
      setFont(Math.round(16*R2), '700', serif);
      ctx.fillStyle = '#fff';
      ctx.fillText(slide.headline || '이번 호 이야기', pad, pad + Math.round(28*R2));

      const items = (slide.index_list || []).slice(0,5);
      const itemY0 = pad + Math.round(50*R2);
      const itemGap = Math.round(20*R2);
      items.forEach((t,j) => {
        const y = itemY0 + j*itemGap;
        setFont(Math.round(11*R2), '700', sansFont);
        ctx.fillStyle = ORANGE;
        ctx.fillText('0'+(j+1), pad, y);
        setFont(Math.round(11*R2), '400', serif);
        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        ctx.fillText(t, pad + Math.round(18*R2), y);
      });

      setFont(Math.round(7*R2), '400', sansFont);
      ctx.fillStyle = 'rgba(255,255,255,0.25)'; ctx.textAlign = 'right';
      ctx.fillText(pageNum, SIZE-pad, SIZE-pad);
      ctx.textAlign = 'left';
      return canvas;
    }

    // ── 2단 사진+텍스트 ──
    if (pageType === 'split') {
      const splitY = Math.round(SIZE*0.6);
      ctx.fillStyle = '#ccc'; ctx.fillRect(0,0,SIZE,SIZE);
      if (imgDataUrl) {
        await new Promise(res => {
          const im = new Image();
          im.onload = () => {
            const scale = Math.max(SIZE/im.width, splitY/im.height);
            const w = im.width*scale, h = im.height*scale;
            ctx.save(); ctx.beginPath(); ctx.rect(0,0,SIZE,splitY); ctx.clip();
            ctx.drawImage(im,(SIZE-w)/2,(splitY-h)/2,w,h);
            ctx.restore(); res();
          };
          im.onerror = res; im.src = imgDataUrl;
        });
      }
      setFont(Math.round(8*R2), '700', serif);
      ctx.fillStyle = '#fff';
      ctx.fillText('SAPMANRI', Math.round(12*R2), Math.round(16*R2));
      setFont(Math.round(7*R2), '400', sansFont);
      ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.textAlign = 'right';
      ctx.fillText(pageNum, SIZE-Math.round(12*R2), Math.round(16*R2));
      ctx.textAlign = 'left';

      // 하단 텍스트 패널
      ctx.fillStyle = CREAM; ctx.fillRect(0,splitY,SIZE,SIZE-splitY);
      const pad = Math.round(14*R2);
      setFont(Math.round(7*R2), '600', sansFont);
      ctx.fillStyle = ORANGE;
      ctx.fillText((slide.label||'').toUpperCase(), pad, splitY + Math.round(16*R2));

      const lines = (slide.body || '').split('\n').filter(l=>l.trim());
      setFont(Math.round(10*R2), '400', serif);
      ctx.fillStyle = DARK;
      const lineH = Math.round(16*R2);
      const totalH = lines.length * lineH;
      const startY = splitY + (SIZE-splitY)/2 - totalH/2 + Math.round(20*R2);
      lines.forEach((l,j) => ctx.fillText(l, pad, startY + j*lineH));
      return canvas;
    }

    // ── 그리드 콜라주 ──
    if (pageType === 'grid') {
      ctx.fillStyle = CREAM; ctx.fillRect(0,0,SIZE,SIZE);
      const pad = Math.round(14*R2);
      setFont(Math.round(7*R2), '600', sansFont);
      ctx.fillStyle = '#999';
      ctx.fillText((slide.label||'오후의 장면들').toUpperCase(), pad, pad + Math.round(7*R2));

      const gridTop = pad + Math.round(20*R2);
      const gridBottom = SIZE - pad - Math.round(14*R2);
      const gridH = gridBottom - gridTop;
      const gridW = SIZE - pad*2;
      const gap = Math.round(6*R2);

      const idxs = (slide.image_indices || []).filter(ix => ix != null && allImages && ix < allImages.length).slice(0,3);

      async function drawCell(dataUrl, x, y, w, h) {
        ctx.fillStyle = '#ddd'; ctx.fillRect(x,y,w,h);
        if (!dataUrl) return;
        await new Promise(res => {
          const im = new Image();
          im.onload = () => {
            const scale = Math.max(w/im.width, h/im.height);
            const iw = im.width*scale, ih = im.height*scale;
            ctx.save(); ctx.beginPath(); ctx.rect(x,y,w,h); ctx.clip();
            ctx.drawImage(im, x+(w-iw)/2, y+(h-ih)/2, iw, ih);
            ctx.restore(); res();
          };
          im.onerror = res; im.src = dataUrl;
        });
      }

      if (idxs.length >= 3) {
        // 1+2 비대칭
        const bigW = gridW * 0.58;
        const smallW = gridW - bigW - gap;
        const smallH = (gridH - gap) / 2;
        await drawCell(allImages[idxs[0]]?.dataUrl, pad, gridTop, bigW, gridH);
        await drawCell(allImages[idxs[1]]?.dataUrl, pad+bigW+gap, gridTop, smallW, smallH);
        await drawCell(allImages[idxs[2]]?.dataUrl, pad+bigW+gap, gridTop+smallH+gap, smallW, smallH);
      } else {
        // 2x2 (이미지 부족하면 빈 칸)
        const cw = (gridW-gap)/2, ch = (gridH-gap)/2;
        for (let r=0;r<2;r++) for (let c=0;c<2;c++) {
          const k = r*2+c;
          await drawCell(idxs[k]!=null ? allImages[idxs[k]]?.dataUrl : null, pad+c*(cw+gap), gridTop+r*(ch+gap), cw, ch);
        }
      }

      setFont(Math.round(7*R2), '400', sansFont);
      ctx.fillStyle = '#bbb'; ctx.textAlign = 'right';
      ctx.fillText(pageNum, SIZE-pad, SIZE-Math.round(6*R2));
      ctx.textAlign = 'left';
      return canvas;
    }

    // fullbleed (기본)
    ctx.fillStyle = '#ccc'; ctx.fillRect(0,0,SIZE,SIZE);
    if (imgDataUrl) await drawBgImage(imgDataUrl, 'none');
    let g2 = ctx.createLinearGradient(0,SIZE*0.62,0,SIZE);
    g2.addColorStop(0,'rgba(18,14,12,0)'); g2.addColorStop(1,'rgba(18,14,12,0.85)');
    ctx.fillStyle = g2; ctx.fillRect(0,SIZE*0.62,SIZE,SIZE*0.38);

    setFont(Math.round(8*R2), '700', serif);
    ctx.fillStyle = '#fff';
    ctx.fillText('SAPMANRI', Math.round(12*R2), Math.round(16*R2));

    setFont(Math.round(7*R2), '400', sansFont);
    ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.textAlign = 'right';
    ctx.fillText(pageNum, SIZE-Math.round(12*R2), Math.round(16*R2));
    ctx.textAlign = 'left';

    setFont(Math.round(14*R2), '400', serif);
    ctx.fillStyle = '#fff';
    const captionText = slide.headline || slide.body || '';
    const clines = wrapText(captionText, SIZE-Math.round(28*R2));
    const capY0 = SIZE - Math.round(16*R2) - (clines.length-1)*Math.round(20*R2);
    clines.forEach((l,j) => ctx.fillText(l, Math.round(14*R2), capY0 + j*Math.round(20*R2)));
    return canvas;
  }

  // ── 인포그래픽 슬라이드 ──
  if (slide.type === 'infographic') {
    ctx.fillStyle = '#1a1a1a'; ctx.fillRect(0,0,SIZE,SIZE);
    if (imgDataUrl) await drawBgImage(imgDataUrl, 'none');
    // 살짝 어두운 오버레이
    ctx.fillStyle = 'rgba(0,0,0,0.18)'; ctx.fillRect(0,0,SIZE,SIZE);

    const labels = slide.labels || [];
    const accentRgb = accent || '#b87a6e';
    for (const lb of labels) {
      const cx = Math.round(lb.x * SIZE);
      const cy = Math.round(lb.y * SIZE);
      const dir = lb.direction || 'right';
      const lineLen = Math.round(SIZE * 0.09);
      const dotR = Math.round(SIZE * 0.007);

      // 점
      ctx.beginPath();
      ctx.arc(cx, cy, dotR, 0, Math.PI*2);
      ctx.fillStyle = accentRgb;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx, cy, dotR+2, 0, Math.PI*2);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = Math.round(SIZE*0.002);
      ctx.stroke();

      // 선
      let lx2 = cx, ly2 = cy;
      if (dir === 'right') lx2 = cx + lineLen;
      else if (dir === 'left') lx2 = cx - lineLen;
      else if (dir === 'down') ly2 = cy + lineLen;
      else if (dir === 'up') ly2 = cy - lineLen;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(lx2, ly2);
      ctx.strokeStyle = accentRgb;
      ctx.lineWidth = Math.round(SIZE*0.0015);
      ctx.stroke();

      // 레이블 텍스트
      const fontSize = Math.round(SIZE * 0.022);
      setFont(fontSize, '500', sansFont);
      ctx.fillStyle = '#fff';
      ctx.shadowColor = 'rgba(0,0,0,0.85)';
      ctx.shadowBlur = 6;
      const textGap = Math.round(SIZE*0.012);
      let tx = lx2, ty = ly2;
      if (dir === 'right') { ctx.textAlign = 'left'; tx = lx2 + textGap; ty = ly2 + fontSize/3; }
      else if (dir === 'left') { ctx.textAlign = 'right'; tx = lx2 - textGap; ty = ly2 + fontSize/3; }
      else if (dir === 'down') { ctx.textAlign = 'center'; ty = ly2 + textGap + fontSize; }
      else if (dir === 'up') { ctx.textAlign = 'center'; ty = ly2 - textGap; }
      ctx.fillText(lb.text || '', tx, ty);
      ctx.shadowBlur = 0;
      ctx.textAlign = 'left';
    }

    // 폴리오
    setFont(Math.round(SIZE*0.022), '400', sansFont);
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.textAlign = 'right';
    ctx.fillText(slide.folio || String(idx+1).padStart(2,'0'), SIZE - Math.round(SIZE*0.03), SIZE - Math.round(SIZE*0.025));
    ctx.textAlign = 'left';
    return canvas;
  }

  const isDark = slide.type === 'closing';
  const isSplit = slide.layout === 'split_bottom';
  const isPull = slide.layout === 'pull_quote' || slide.type === 'pull_quote';
  const isNike = style === 'nike';
  // CSS 슬라이드 카드 220px 기준 → 1080px Canvas 비율, textScale로 조정
  const R = (SIZE / 220) * textScale;
  const pad = Math.round(14 * R);  // CSS padding 14px

  if (isPull) {
    ctx.fillStyle = '#f2f0ec'; ctx.fillRect(0,0,SIZE,SIZE);
    ctx.fillStyle = accent; ctx.fillRect(pad, pad+Math.round(40*R), Math.round(2*R), Math.round(28*R));
    setFont(Math.round(19*R), '300', serifFont);
    ctx.fillStyle = '#1a1a1a';
    const lines = wrapText(slide.headline || '', SIZE - pad*2 - 10);
    lines.forEach((l, i) => ctx.fillText(l, pad+Math.round(10*R), pad+Math.round(80*R)+i*Math.round(26*R*1.5)));
    ctx.font = 'italic 300 ' + Math.round(9*R) + 'px ' + serifFont;
    ctx.fillStyle = '#888580';
    const blines = wrapText(slide.body || '', SIZE - pad*2 - 10);
    const startY = pad + Math.round(80*R) + lines.length * Math.round(26*R*1.5) + Math.round(10*R);
    blines.forEach((l,i) => ctx.fillText(l, pad+Math.round(10*R), startY+i*Math.round(9*R*1.9)));

  } else if (isDark) {
    ctx.fillStyle = '#1a1a1a'; ctx.fillRect(0,0,SIZE,SIZE);
    // closing 슬라이드도 이미지 있으면 어둡게 깔기
    if (imgDataUrl) await drawBgImage(imgDataUrl, 'dark_full');
    setFont(Math.round(7*R), '400', sansFont);
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillText('SAPMANRI', pad, pad+Math.round(10*R));
    ctx.fillStyle = accent; ctx.fillRect(pad, pad+Math.round(20*R), Math.round(2*R), Math.round(28*R));
    const hlSize = isNike ? Math.round(26*R) : Math.round(20*R);
    setFont(hlSize, headWeight, headFont);
    ctx.fillStyle = '#fff';
    const hl = isNike ? (slide.headline||'').toUpperCase() : (slide.headline||'');
    const lines = wrapText(hl, SIZE - pad*2 - 10);
    const hlY = pad + Math.round(65*R);
    lines.slice(0,2).forEach((l,i) => ctx.fillText(l, pad, hlY+i*Math.round(hlSize*1.25)));
    ctx.font = (style==='theedit'?'400 ':'italic 300 ') + Math.round(9*R) + 'px ' + (style==='theedit'?sansFont:serifFont);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    const startY = hlY + lines.length * Math.round(hlSize*1.25) + Math.round(8*R);
    const blines = wrapText(slide.body||'', SIZE-pad*2);
    blines.forEach((l,i) => ctx.fillText(l, pad, startY+i*Math.round(9*R*1.9)));
    setFont(Math.round(7*R), '400', sansFont);
    ctx.fillStyle = accent;
    ctx.fillText(tag, pad, SIZE-pad);

  } else if (isSplit) {
    const splitY = Math.round(SIZE * 0.56);
    ctx.fillStyle = '#f2f0ec'; ctx.fillRect(0,0,SIZE,SIZE);
    if (imgDataUrl) {
      await new Promise(res => {
        const img = new Image();
        img.onload = () => {
          const scale = Math.max(SIZE/img.width, splitY/img.height);
          const w = img.width*scale, h = img.height*scale;
          ctx.save(); ctx.beginPath(); ctx.rect(0,0,SIZE,splitY); ctx.clip();
          ctx.drawImage(img,(SIZE-w)/2,(splitY-h)/2,w,h);
          ctx.restore(); res();
        };
        img.onerror = res; img.src = imgDataUrl;
      });
    }
    const textY = splitY + Math.round(10*R);
    const labelBaseline = textY + Math.round(9*R);  // 베이스라인 기준 여백 충분히
    setFont(Math.round(7*R), '400', sansFont); ctx.fillStyle = accent;
    ctx.fillText((slide.label||'').toUpperCase(), pad, labelBaseline);
    const hlSize = isNike ? Math.round(18*R) : Math.round(17*R);
    setFont(hlSize, headWeight, headFont);
    ctx.fillStyle = '#1a1a1a';
    const hl = isNike?(slide.headline||'').toUpperCase():(slide.headline||'');
    const lines = wrapText(hl, SIZE-pad*2);
    const hlY = labelBaseline + Math.round(10*R) + hlSize;  // 레이블 베이스라인 + 여백 + 헤드라인 cap-height
    lines.slice(0,2).forEach((l,i) => ctx.fillText(l, pad, hlY+i*Math.round(hlSize*1.3)));
    ctx.font = (style==='theedit'?'400 ':'italic 300 ') + Math.round(9*R) + 'px ' + (style==='theedit'?sansFont:serifFont); ctx.fillStyle = '#888';
    const blines = wrapText(slide.body||'', SIZE-pad*2);
    const by = hlY + Math.min(lines.length,2)*Math.round(hlSize*1.3) + Math.round(6*R);
    blines.forEach((l,i) => ctx.fillText(l, pad, by+i*Math.round(9*R*1.9)));

  } else {
    ctx.fillStyle = '#1a1a1a'; ctx.fillRect(0,0,SIZE,SIZE);
    await drawBgImage(imgDataUrl, slide.layout);

    const isTop = slide.text_position === 'top_left';
    const hlSize = isNike ? Math.round(26*R) : Math.round(22*R);
    const labelFontH = Math.round(7*R);   // 레이블 폰트 높이
    const labelGap  = Math.round(6*R);    // 레이블↔헤드라인 여백
    const hlLineH   = Math.round(hlSize * 1.2);
    const bodyLineH = Math.round(9*R * 1.9);
    const bottomPad = Math.round(16*R);
    // 아래 정렬: 바디2줄 + 헤드라인2줄 + 레이블 + 여백들을 합산해서 레이블 시작점 계산
    const blockH = labelFontH + labelGap + hlLineH*2 + Math.round(6*R) + bodyLineH*2;
    const textY = isTop ? pad + Math.round(16*R) : SIZE - bottomPad - blockH;

    // fillText Y = 베이스라인 기준
    // 레이블 베이스라인 = textY + labelFontH (top에서 폰트 높이만큼 내려야 베이스라인)
    const labelBase = textY + labelFontH;
    if (slide.type === 'cover') {
      setFont(labelFontH, '400', sansFont); ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.fillText('SAPMANRI', pad, pad + labelFontH);
    } else {
      setFont(labelFontH, '400', sansFont); ctx.fillStyle = accent;
      ctx.fillText((slide.label||'').toUpperCase(), pad, labelBase);
    }

    const hlY = slide.type === 'cover'
      ? SIZE - hlLineH*2 - bodyLineH*2 - Math.round(10*R) - bottomPad
      : labelBase + labelGap + hlSize;  // 레이블 베이스라인 + 여백 + 헤드라인 cap-height
    setFont(hlSize, headWeight, headFont);
    ctx.fillStyle = '#fff';
    const hl = isNike?(slide.headline||'').toUpperCase():(slide.headline||'');
    const lines = wrapText(hl, SIZE-pad*2);
    lines.slice(0,2).forEach((l,i) => ctx.fillText(l, pad, hlY+i*Math.round(hlSize*1.2)));
    ctx.font = (style==='theedit'?'400 ':'italic 300 ') + Math.round(9*R) + 'px ' + (style==='theedit'?sansFont:serifFont);
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    const blines = wrapText(slide.body||'', SIZE-pad*2);
    const by = hlY + Math.min(lines.length,2)*Math.round(hlSize*1.2) + Math.round(6*R);
    blines.slice(0,3).forEach((l,i) => ctx.fillText(l, pad, by+i*Math.round(9*R*1.9)));
  }

  // 폴리오
  setFont(Math.round(7*R), '400', sansFont);
  ctx.fillStyle = isDark ? 'rgba(255,255,255,0.18)' : 'rgba(255,255,255,0.3)';
  ctx.textAlign = 'right';
  ctx.fillText(slide.folio || String(idx+1).padStart(2,'0'), SIZE-Math.round(10*R), SIZE-Math.round(8*R));
  ctx.textAlign = 'left';

  return canvas;
}

function toggleCaption() {
  const box = document.getElementById('captionBox');
  box.classList.toggle('open');
  document.getElementById('captionText').textContent = generatedCaption;
}
</script>
</body>
