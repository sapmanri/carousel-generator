<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>감성찾아삽만리 · AI 캐러셀 생성기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1a1a;--canvas:#faf9f7;--paper:#f2f0ec;--paper-warm:#ede9e3;
  --mid:#888580;--mute:#b5b2ad;--hairline:#d8d5d0;
  --accent:#b87a6e;
  --serif:"Cormorant Garamond","Noto Serif KR",Georgia,serif;
  --sans:"Noto Sans KR","Helvetica Neue",Arial,sans-serif;
}
body{background:#1a1a1a;font-family:var(--sans);color:#fff;min-height:100vh;padding:24px 16px}
.app{max-width:960px;margin:0 auto;display:flex;flex-direction:column;gap:16px}

.header{display:flex;justify-content:space-between;align-items:baseline}
.logo{font-family:var(--serif);font-size:18px;font-weight:300;color:var(--canvas);letter-spacing:0.04em}
.logo span{font-family:var(--sans);font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--mute);display:block;margin-top:2px}

/* upload */
.upload-zone{border:1px dashed rgba(255,255,255,0.15);border-radius:4px;padding:28px 24px;text-align:center;cursor:pointer;background:rgba(255,255,255,0.02);position:relative;transition:border-color 0.2s}
.upload-zone:hover,.upload-zone.dragover{border-color:rgba(255,255,255,0.35)}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-icon{font-size:24px;opacity:0.35;margin-bottom:8px}
.upload-label{font-size:12px;color:var(--mute);letter-spacing:0.06em}
.upload-sub{font-size:10px;color:rgba(255,255,255,0.2);margin-top:4px}

/* image grid */
.image-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.img-thumb{aspect-ratio:16/9;border-radius:2px;overflow:hidden;position:relative;background:#111}
.img-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.img-thumb .remove-btn{position:absolute;top:5px;right:5px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,0.7);border:none;color:#fff;font-size:11px;cursor:pointer;opacity:0;transition:opacity 0.15s;display:flex;align-items:center;justify-content:center}
.img-thumb:hover .remove-btn{opacity:1}
.img-thumb .img-num{position:absolute;bottom:5px;left:7px;font-size:8px;color:rgba(255,255,255,0.5);letter-spacing:0.08em}
.img-thumb.analyzing .img-num{color:var(--accent)}
.img-thumb.done .img-num{color:#7ec98a}

/* form */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--mute)}
.field input,.field select,.field textarea{
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
  border-radius:2px;padding:8px 10px;color:#fff;font-family:var(--sans);
  font-size:12px;outline:none;transition:border-color 0.15s;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:rgba(255,255,255,0.3)}
.field textarea{resize:none;height:64px;line-height:1.6}
.field select option{background:#1a1a1a}
.field .hint{font-size:10px;color:rgba(255,255,255,0.2);margin-top:2px}

/* generate btn */
.generate-btn{width:100%;padding:13px;border:none;border-radius:2px;background:var(--canvas);color:var(--ink);font-family:var(--sans);font-size:11px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;transition:opacity 0.15s}
.generate-btn:hover{opacity:0.85}
.generate-btn:disabled{opacity:0.3;cursor:not-allowed}

/* progress */
.progress-area{display:none;padding:14px;background:rgba(255,255,255,0.03);border-radius:2px;border:1px solid rgba(255,255,255,0.07)}
.progress-area.visible{display:block}
.progress-log{font-size:11px;color:var(--mute);line-height:2.2}
.progress-log .step{display:flex;gap:8px;align-items:flex-start}
.step-icon{color:var(--accent);min-width:14px}
.step-icon.done{color:#7ec98a}
@keyframes spin{to{transform:rotate(360deg)}}
.step-icon.spin{animation:spin 1s linear infinite;display:inline-block}

/* carousel */
.carousel-section{display:none}
.carousel-section.visible{display:flex;flex-direction:column;gap:12px}
.section-label{font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--mute)}
.slides-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}

.slide-card{aspect-ratio:1/1;border-radius:2px;overflow:hidden;position:relative;cursor:pointer;border:1px solid rgba(255,255,255,0.08);transition:border-color 0.2s}
.slide-card:hover{border-color:rgba(255,255,255,0.25)}

/* slide canvas base */
.slide-canvas{width:100%;height:100%;position:relative;overflow:hidden;font-family:var(--sans)}
.slide-bg-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center}
.ov-bottom{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,8,6,0.78) 0%,transparent 55%)}
.ov-top{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(10,8,6,0.72) 0%,transparent 50%)}
.ov-left{position:absolute;inset:0;background:linear-gradient(to right,rgba(10,8,6,0.75) 0%,transparent 60%)}
.ov-right{position:absolute;inset:0;background:linear-gradient(to left,rgba(10,8,6,0.75) 0%,transparent 60%)}
.ov-full{position:absolute;inset:0;background:rgba(10,8,6,0.45)}

/* text zones */
.txt-bottom-left{position:absolute;bottom:0;left:0;right:0;padding:12px 14px 16px;z-index:2}
.txt-top-left{position:absolute;top:0;left:0;right:0;padding:14px 14px 0;z-index:2}
.txt-center{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:14px;z-index:2}
.txt-left-half{position:absolute;top:0;left:0;bottom:0;width:55%;padding:14px 12px;display:flex;flex-direction:column;justify-content:flex-end;z-index:2}
.txt-split{position:absolute;bottom:0;left:0;right:0;height:44%;background:var(--canvas);padding:10px 14px 12px;display:flex;flex-direction:column;justify-content:center;z-index:2}
.txt-dark{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:16px;z-index:2;background:var(--ink)}
.txt-pull{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:18px 20px;z-index:2;background:var(--paper)}

/* text styles — mag B */
.s-masthead{font-family:var(--sans);font-size:7px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:8px;display:block}
.s-masthead-dark{font-family:var(--sans);font-size:7px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:12px;display:block}
.s-label{font-family:var(--sans);font-size:7px;letter-spacing:0.16em;text-transform:uppercase;color:var(--accent);margin-bottom:5px;display:block}
.s-label-ink{font-family:var(--sans);font-size:7px;letter-spacing:0.16em;text-transform:uppercase;color:var(--accent);margin-bottom:5px;display:block}
.s-headline-lg{font-family:var(--serif);font-size:28px;font-weight:300;line-height:0.95;letter-spacing:-0.01em;color:#fff;margin-bottom:6px}
.s-headline-md{font-family:var(--serif);font-size:20px;font-weight:300;line-height:1.15;letter-spacing:-0.01em;color:var(--ink);margin-bottom:4px}
.s-headline-pull{font-family:var(--serif);font-size:19px;font-weight:300;line-height:1.3;letter-spacing:-0.005em;color:var(--ink);margin-bottom:8px}
.s-headline-dark{font-family:var(--serif);font-size:24px;font-weight:300;line-height:1.0;letter-spacing:-0.01em;color:#fff;margin-bottom:8px}
.s-body{font-family:var(--serif);font-size:9px;font-style:italic;font-weight:300;line-height:1.65;color:rgba(255,255,255,0.75)}
.s-body-ink{font-family:var(--serif);font-size:9px;font-style:italic;font-weight:300;line-height:1.65;color:var(--mid)}
.s-body-dark{font-family:var(--serif);font-size:9px;font-style:italic;font-weight:300;line-height:1.65;color:rgba(255,255,255,0.5);margin-bottom:14px}
.s-rule{width:2px;height:28px;background:var(--accent);margin-bottom:12px;flex-shrink:0}
.s-closing-tag{font-family:var(--sans);font-size:7px;letter-spacing:0.18em;text-transform:uppercase}
.s-folio{position:absolute;bottom:8px;right:10px;font-family:var(--sans);font-size:7px;letter-spacing:0.12em;color:rgba(255,255,255,0.3);z-index:3}
.s-folio-dark{position:absolute;bottom:8px;right:10px;font-family:var(--sans);font-size:7px;letter-spacing:0.12em;color:rgba(255,255,255,0.18);z-index:3}
.s-folio-ink{position:absolute;bottom:8px;right:10px;font-family:var(--sans);font-size:7px;letter-spacing:0.12em;color:var(--mute);z-index:3}

/* nike overrides */
.nike-headline{font-family:"Helvetica Neue",Arial,sans-serif;font-size:30px;font-weight:700;line-height:0.9;text-transform:uppercase;letter-spacing:-0.01em;color:#fff;margin-bottom:6px}
.nike-headline-md{font-family:"Helvetica Neue",Arial,sans-serif;font-size:20px;font-weight:700;line-height:1.0;text-transform:uppercase;color:#fff;margin-bottom:4px}
.nike-label{font-family:"Helvetica Neue",Arial,sans-serif;font-size:7px;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.55);margin-bottom:5px;display:block}
.nike-closing{position:absolute;inset:0;background:#111;display:flex;flex-direction:column;justify-content:center;padding:16px}
.nike-closing-hl{font-family:"Helvetica Neue",Arial,sans-serif;font-size:32px;font-weight:700;line-height:0.88;text-transform:uppercase;color:#fff;margin-bottom:10px}

/* ohouse */
:root{--oh:#00C896;--oh-pale:#E6FAF4;--oh-cream:#FAFAF8;--oh-warm:#F5F3EF}
.oh-canvas{width:100%;height:100%;position:relative;overflow:hidden;background:var(--oh-cream);font-family:var(--sans)}
.oh-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center}
.oh-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.58) 0%,transparent 52%)}
.oh-card{position:absolute;bottom:0;left:0;right:0;background:var(--oh-cream);border-radius:14px 14px 0 0;padding:10px 14px 14px}
.oh-split{position:absolute;bottom:0;left:0;right:0;height:43%;background:var(--oh-cream);padding:8px 14px 12px;display:flex;flex-direction:column;justify-content:center}
.oh-close{position:absolute;inset:0;background:var(--oh-pale);display:flex;flex-direction:column;justify-content:center;align-items:center;padding:14px}
.oh-full{position:absolute;inset:0;background:var(--oh-warm);display:flex;flex-direction:column;justify-content:center;align-items:center;padding:16px}
.oh-tag{display:inline-block;background:var(--oh);color:#fff;font-size:7px;font-weight:600;letter-spacing:0.04em;padding:3px 8px;border-radius:9999px;margin-bottom:6px}
.oh-masthead{position:absolute;top:10px;left:12px;z-index:3;font-size:7px;font-weight:500;letter-spacing:0.12em;color:rgba(255,255,255,0.6)}
.oh-masthead-brand{font-size:7px;font-weight:600;letter-spacing:0.12em;color:var(--oh);margin-bottom:10px}
.oh-headline-cover{font-size:20px;font-weight:600;line-height:1.2;letter-spacing:-0.02em;color:#fff;margin-bottom:4px}
.oh-headline{font-size:16px;font-weight:600;line-height:1.25;letter-spacing:-0.02em;color:var(--ink);margin-bottom:3px}
.oh-headline-c{font-size:18px;font-weight:600;line-height:1.3;letter-spacing:-0.02em;color:var(--ink);margin-bottom:8px;text-align:center}
.oh-body{font-size:9px;font-weight:400;line-height:1.6;color:#888}
.oh-body-c{font-size:9px;font-weight:400;line-height:1.6;color:#888;text-align:center;margin-bottom:10px}
.oh-cta{display:inline-block;background:var(--oh);color:#fff;font-size:8px;font-weight:600;padding:6px 14px;border-radius:9999px;margin-top:4px}
.oh-line{width:100%;height:2px;background:var(--oh);position:absolute;bottom:0;left:0}
.oh-folio{position:absolute;bottom:8px;right:10px;font-size:7px;color:var(--mute);z-index:3}
.oh-num{width:18px;height:18px;border-radius:50%;background:var(--oh);color:#fff;font-size:7px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-bottom:8px}

/* export / caption */
.action-row{display:flex;gap:8px}
.action-btn{flex:1;padding:11px;border-radius:2px;font-family:var(--sans);font-size:10px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;transition:opacity 0.15s;border:none}
.action-btn:hover{opacity:0.8}
.btn-primary{background:var(--canvas);color:var(--ink)}
.btn-secondary{background:transparent;color:var(--mute);border:1px solid rgba(255,255,255,0.12)!important}
.caption-box{display:none;padding:14px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:2px}
.caption-box.open{display:block}
.caption-title{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--mute);margin-bottom:8px}
.caption-text{font-family:var(--serif);font-size:13px;font-style:italic;line-height:1.85;color:rgba(255,255,255,0.7);white-space:pre-wrap}
.caption-hint{font-size:9px;color:rgba(255,255,255,0.2);margin-top:8px;letter-spacing:0.06em;text-transform:uppercase}

/* ── 모바일 반응형 ── */
@media (max-width: 600px) {
  body{padding:16px 12px}
  .form-grid{grid-template-columns:1fr}
  .image-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr))}
  .slides-row{grid-template-columns:repeat(2,1fr);gap:8px}
  .action-row{flex-direction:column}
  .action-btn{width:100%}
  .header{flex-direction:column;gap:4px}
}

/* ── 디에디트 스타일 ── */
:root{--te-black:#111;--te-white:#fff;--te-gray:#f5f5f5;--te-mid:#888;--te-accent:#ff3c00}
.te-canvas{width:100%;height:100%;position:relative;overflow:hidden;font-family:"Helvetica Neue",Arial,var(--sans);background:var(--te-white)}
.te-masthead{font-size:7px;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;color:var(--te-black);display:block;margin-bottom:10px}
.te-label{font-size:7px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--te-accent);display:block;margin-bottom:6px}
.te-headline{font-size:26px;font-weight:700;line-height:1.0;letter-spacing:-0.02em;color:var(--te-black);margin-bottom:6px}
.te-headline-sm{font-size:18px;font-weight:700;line-height:1.1;letter-spacing:-0.02em;color:var(--te-black);margin-bottom:5px}
.te-body{font-size:9px;font-weight:400;line-height:1.65;color:#555}
.te-body-white{font-size:9px;font-weight:400;line-height:1.65;color:rgba(255,255,255,0.8)}
.te-rule{width:24px;height:3px;background:var(--te-accent);margin-bottom:10px}
.te-folio{position:absolute;bottom:8px;right:10px;font-size:7px;font-weight:500;letter-spacing:0.1em;color:#bbb;z-index:3}
.te-folio-dark{position:absolute;bottom:8px;right:10px;font-size:7px;font-weight:500;letter-spacing:0.1em;color:rgba(255,255,255,0.3);z-index:3}
.te-txt-bottom{position:absolute;bottom:0;left:0;right:0;padding:14px 14px 18px;z-index:2}
.te-txt-white{position:absolute;bottom:0;left:0;right:0;padding:14px 14px 18px;z-index:2;background:linear-gradient(to top,rgba(0,0,0,0.7) 0%,transparent 100%)}
.te-txt-box{position:absolute;bottom:16px;left:14px;right:14px;background:var(--te-white);padding:12px 14px;z-index:2}
.te-txt-center{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:18px;z-index:2;background:var(--te-gray)}
.te-closing{position:absolute;inset:0;background:var(--te-black);display:flex;flex-direction:column;justify-content:center;padding:18px}

/* ── 스테이폴리오 스타일 ── */
:root{--sf-cream:#f7f4ef;--sf-dark:#1c1917;--sf-mid:#7a7570;--sf-accent:#8c7355;--sf-line:#d4cfc8}
.sf-canvas{width:100%;height:100%;position:relative;overflow:hidden;font-family:var(--serif);background:var(--sf-cream)}
.sf-masthead{font-family:var(--sans);font-size:6px;font-weight:400;letter-spacing:0.28em;text-transform:uppercase;color:var(--sf-mid);display:block;margin-bottom:12px}
.sf-label{font-family:var(--sans);font-size:6px;font-weight:400;letter-spacing:0.2em;text-transform:uppercase;color:var(--sf-accent);display:block;margin-bottom:8px}
.sf-headline{font-size:24px;font-weight:300;line-height:1.15;letter-spacing:-0.005em;color:var(--sf-dark);margin-bottom:8px}
.sf-headline-lg{font-size:28px;font-weight:300;line-height:1.1;letter-spacing:-0.01em;color:#fff;margin-bottom:8px}
.sf-headline-sm{font-size:18px;font-weight:300;line-height:1.2;color:var(--sf-dark);margin-bottom:6px}
.sf-body{font-size:8px;font-style:italic;font-weight:300;line-height:1.75;color:var(--sf-mid)}
.sf-body-white{font-size:8px;font-style:italic;font-weight:300;line-height:1.75;color:rgba(255,255,255,0.7)}
.sf-rule{width:100%;height:1px;background:var(--sf-line);margin-bottom:12px}
.sf-folio{position:absolute;bottom:10px;right:12px;font-family:var(--sans);font-size:6px;letter-spacing:0.14em;color:var(--sf-line);z-index:3}
.sf-folio-dark{position:absolute;bottom:10px;right:12px;font-family:var(--sans);font-size:6px;letter-spacing:0.14em;color:rgba(255,255,255,0.2);z-index:3}
.sf-folio-ink{position:absolute;bottom:10px;right:12px;font-family:var(--sans);font-size:6px;letter-spacing:0.14em;color:var(--sf-mid);z-index:3}
.sf-txt-bottom{position:absolute;bottom:0;left:0;right:0;padding:16px 16px 20px;z-index:2}
.sf-txt-split{position:absolute;bottom:0;left:0;right:0;height:42%;background:var(--sf-cream);padding:12px 16px;display:flex;flex-direction:column;justify-content:center;z-index:2}
.sf-txt-center{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:20px;z-index:2;background:var(--sf-cream)}
.sf-closing{position:absolute;inset:0;background:var(--sf-dark);display:flex;flex-direction:column;justify-content:center;padding:20px}

/* ── 감성찾아삽만리 스타일 ── */
:root{--sm-purple:rgba(190,170,255,0.9);--sm-purpleglow:rgba(140,100,255,0.35)}
.sm-canvas{width:100%;height:100%;position:relative;overflow:hidden;background:#0e0e0e;font-family:"Helvetica Neue",Arial,var(--sans)}
.sm-overlay-top{position:absolute;top:0;left:0;right:0;height:38%;background:linear-gradient(to bottom,rgba(0,0,0,0.3),transparent);z-index:1}
.sm-overlay-bottom{position:absolute;bottom:0;left:0;right:0;height:58%;background:linear-gradient(to top,rgba(0,0,0,0.97) 0%,rgba(0,0,0,0.78) 48%,transparent 100%);z-index:1}
.sm-txt{position:absolute;bottom:0;left:0;right:0;padding:14px 14px 20px;z-index:2}
.sm-title{font-size:22px;font-weight:700;line-height:1.05;color:rgba(255,255,255,0.97);letter-spacing:-0.01em;margin-bottom:4px}
.sm-sub{font-size:9px;font-weight:400;color:rgba(255,255,255,0.45);margin-bottom:8px;letter-spacing:0.06em}
.sm-rule{width:18%;height:1px;background:rgba(255,255,255,0.12);margin-bottom:8px}
.sm-body{font-size:8px;font-weight:300;color:rgba(255,255,255,0.5);line-height:1.7;letter-spacing:0.03em}
.sm-body2{font-size:9px;font-weight:500;color:rgba(255,255,255,0.9);line-height:1.6}
.sm-folio{position:absolute;bottom:8px;right:10px;font-size:7px;letter-spacing:0.1em;color:rgba(255,255,255,0.15);z-index:3}
.sm-closing{position:absolute;inset:0;background:#0e0e0e;display:flex;flex-direction:column;justify-content:center;padding:18px;z-index:2}

/* ── Apple MD 스타일 ── */
.amd-canvas{width:100%;height:100%;position:relative;overflow:hidden;background:#000;font-family:"Helvetica Neue","Noto Sans KR",Arial,sans-serif}
.amd-vignette{position:absolute;top:0;left:0;right:0;height:55%;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,0.22) 100%);z-index:1}

/* ── 전원생활 매거진 스타일 ── */

.jw-wordmark-sub{font-family:var(--sans);font-size:6px;font-weight:300;letter-spacing:0.18em;color:#999;text-align:center;margin-top:3px}

.jw-mini-page{position:absolute;top:10px;right:12px;font-family:var(--sans);font-size:7px;letter-spacing:0.08em;color:rgba(255,255,255,0.6);z-index:3}

.jw-label{display:inline-block;font-family:var(--sans);font-size:7px;font-weight:600;letter-spacing:0.1em;color:#fff;background:var(--jw-orange);padding:2px 7px;margin-bottom:6px}
.jw-label-ink{display:inline-block;font-family:var(--sans);font-size:7px;font-weight:600;letter-spacing:0.1em;color:var(--jw-orange);margin-bottom:6px}
.jw-headline{font-family:"Gowun Batang","Noto Serif KR",serif;font-weight:700;font-size:20px;line-height:1.25;letter-spacing:0.01em;color:var(--jw-dark)}
.jw-headline-white{font-family:"Gowun Batang","Noto Serif KR",serif;font-weight:700;font-size:20px;line-height:1.25;letter-spacing:0.01em;color:#fff}
.jw-headline-lg{font-family:"Gowun Batang","Noto Serif KR",serif;font-weight:700;font-size:15px;line-height:1.35;letter-spacing:0.02em;color:#fff}
.jw-body{font-family:var(--sans);font-size:8px;font-weight:300;line-height:1.7;color:#666}
.jw-body-white{font-family:var(--sans);font-size:8px;font-weight:300;line-height:1.7;color:rgba(255,255,255,0.75)}
.jw-caption{font-family:"Gowun Batang","Noto Serif KR",serif;font-weight:400;font-size:14px;line-height:1.5;color:#fff}

/* 표지 */
.jw-cover-top{position:absolute;top:0;left:0;right:0;padding:12px 0;z-index:2;background:linear-gradient(to bottom,rgba(250,245,238,0.95) 0%,rgba(250,245,238,0.7) 70%,transparent 100%)}
.jw-cover-feature{position:absolute;top:18%;left:14px;right:14px;z-index:2}
.jw-cover-bottom{position:absolute;bottom:0;left:0;right:0;padding:10px 14px;z-index:2;display:flex;justify-content:space-between;align-items:flex-end;background:linear-gradient(to top,rgba(250,245,238,0.97) 0%,rgba(250,245,238,0.75) 60%,transparent 100%)}
.jw-issue-num{font-family:var(--sans);font-weight:700;font-size:16px;color:var(--jw-dark);line-height:1}
.jw-issue-sub{font-family:var(--sans);font-size:7px;color:#999;letter-spacing:0.05em;margin-top:2px}
.jw-article-list{font-family:"Gowun Batang","Noto Serif KR",serif;font-size:8px;line-height:1.9;color:#444;text-align:right}

/* 풀블리드 화보 */
.jw-fullbleed-overlay{position:absolute;bottom:0;left:0;right:0;height:38%;background:linear-gradient(to top,rgba(18,14,12,0.85) 0%,transparent 100%);z-index:1}
.jw-fullbleed-caption{position:absolute;bottom:16px;left:14px;right:14px;z-index:2}

/* 인용/하이라이트 */
.jw-quote-canvas{width:100%;height:100%;position:relative;overflow:hidden;background:var(--jw-dark);display:flex;flex-direction:column;justify-content:center;align-items:center;padding:24px;text-align:center}
.jw-quote-rule{width:24px;height:2px;background:var(--jw-orange)}
.jw-quote-text{font-family:"Gowun Batang","Noto Serif KR",serif;font-weight:700;font-size:20px;line-height:1.5;color:#fff;margin:14px 0}

/* 클로징 */

/* 인덱스/목차 */

.jw-index-label{font-family:var(--sans);font-size:7px;letter-spacing:0.2em;text-transform:uppercase;color:var(--jw-orange);margin-bottom:4px}

/* 2단 사진+텍스트 */

.jw-grid-wrap{flex:1;display:grid;gap:6px}
.jw-grid-wrap.g2x2{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
.jw-grid-wrap.g1p2{grid-template-columns:1.4fr 1fr;grid-template-rows:1fr 1fr}
.jw-grid-cell{position:relative;overflow:hidden;background:#ddd}
.jw-grid-big{grid-row:1 / 3}
</style>

</head>
<body>
<div class="app">

<div class="header">
  <div class="logo">감성찾아삽만리<span>AI Carousel Generator v1.6.1</span></div>
  <div style="display:flex;align-items:center;gap:8px">
    <input type="password" id="apiKeyInput" placeholder="sk-ant-..." 
      style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:2px;padding:6px 10px;color:#fff;font-family:sans-serif;font-size:11px;outline:none;width:200px"
      oninput="saveApiKey(this.value)" />
    <span id="apiKeyStatus" style="font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--mute)">KEY</span>
  </div>
</div>

<div class="upload-zone" id="uploadZone">
  <input type="file" id="fileInput" accept="image/*" multiple />
  <div class="upload-icon">⬆</div>
  <div class="upload-label">이미지를 끌어다 놓거나 클릭해서 업로드</div>
  <div class="upload-sub">JPG · PNG · 최대 10장</div>
</div>

<div class="image-grid" id="imageGrid"></div>

<div class="field" style="margin-bottom:4px">
  <label>유튜브 URL <span style="font-size:8px;color:var(--accent);letter-spacing:0.06em;text-transform:none;font-weight:normal">선택 — 넣으면 영상 분석으로 주제/문구 자동 완성</span></label>
  <div style="display:flex;gap:8px">
    <input type="text" id="youtubeUrl" placeholder="https://www.youtube.com/watch?v=..."
      style="flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:2px;padding:8px 10px;color:#fff;font-family:var(--sans);font-size:12px;outline:none" />
    <button id="fetchTranscriptBtn" onclick="fetchAndFillFromYoutube()"
      style="padding:8px 14px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:2px;color:rgba(255,255,255,0.7);font-family:var(--sans);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;white-space:nowrap">분석</button>
  </div>
  <span id="transcriptStatus" style="font-size:10px;color:var(--mute);margin-top:3px;display:block"></span>
</div>

<div class="form-grid">
  <div class="field">
    <label>영상 주제</label>
    <input type="text" id="metaTopic" placeholder="예: 오디 수확과 장미 만개한 6월" />
    <span class="hint">비워두면 AI가 이미지 보고 판단해요</span>
  </div>
  <div class="field">
    <label>스타일</label>
    <select id="metaStyle">
      <option value="magazine-b">Magazine B (에디토리얼)</option>
      <option value="theedit">디에디트 (큐레이션 매거진)</option>
      <option value="stayfolio">스테이폴리오 (파인스테이)</option>
      <option value="nike">Nike (강렬 · 대문자)</option>
      <option value="ohouse">오늘의집 (따뜻한 라이프스타일)</option>
      <option value="sapmanri">감성찾아삽만리 (다크 · 감성)</option>
      <option value="applemd">Apple (미니멀 · 여백)</option>
      <option value="jeonwon">전원생활 (매거진 표지·내지)</option>
    </select>
  </div>
  <div class="field">
    <label>채널 태그</label>
    <input type="text" id="metaTag" value="오늘도 느리게 · slow days" />
  </div>
  <div class="field">
    <label>마무리 문구</label>
    <input type="text" id="metaClosing" value="매주 토요일 정오, 유튜브에서 만나요" />
  </div>
  <div class="field" style="grid-column:1/-1">
    <label>텍스트 슬라이드 문구 (선택)</label>
    <textarea id="metaTextSlide" placeholder="직접 쓴 문장을 넣으면 캐러셀 중간에 텍스트 슬라이드로 들어가요. 비워두면 AI가 필요할 때 자동으로 만들어요."></textarea>
  </div>
</div>

<div style="display:flex;align-items:center;gap:10px;padding:4px 0 6px">
  <span style="font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--mute)">텍스트 언어</span>
  <div style="display:flex;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:2px;overflow:hidden">
    <button id="langKo" onclick="setLang('ko')" style="padding:5px 14px;font-size:10px;letter-spacing:0.06em;border:none;cursor:pointer;font-family:var(--sans);background:rgba(255,255,255,0.15);color:#fff">한국어</button>
    <button id="langEn" onclick="setLang('en')" style="padding:5px 14px;font-size:10px;letter-spacing:0.06em;border:none;cursor:pointer;font-family:var(--sans);background:transparent;color:rgba(255,255,255,0.35)">English</button>
  </div>
</div>

<div style="display:flex;align-items:center;gap:10px;padding:4px 0 8px">
  <label style="display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none">
    <input type="checkbox" id="infographicMode"
      style="width:14px;height:14px;accent-color:var(--accent);cursor:pointer">
    <span style="font-size:10px;letter-spacing:0.08em;color:var(--mute)">인포그래픽 모드 <span style="color:rgba(255,255,255,0.2)">— 적합한 이미지에 레이블·화살표 자동 생성</span></span>
  </label>
</div>

<button class="generate-btn" id="generateBtn" disabled>AI 분석 후 캐러셀 생성</button>

<div class="progress-area" id="progressArea">
  <div class="progress-log" id="progressLog"></div>
</div>

<div class="carousel-section" id="carouselSection">
  <div class="section-label">생성된 캐러셀</div>
  <div class="slides-row" id="slidesRow"></div>
  <div style="display:flex;align-items:center;gap:12px;padding:10px 0 4px">
    <span style="font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--mute);white-space:nowrap">PNG 텍스트 크기</span>
    <input type="range" id="textScaleSlider" min="0.5" max="1.5" step="0.05" value="1.0"
      style="flex:1;accent-color:var(--accent);cursor:pointer"
      oninput="updateTextScale(this.value)">
    <span id="textScaleVal" style="font-size:10px;color:var(--canvas);min-width:32px;text-align:right">1.0×</span>
  </div>
  <div class="action-row">
    <button class="action-btn btn-primary" onclick="exportSlides()">PNG 저장</button>
    <button class="action-btn btn-secondary" onclick="toggleCaption()">인스타 캡션</button>
  </div>
  <div class="caption-box" id="captionBox">
    <div class="caption-title">Instagram Caption</div>
    <div class="caption-text" id="captionText"></div>
    <div class="caption-hint">텍스트 선택 후 복사하세요</div>
  </div>
</div>

<!-- iOS PNG 저장 모달 -->
<div id="iosModal" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.92);flex-direction:column;align-items:center;justify-content:center;padding:16px">
  <div style="width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center;gap:14px">
    <div style="display:flex;justify-content:space-between;align-items:center;width:100%">
      <span id="iosModalCount" style="font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.4)"></span>
      <button onclick="closeIosModal()" style="background:none;border:none;color:rgba(255,255,255,0.4);font-size:18px;cursor:pointer;padding:4px 8px">✕</button>
    </div>
    <img id="iosModalImg" style="width:100%;max-width:420px;aspect-ratio:1/1;object-fit:contain;border-radius:4px" />
    <p style="font-size:11px;color:rgba(255,255,255,0.45);text-align:center;line-height:1.7;letter-spacing:0.04em">
      이미지를 <strong style="color:rgba(255,255,255,0.75)">길게 눌러</strong> 사진 앱에 저장하세요
    </p>
    <div style="display:flex;gap:10px;width:100%">
      <button id="iosPrevBtn" onclick="iosModalPrev()" style="flex:1;padding:12px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:2px;color:rgba(255,255,255,0.6);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer">◀ 이전</button>
      <button id="iosNextBtn" onclick="iosModalNext()" style="flex:1;padding:12px;background:rgba(255,255,255,0.9);border:none;border-radius:2px;color:#1a1a1a;font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer">다음 ▶</button>
    </div>
  </div>
</div>

</div>
<script>
// ── API Key ──
function saveApiKey(val) {
  try { localStorage.setItem('anthropic_key', val); } catch(e) {}
  const status = document.getElementById('apiKeyStatus');
  if (status) status.style.color = val.startsWith('sk-ant-') ? '#7ec98a' : 'var(--mute)';
}
function getApiKey() {
  try { return localStorage.getItem('anthropic_key') || ''; } catch(e) { return ''; }
}
// 페이지 로드 시 저장된 키 복원
window.addEventListener('load', () => {
  const saved = getApiKey();
  const input = document.getElementById('apiKeyInput');
  if (saved && input) {
    input.value = saved;
    const status = document.getElementById('apiKeyStatus');
    if (status) status.style.color = '#7ec98a';
  }
  // 텍스트 스케일 복원
  try {
    const savedScale = localStorage.getItem('png_text_scale');
    if (savedScale) {
      textScale = parseFloat(savedScale);
      const slider = document.getElementById('textScaleSlider');
      const label = document.getElementById('textScaleVal');
      if (slider) slider.value = textScale;
      if (label) label.textContent = textScale.toFixed(2) + '×';
    }
  } catch(e) {}
});

function updateTextScale(val) {
  textScale = parseFloat(val);
  document.getElementById('textScaleVal').textContent = textScale.toFixed(2) + '×';
  try { localStorage.setItem('png_text_scale', textScale); } catch(e) {}
}

let images = [];
let generatedSlides = [];
let generatedCaption = '';
let textScale = 1.0;
let textLang = 'ko';
function setLang(lang) {
  textLang = lang;
  const ko = document.getElementById('langKo');
  const en = document.getElementById('langEn');
  if (!ko || !en) return;
  ko.style.background = lang === 'ko' ? 'rgba(255,255,255,0.15)' : 'transparent';
  ko.style.color       = lang === 'ko' ? '#fff' : 'rgba(255,255,255,0.35)';
  en.style.background  = lang === 'en' ? 'rgba(255,255,255,0.15)' : 'transparent';
  en.style.color       = lang === 'en' ? '#fff' : 'rgba(255,255,255,0.35)';
}

// ── upload ──
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', e => handleFiles(e.target.files));

function handleFiles(files) {
  Array.from(files).slice(0, 10 - images.length).forEach(file => {
    const objectUrl = URL.createObjectURL(file);
    const reader = new FileReader();
    reader.onload = ev => {
      images.push({ file, dataUrl: ev.target.result, objectUrl, analysis: null });
      renderThumbs(); updateBtn();
    };
    reader.readAsDataURL(file);
  });
}
function removeImg(i) {
  if (images[i]?.objectUrl) URL.revokeObjectURL(images[i].objectUrl);
  images.splice(i, 1); renderThumbs(); updateBtn();
}
function renderThumbs() {
  document.getElementById('imageGrid').innerHTML = images.map((img, i) => `
    <div class="img-thumb" id="thumb-${i}">
      <img src="${img.dataUrl}" />
      <button class="remove-btn" onclick="removeImg(${i})">✕</button>
      <div class="img-num">${i+1} / ${images.length}</div>
    </div>`).join('');
}
function updateBtn() { document.getElementById('generateBtn').disabled = images.length === 0; }

// ── progress ──
function log(text, done=false) {
  const id = 'step-' + Date.now() + Math.random();
  document.getElementById('progressLog').innerHTML +=
    `<div class="step" id="${id}"><span class="step-icon ${done?'done':'spin'}">${done?'✓':'◌'}</span><span>${text}</span></div>`;
  return id;
}
function doneStep(id) {
  const el = document.getElementById(id);
  if (el) { const ic = el.querySelector('.step-icon'); ic.className='step-icon done'; ic.textContent='✓'; }
}

// ── generate ──
document.getElementById('generateBtn').addEventListener('click', async () => {
  if (!images.length) return;
  document.getElementById('progressArea').classList.add('visible');
  document.getElementById('carouselSection').classList.remove('visible');
  document.getElementById('progressLog').innerHTML = '';
  document.getElementById('generateBtn').disabled = true;

  const style = document.getElementById('metaStyle').value;
  const topic = document.getElementById('metaTopic').value || '';
  const tag = document.getElementById('metaTag').value;
  const closing = document.getElementById('metaClosing').value;
  const manualText = document.getElementById('metaTextSlide').value.trim();
  const infographicMode = document.getElementById('infographicMode').checked;

  const needsAnalysis = images.some(img => !img.analysis);
  if (needsAnalysis) {
    const s1 = log(`이미지 ${images.length}장 분석 중...`);
    for (let i = 0; i < images.length; i++) {
      if (images[i].analysis) continue; // 이미 분석된 이미지는 스킵
      const thumb = document.getElementById(`thumb-${i}`);
      if (thumb) thumb.classList.add('analyzing');
      try { images[i].analysis = await analyzeImage(images[i].dataUrl, topic, style); }
      catch(e) { images[i].analysis = { subject_position:'center', best_text_position:'bottom_left', text_color:'white', suggested_copy:'감성의 순간', suggested_body:'오늘도 천천히.', overall_brightness:'mid', dominant_color:'#b87a6e', mood:'고요함' }; }
      if (thumb) { thumb.classList.remove('analyzing'); thumb.classList.add('done'); thumb.querySelector('.img-num').textContent = '✓'; }
    }
    doneStep(s1);
  } else {
    log('이미지 분석 완료 (캐시)', true);
  }

  const s2 = log('슬라이드 계획 중...');
  let plan;
  try { plan = await generatePlan(images, topic, tag, closing, style, manualText, infographicMode, textLang); doneStep(s2); }
  catch(e) { doneStep(s2); log('플랜 생성 실패: ' + e.message, true); document.getElementById('generateBtn').disabled=false; return; }

  const s3 = log('렌더링 중...');
  try {
    if (!plan || !plan.slides || !Array.isArray(plan.slides)) {
      throw new Error('슬라이드 데이터가 없어요. plan: ' + JSON.stringify(plan).slice(0,100));
    }
    generatedSlides = plan.slides;
    generatedCaption = plan.caption || '';
    renderCarousel(plan.slides);
    doneStep(s3);
    log('완성!', true);
    document.getElementById('carouselSection').classList.add('visible');
  } catch(e) {
    doneStep(s3);
    log('렌더링 실패: ' + e.message, true);
  }
  document.getElementById('generateBtn').disabled = false;
});


// ── YouTube 트랜스크립트 분석 ──
function extractVideoId(url) {
  const match = url.match(/(?:v=|youtu\.be\/|shorts\/)([\w-]{11})/);
  return match ? match[1] : null;
}

async function fetchAndFillFromYoutube() {
  const url = document.getElementById('youtubeUrl').value.trim();
  if (!url) return;
  const videoId = extractVideoId(url);
  if (!videoId) {
    document.getElementById('transcriptStatus').textContent = '❌ 유효한 유튜브 URL이 아니에요';
    return;
  }

  const btn = document.getElementById('fetchTranscriptBtn');
  const status = document.getElementById('transcriptStatus');
  btn.disabled = true;
  btn.textContent = '분석 중...';
  status.textContent = '영상 내용 분석 중...';
  status.style.color = 'var(--mute)';

  try {
    // 1단계: oEmbed로 영상 제목 취득
    status.textContent = '영상 정보 가져오는 중...';
    let videoTitle = '';
    try {
      const oembedRes = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`);
      if (oembedRes.ok) { const d = await oembedRes.json(); videoTitle = d.title || ''; }
    } catch(e) {}
    if (!videoTitle) throw new Error('영상 정보를 가져오지 못했어요. URL을 확인해주세요.');
    status.textContent = `"${videoTitle}" — 자막 가져오는 중...`;

    // 2단계: YouTube 자막 가져오기 (CORS 프록시 경유)
    let transcript = '';
    try {
      const proxyBase = 'https://corsproxy.io/?url=';
      const ytPageRes = await fetch(proxyBase + encodeURIComponent(`https://www.youtube.com/watch?v=${videoId}`));
      if (ytPageRes.ok) {
        const html = await ytPageRes.text();
        // 한국어 자막 우선, 없으면 첫 번째 자막 URL 추출
        let captionUrl = '';
        const koMatch = html.match(/"baseUrl":"(https:[^"]+timedtext[^"]+)"[^}]{0,200}"languageCode":"ko"/);
        if (koMatch) {
          captionUrl = koMatch[1].replace(/\u0026/g, '&');
        } else {
          const anyMatch = html.match(/"captionTracks":\[{"baseUrl":"([^"]+)"/);
          if (anyMatch) captionUrl = anyMatch[1].replace(/\u0026/g, '&');
        }
        if (captionUrl) {
          const captionRes = await fetch(proxyBase + encodeURIComponent(captionUrl + '&fmt=json3'));
          if (captionRes.ok) {
            const captionData = await captionRes.json();
            transcript = (captionData.events || [])
              .slice(0, 180)
              .map(e => (e.segs || []).map(s => s.utf8 || '').join(''))
              .filter(t => t.trim() && t !== '\n')
              .join(' ')
              .slice(0, 1200);
          }
        }
      }
    } catch(e) { console.warn('자막 오류:', e.message); }

    status.textContent = transcript
      ? `자막 ${transcript.length}자 — 분석 중...`
      : `자막 없음 — 제목으로 분석 중...`;

    // 3단계: 제목 + 자막으로 Haiku 분석
    const contextText = transcript
      ? `영상 제목: "${videoTitle}"
자막 내용(일부): ${transcript}`
      : `영상 제목: "${videoTitle}"`;

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true',
        'x-api-key': getApiKey(),
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 250,
        messages: [{
          role: 'user',
          content: `${contextText}

이 영상 내용을 바탕으로 아래 JSON만 반환해. 다른 텍스트 없이.
{"topic":"핵심 주제 15자 이내 한국어","text_slide":"인스타 감성 한 문장 20-30자 한국어","mood":"분위기 한 단어"}`
        }]
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const raw = data.content?.find(b => b.type === 'text')?.text || '';
    const s = raw.indexOf('{'), e = raw.lastIndexOf('}');
    if (s === -1) throw new Error('응답에서 JSON을 찾지 못했어요');
    const result = JSON.parse(raw.slice(s, e + 1));

    // 폼에 자동 채우기
    if (result.topic) {
      document.getElementById('metaTopic').value = result.topic;
    }
    if (result.text_slide) {
      document.getElementById('metaTextSlide').value = result.text_slide;
    }

    status.textContent = '✓ 완성! 주제와 텍스트 슬라이드 문구가 채워졌어요';
    status.style.color = '#7ec98a';

  } catch(e) {
    status.textContent = '❌ 오류: ' + e.message;
    status.style.color = '#e07070';
  }

  btn.disabled = false;
  btn.textContent = '분석';
}

// ── Claude API: analyze image ──
async function analyzeImage(dataUrl, topic, style) {
  const base64 = dataUrl.split(',')[1];
  const mediaType = dataUrl.match(/data:(image\/\w+)/)[1];
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST', headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true','x-api-key':getApiKey(),'anthropic-version':'2023-06-01'},
    body: JSON.stringify({
      model:'claude-sonnet-4-5', max_tokens:600,
      messages:[{ role:'user', content:[
        { type:'image', source:{ type:'base64', media_type:mediaType, data:base64 }},
        { type:'text', text:`이 이미지를 분석해서 Instagram 캐러셀 슬라이드 레이아웃에 필요한 정보를 JSON으로만 반환해줘. 다른 텍스트 없이 JSON만.
{"subject_position":"left|center|right|top|bottom|full","bright_zone":"top|bottom|left|right|center","dark_zone":"top|bottom|left|right|none","overall_brightness":"dark|mid|bright","dominant_color":"#hex","mood":"한 단어 한국어","suggested_copy":"2~4단어 한국어 헤드라인","suggested_body":"감성적 한국어 본문 1~2문장 (주제: ${topic})","best_text_position":"bottom_left|bottom_right|top_left|center_left|center|split_bottom","text_color":"white|dark"}`}
      ]}]
    })
  });
  const data = await res.json();
  const text = data.content?.find(b=>b.type==='text')?.text || '{}';
  const s=text.indexOf('{'), e=text.lastIndexOf('}');
  return JSON.parse(text.slice(s,e+1));
}

  const s=raw.indexOf('{'), e=raw.lastIndexOf('}');
  if(s===-1||e===-1) throw new Error('JSON 없음: '+raw.slice(0,120));
  let jsonStr = raw.slice(s,e+1);

// ── render ──
function renderCarousel(slides) {
  document.getElementById('slidesRow').innerHTML = slides.map((s,i) => renderSlide(s,i)).join('');
}

function renderSlide(slide, i) {
  const style = document.getElementById('metaStyle').value;
  // image_index 범위 초과 방어
  const imgObj = (slide.image_index != null && slide.image_index < images.length) ? images[slide.image_index] : null;
  const img = imgObj ? imgObj.dataUrl : null;
  const folio = slide.folio || `0${i+1} — 0${generatedSlides.length}`;
  const accent = slide.accent_color || '#b87a6e';
  const tag = document.getElementById('metaTag').value;

  if (slide.layout === 'pull_quote' || slide.type === 'pull_quote') return renderPullQuote(slide, i, style, accent, folio);
  if (slide.type === 'infographic') return renderInfographic(slide, i, img, folio, accent);
  if (style === 'ohouse') return renderOhouse(slide, i, img, folio, tag);
  if (style === 'theedit') return renderTheEdit(slide, i, img, folio, accent, tag);
  if (style === 'sapmanri') return renderSapmanriStyle(slide, i, img, folio, accent, tag);
  if (style === 'applemd') return renderAppleMD(slide, i, img, folio, accent, tag);
  if (style === 'jeonwon') return renderJeonwon(slide, i, img, folio, accent, tag, images);
  if (style === 'stayfolio') return renderStayfolio(slide, i, img, folio, accent, tag);

  // Magazine B / Nike
  const isNike = style === 'nike';
  const overlayMap = {overlay_bottom:'ov-bottom',overlay_top:'ov-top',overlay_left:'ov-left',overlay_right:'ov-right',split_bottom:'',dark_full:'ov-full'};
  const isSplit = slide.layout === 'split_bottom';
  const isDark = slide.type === 'closing';

  let bgHtml = '';
  if (img) {
    const ov = overlayMap[slide.layout] || 'ov-bottom';
    bgHtml = `<img class="slide-bg-img" src="${img}" />${ov ? `<div class="${ov}"></div>` : ''}`;
  }

  const txtClass = {bottom_left:'txt-bottom-left',top_left:'txt-top-left',center:'txt-center',left_half:'txt-left-half',split_bottom:'txt-split',dark_center:'txt-dark'}[slide.text_position] || 'txt-bottom-left';

  const hl = isNike ? (slide.headline||'').toUpperCase() : (slide.headline||'');
  const headlineCls = isDark ? (isNike?'nike-closing-hl':'s-headline-dark') : isSplit ? (isNike?'nike-headline-md':'s-headline-md') : (isNike?'nike-headline':'s-headline-lg');
  const bodyCls = isDark ? 's-body-dark' : isSplit ? 's-body-ink' : 's-body';
  const labelCls = isNike ? 'nike-label' : (isSplit?'s-label-ink':'s-label');

  let inner = '';
  if (slide.type === 'cover') {
    inner = `<span class="s-masthead">SAPMANRI</span><div style="flex:1"></div><div class="${headlineCls}">${hl}</div><div class="${bodyCls}">${slide.body||''}</div>`;
  } else if (slide.type === 'closing') {
    inner = `<span class="s-masthead-dark">SAPMANRI</span><div class="s-rule" style="background:${accent}"></div><div class="${headlineCls}">${hl}</div><div class="${bodyCls}">${slide.body||''}</div><span class="s-closing-tag" style="color:${accent}">${tag}</span>`;
  } else {
    inner = `<span class="${labelCls}" style="color:${accent}">${slide.label||''}</span><div class="${headlineCls}">${hl}</div><div class="${bodyCls}">${slide.body||''}</div>`;
  }

function renderInfographic(slide, i, img, folio, accent) {
  const labels = slide.labels || [];
  const labelsHtml = labels.map(lb => {
    const xPct = (lb.x * 100).toFixed(1) + '%';
    const yPct = (lb.y * 100).toFixed(1) + '%';
    const dir = lb.direction || 'right';
    const lineLen = 28;
    const lineStyle = {
      right:  `left:100%;top:50%;width:${lineLen}px;height:1px`,
      left:   `right:100%;top:50%;width:${lineLen}px;height:1px`,
      up:     `left:50%;bottom:100%;width:1px;height:${lineLen}px`,
      down:   `left:50%;top:100%;width:1px;height:${lineLen}px`,
    }[dir] || `left:100%;top:50%;width:${lineLen}px;height:1px`;
    const textPos = {
      right: 'left:calc(100% + ' + lineLen + 'px);top:50%;transform:translateY(-50%)',
      left:  'right:calc(100% + ' + lineLen + 'px);top:50%;transform:translateY(-50%);text-align:right',
      up:    'left:50%;bottom:calc(100% + ' + lineLen + 'px);transform:translateX(-50%);text-align:center',
      down:  'left:50%;top:calc(100% + ' + lineLen + 'px);transform:translateX(-50%);text-align:center',
    }[dir] || 'left:calc(100% + ' + lineLen + 'px);top:50%;transform:translateY(-50%)';

    return `<div style="position:absolute;left:${xPct};top:${yPct};transform:translate(-50%,-50%);z-index:4">
      <div style="width:6px;height:6px;border-radius:50%;background:${accent};border:1.5px solid #fff;position:relative">
        <div style="position:absolute;background:${accent};${lineStyle}"></div>
        <div style="position:absolute;${textPos};font-family:var(--sans);font-size:7px;font-weight:500;letter-spacing:0.06em;color:#fff;white-space:nowrap;text-shadow:0 1px 3px rgba(0,0,0,0.8)">${lb.text||''}</div>
      </div>
    </div>`;
  }).join('');

  const bgHtml = img ? `<img class="slide-bg-img" src="${img}"/>` : `<div style="position:absolute;inset:0;background:#222"></div>`;
  return `<div class="slide-card"><div class="slide-canvas" style="background:#1a1a1a">${bgHtml}<div style="position:absolute;inset:0;background:rgba(0,0,0,0.15)"></div>${labelsHtml}<div class="s-folio" style="z-index:5">${folio}</div></div></div>`;
}
