<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAPMANRI · Issue</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#E8762C;
  --cream:#FAF5EE;
  --dark:#120E0C;
  --sage:#B2CDA8;
  --ink:#1a1a1a;
  --hairline-light:#D8D5D0;
  --hairline-dark:rgba(255,255,255,0.08);
  --serif:"Gowun Batang",Georgia,serif;
  --sans:"Noto Sans KR","Helvetica Neue",Arial,sans-serif;
}
html,body{font-family:var(--sans);background:var(--cream);color:var(--ink)}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}

/* ── 상단 미니바 ── */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:50;
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 20px;background:rgba(250,245,238,0.9);backdrop-filter:blur(6px);
  border-bottom:1px solid var(--hairline-light);
  font-size:11px;letter-spacing:0.08em;
  transition:transform .28s cubic-bezier(.4,0,.2,1), opacity .28s;
}
.topbar.hidden{transform:translateY(-110%);opacity:0;pointer-events:none}
.topbar.on-dark{background:rgba(18,14,12,0.85);border-bottom:1px solid var(--hairline-dark);color:var(--cream)}
.topbar .back{color:var(--orange);font-weight:500;display:flex;flex-direction:column;gap:1px;flex:1;min-width:0}
.topbar .back .back-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar .back .build-tag{font-family:var(--mono,monospace);font-weight:300;font-size:8px;letter-spacing:0.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:0.55}
.topbar.on-dark .back .build-tag{color:rgba(255,255,255,0.55)}
.topbar:not(.on-dark) .back .build-tag{color:rgba(0,0,0,0.45)}
.topbar .indicator{color:rgba(0,0,0,0.4);font-family:var(--mono,monospace);font-size:10px;line-height:1.3;text-align:center;min-width:28px}
.topbar.on-dark .indicator{color:rgba(255,255,255,0.45)}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.lang-toggle{display:flex;align-items:center;gap:0;border:1px solid rgba(255,255,255,0.2);border-radius:20px;overflow:hidden;flex-shrink:0}
.topbar.on-dark .lang-toggle{border-color:rgba(255,255,255,0.18)}
.topbar:not(.on-dark) .lang-toggle{border-color:rgba(0,0,0,0.15)}
.lang-btn{
  background:none;border:none;cursor:pointer;
  font-family:var(--mono,monospace);font-size:10px;letter-spacing:0.12em;
  padding:5px 11px;transition:all .15s;color:inherit;opacity:0.38;
}
.lang-btn.active{
  background:var(--orange);color:#fff;opacity:1;
}
.topbar:not(.on-dark) .lang-btn{color:var(--ink)}
.topbar:not(.on-dark) .lang-btn.active{background:var(--ink);color:#fff}
.btn-pdf{
  display:flex;align-items:center;gap:5px;
  padding:5px 13px;border-radius:3px;border:none;cursor:pointer;
  font-family:var(--sans);font-size:10px;font-weight:500;letter-spacing:0.08em;
  background:var(--orange);color:#fff;transition:opacity .15s;white-space:nowrap;
}
.btn-pdf:hover{opacity:0.82}
.btn-pdf:disabled{opacity:0.4;cursor:not-allowed}
.topbar.on-dark .lang-toggle{display:flex;align-items:center;gap:0;border:1px solid rgba(255,255,255,0.2);border-radius:20px;overflow:hidden;flex-shrink:0}
.topbar.on-dark .lang-toggle{border-color:rgba(255,255,255,0.18)}
.topbar:not(.on-dark) .lang-toggle{border-color:rgba(0,0,0,0.15)}
.lang-btn{
  background:none;border:none;cursor:pointer;
  font-family:var(--mono,monospace);font-size:10px;letter-spacing:0.12em;
  padding:5px 11px;transition:all .15s;color:inherit;opacity:0.38;
}
.lang-btn.active{
  background:var(--orange);color:#fff;opacity:1;
}
.topbar:not(.on-dark) .lang-btn{color:var(--ink)}
.topbar:not(.on-dark) .lang-btn.active{background:var(--ink);color:#fff}
.btn-pdf{background:rgba(232,118,44,0.9)}
/* PDF 진행 오버레이 */
.pdf-overlay{
  display:none;position:fixed;inset:0;z-index:9999;
  background:rgba(18,14,12,0.78);backdrop-filter:blur(6px);
  flex-direction:column;align-items:center;justify-content:center;gap:18px;
  color:#fff;font-family:var(--sans);
}
.pdf-overlay.active{display:flex}
.pdf-overlay-title{font-size:14px;letter-spacing:0.1em;font-weight:500}
.pdf-bar-wrap{width:240px;height:2px;background:rgba(255,255,255,0.15);border-radius:2px}
.pdf-bar{height:100%;background:var(--orange);border-radius:2px;width:0%;transition:width .15s}
.pdf-overlay-sub{font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:0.06em}

/* ── 페이지 컨테이너 ── */
.pages{display:flex;flex-direction:column}
.page{
  min-height:100vh;display:flex;flex-direction:column;justify-content:center;
  position:relative;padding:48px 20px;
}
.page.dark{background:var(--dark);color:var(--cream)}
.page.cream{background:var(--cream);color:var(--ink)}

/* ── 모바일: 스크롤 스냅으로 한 장씩 넘기는 느낌 ── */
@media(max-width:899px){
  html{scroll-snap-type:y mandatory}
  .page{scroll-snap-align:start;scroll-snap-stop:always}
  /* 100vh를 넘을 수 있는 텍스트 페이지: 시작 지점은 스냅 대상으로 유지하되,
     내부 스크롤이 페이지를 통과해 다음 페이지로 넘어갈 수 있도록 stop은 normal */
  .page-essay,.page-dialogue,.page-list-type{scroll-snap-align:start;scroll-snap-stop:normal}
}

/* ── 데스크탑/패드: 본문 페이지를 2장씩 묶어 한 화면(스프레드)에 펼침 ── */
@media(min-width:900px){
  .spread-pair{display:flex;align-items:flex-start;position:relative}
  .spread-pair .page{
    flex:1 1 50%;width:50%;min-height:100vh;
    position:sticky;top:0;align-self:flex-start;
  }
  /* 가운데 제본선 */
  .spread-pair::after{
    content:'';position:absolute;top:0;bottom:0;left:50%;width:2px;margin-left:-1px;
    background:rgba(128,128,128,0.18);z-index:5;mix-blend-mode:difference;
    pointer-events:none;
  }
}

/* ── Type 1: Cover ── */
.page-cover{justify-content:space-between;background:var(--dark);color:var(--cream)}
.page-cover .bg-photo{
  position:absolute;inset:0;background-size:cover;background-position:center;
  opacity:0.5;filter:blur(16px) grayscale(0.6) brightness(0.9);transform:scale(1.05);
  transition:filter 1.1s ease-out, transform 1.4s ease-out;
}
.page-cover.in-view .bg-photo{filter:blur(0) grayscale(0) brightness(1);transform:scale(1)}
@media(prefers-reduced-motion:reduce){
  .page-cover .bg-photo,.page-fullbleed .fb-img-wrap img{transition:none;filter:none;transform:none}
}
.page-cover .bg-photo::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(18,14,12,0.3) 0%,rgba(18,14,12,0.85) 75%,rgba(18,14,12,0.97) 100%);
}
.page-cover .content{position:relative;z-index:2;display:flex;flex-direction:column;justify-content:space-between;flex:1;gap:40px}
.page-cover .top-mark{font-family:var(--serif);font-weight:700;font-size:20px;color:var(--orange);letter-spacing:0.08em}
.page-cover .top-mark .sub{display:block;font-family:var(--sans);font-weight:300;font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-top:4px}
.page-cover .headline{font-family:var(--serif);font-weight:700;font-size:38px;line-height:1.25;letter-spacing:0.01em}
.page-cover .headline span{display:block}
.page-cover .info-row{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;flex-wrap:wrap}
.page-cover .issue-no{font-size:11px;letter-spacing:0.12em;color:var(--sage)}
.page-cover .toc{display:flex;flex-direction:column;gap:6px;text-align:right}
.page-cover .toc-item{font-size:12px;color:rgba(255,255,255,0.7)}
.page-cover .toc-item .n{color:var(--orange);margin-right:6px;font-family:var(--serif)}
@media(min-width:768px){.page-cover .headline{font-size:64px}}

/* ── Type 2: Full Bleed Photo ── */
.page-fullbleed{padding:0;align-items:stretch;position:relative;background:#000;min-height:100vh;height:auto}
.page-fullbleed .fb-img-wrap{width:100%;height:100vh;overflow:hidden;flex-shrink:0}
.page-fullbleed .fb-img-wrap img{
  width:100%;height:100%;object-fit:cover;object-position:center 50%;display:block;
  filter:blur(14px) grayscale(0.55);transform:scale(1.04);
  transition:filter 1.1s ease-out, transform 1.4s ease-out;
}
.page-fullbleed.in-view .fb-img-wrap img{filter:blur(0) grayscale(0);transform:scale(1)}
.page-fullbleed .caption{
  position:relative;z-index:2;width:100%;box-sizing:border-box;
  padding:32px 24px 40px;
  font-family:var(--serif);font-size:18px;line-height:1.8;white-space:pre-line;
  color:var(--cream);background:var(--dark);
}
.page-fullbleed .caption.short{
  position:absolute;left:24px;right:24px;top:50%;transform:translateY(-50%);background:none;
  padding:0;font-size:20px;text-shadow:0 2px 12px rgba(0,0,0,0.5);max-width:640px;
}
.page-fullbleed::after{
  content:'';position:absolute;left:0;right:0;top:0;height:100vh;z-index:1;
  background:linear-gradient(180deg,rgba(0,0,0,0) 0%,rgba(0,0,0,0.55) 100%);
  pointer-events:none;
}
@media(min-width:768px){
  .page-fullbleed .caption{font-size:20px;padding:48px}
  .page-fullbleed .caption.short{font-size:28px;left:48px;right:48px}
}
@media(min-width:900px){
  .spread-pair .page-fullbleed .fb-img-wrap{height:100%}
  .spread-pair .page-fullbleed::after{height:100%}
}

/* ── Type 3: Index/Contents ── */
.page-index{background:var(--dark);color:var(--cream)}
.page-index .label{font-size:10px;letter-spacing:0.24em;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:28px}
.page-index .list{display:flex;flex-direction:column;gap:18px}
.index-item{display:flex;align-items:baseline;gap:16px;padding-bottom:14px;border-bottom:1px solid var(--hairline-dark);cursor:pointer;transition:opacity .15s}
.index-item:hover{opacity:0.6}
.index-item .n{font-family:var(--serif);font-size:20px;color:var(--orange);min-width:32px}
.index-item .t{font-family:var(--serif);font-size:18px;color:var(--cream)}
@media(min-width:768px){.index-item .t{font-size:24px}}

/* ── Type 4: Split (Photo + Story) ── */
.page-split{padding:0;flex-direction:column}
.page-split .split-photo{width:100%;aspect-ratio:4/3;overflow:hidden}
.page-split .split-photo img{width:100%;height:100%;object-fit:cover}
.page-split .split-text{padding:36px 24px 56px;background:var(--cream);color:var(--ink)}
.page-split.dark-text .split-text{background:var(--dark);color:var(--cream)}
.page-split .split-label{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--orange);margin-bottom:14px}
.page-split .split-body{font-family:var(--serif);font-size:17px;line-height:2;white-space:pre-line}
@media(min-width:900px){
  .page-split{flex-direction:row;align-items:stretch;min-height:100vh}
  .page-split .split-photo{width:60%;aspect-ratio:auto}
  .page-split .split-text{width:40%;display:flex;flex-direction:column;justify-content:center;padding:60px}
  .page-split .split-body{font-size:19px}
  /* 페어 안에서는 폭이 좁으므로 모바일처럼 세로 배치를 유지 */
  .spread-pair .page-split{flex-direction:column;align-items:stretch}
  .spread-pair .page-split .split-photo{width:100%;aspect-ratio:4/3;flex:0 0 auto}
  .spread-pair .page-split .split-text{width:100%;padding:36px 24px 56px}
  .spread-pair .page-split .split-body{font-size:17px}
}

/* ── Type 5: Grid Collage ── */
.page-grid{gap:18px}
.page-grid .grid-label{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--orange);margin-bottom:6px}
.page-grid .grid-photos{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:900px}
.page-grid .grid-photos img{width:100%;height:auto;object-fit:cover;aspect-ratio:1;display:block}
.page-grid .grid-photos.layout-1plus2 .g0{grid-column:1/-1;aspect-ratio:16/10}
.page-grid .grid-caption{font-size:12px;color:rgba(0,0,0,0.45);margin-top:12px;max-width:900px}
@media(min-width:768px){
  .page-grid .grid-photos{grid-template-columns:repeat(3,1fr)}
  .page-grid .grid-photos.layout-1plus2 .g0{grid-column:span 3;aspect-ratio:16/8}
  .page-grid .grid-photos.count-2{grid-template-columns:repeat(2,1fr);max-width:700px}
  .page-grid .grid-photos.count-4{grid-template-columns:repeat(2,1fr);max-width:700px}
  .page-grid .grid-photos.count-5 .g0,
  .page-grid .grid-photos.count-5 .g1{grid-column:span 1}
}
@media(min-width:900px){
  /* 페어 안에서는 폭이 좁으므로 그리드 컬럼을 줄인다 */
  .spread-pair .page-grid .grid-photos{grid-template-columns:1fr 1fr;max-width:100%}
  .spread-pair .page-grid .grid-photos.layout-1plus2 .g0{grid-column:1/-1;aspect-ratio:16/10}
  .spread-pair .page-grid .grid-photos.count-5 .g0,
  .spread-pair .page-grid .grid-photos.count-5 .g1{grid-column:span 1}
}

/* ── Type 6: Quote ── */
.page-quote{background:var(--dark);color:var(--cream);align-items:center;text-align:center}
.page-quote .line{width:60px;height:1px;background:var(--orange);margin:0 auto}
.page-quote .quote-text{font-family:var(--serif);font-size:30px;line-height:1.6;margin:28px 0;max-width:640px}
@media(min-width:768px){.page-quote .quote-text{font-size:42px}}
.page-quote .quote-context{font-size:11px;letter-spacing:0.1em;color:rgba(255,255,255,0.4)}

/* ── Type 7: Closing ── */
.page-closing{background:var(--dark);color:var(--cream);align-items:center;text-align:center;justify-content:space-between}
.page-closing .closing-text{font-family:var(--serif);font-size:26px;line-height:1.7;margin-top:auto}
.page-closing .closing-cta{font-size:12px;letter-spacing:0.08em;color:rgba(255,255,255,0.5);margin-top:16px}
.page-closing > div{display:flex;flex-direction:column;align-items:center;gap:0;margin-top:32px}
.page-closing .closing-cta a{color:var(--orange)}
.page-closing .youtube-btn{
  display:inline-flex;align-items:center;gap:10px;
  border:1px solid var(--orange);color:var(--orange);
  font-size:12px;letter-spacing:0.08em;padding:12px 22px;border-radius:999px;
  text-decoration:none;transition:all .2s;margin-bottom:4px;
}
.page-closing .youtube-btn .yt-icon{
  display:flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:50%;background:var(--orange);color:var(--dark);
}
.page-closing .youtube-btn:hover{background:var(--orange);color:var(--dark)}
.page-closing .youtube-btn:hover .yt-icon{background:var(--dark);color:var(--orange)}
.page-closing .big-mark{font-family:var(--serif);font-weight:700;font-size:64px;color:var(--orange);letter-spacing:0.06em;margin-top:60px;margin-bottom:20px}
@media(min-width:768px){.page-closing .closing-text{font-size:38px}.page-closing .big-mark{font-size:96px}}

/* ── Type 8: Spread (사진 1장이 2페이지에 걸친 와이드 화보) ── */
.page-spread{padding:0;align-items:stretch}
.page-spread .spread-img-wrap{
  width:100%;flex:1 1 0%;min-height:0;overflow:hidden;position:relative;background:#000;
}
.page-spread .spread-img-wrap img{
  position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;display:block;
}
/* 모바일 half 페이지: img는 컨테이너 채우고 object-position으로만 크롭 위치 제어 */
.page-spread.half-left .spread-img-wrap img,
.page-spread.half-right .spread-img-wrap img {
  position:absolute;top:0;left:0;width:100%;height:100%;
  object-fit:cover;display:block;max-width:none;
}
.page-spread .spread-caption{
  position:absolute;left:20px;top:50%;transform:translateY(-50%);z-index:2;
  font-family:var(--serif);font-size:18px;line-height:1.6;color:var(--cream);
  text-shadow:0 1px 6px rgba(0,0,0,0.5);max-width:80%;
}
.page-spread.half-right .spread-caption{left:auto;right:20px;text-align:right}

/* 데스크탑/패드: 한 화면에 스프레드 전체 + 양쪽 텍스트 컬럼 */
.page.page-spread-desktop{display:none}
@media(min-width:900px){
  .page.page-spread{display:none}
  .page.page-spread-desktop{
    display:flex;padding:0;min-height:100vh;background:#000;color:var(--cream);
    position:relative;align-items:stretch;
  }
  .page-spread-desktop .spread-img-wrap{width:100%;flex:1 1 0%;min-height:0;overflow:hidden;position:relative}
  .page-spread-desktop .spread-img-wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
  .page-spread-desktop .spread-caption-left,
  .page-spread-desktop .spread-caption-right{
    position:absolute;top:50%;transform:translateY(-50%);z-index:2;
    font-family:var(--serif);font-size:24px;line-height:1.7;color:var(--cream);
    text-shadow:0 1px 8px rgba(0,0,0,0.55);max-width:32%;
  }
  .page-spread-desktop .spread-caption-left{left:48px}
  .page-spread-desktop .spread-caption-right{right:48px;text-align:right}
  /* 가운데 제본선 느낌 */
  .page-spread-desktop::after{
    content:'';position:absolute;top:0;bottom:0;left:50%;width:1px;
    background:rgba(255,255,255,0.12);z-index:1;
  }
}


/* ── Type 9: Essay (사진 없이 글만) ── */
.page-essay{background:var(--cream);color:var(--ink);align-items:center}
.page-essay .essay-inner{width:100%;max-width:640px}
.page-essay .essay-label{font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--orange);margin-bottom:24px}
.page-essay .essay-title{font-family:var(--serif);font-size:28px;line-height:1.4;margin-bottom:28px}
.page-essay .essay-body{font-family:var(--serif);font-size:17px;line-height:2.1;white-space:pre-line;color:rgba(26,26,26,0.85)word-break:keep-all;overflow-wrap:break-word;}
.page-essay.dark{background:var(--dark);color:var(--cream)}
.page-essay.dark .essay-body{color:rgba(250,245,238,0.8)}
@media(min-width:768px){.page-essay .essay-title{font-size:36px}.page-essay .essay-body{font-size:19px}}

/* ── Type 10: Caption Dialogue (코멘트/대화형) ── */
.page-dialogue{background:var(--cream);color:var(--ink);align-items:center}
.page-dialogue .dlg-inner{width:100%;max-width:560px;display:flex;flex-direction:column;gap:18px}
.page-dialogue .dlg-label{font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--orange);margin-bottom:8px}
.page-dialogue .dlg-title{font-family:var(--serif);font-size:26px;line-height:1.4;margin-bottom:28px}
.dlg-line{display:flex;flex-direction:column;gap:4px;max-width:80%}
.dlg-line.right{align-self:flex-end;align-items:flex-end;text-align:right}
.dlg-line .dlg-speaker{font-size:10px;letter-spacing:0.1em;color:rgba(0,0,0,0.35);text-transform:uppercase}
.dlg-line .dlg-text{
  font-family:var(--serif);font-size:16px;line-height:1.6;padding:12px 16px;
  background:rgba(0,0,0,0.04);border-radius:14px;display:inline-block;
}
.dlg-line.right .dlg-text{background:var(--orange);color:#fff}
@media(min-width:768px){.dlg-line .dlg-text{font-size:18px}.page-dialogue .dlg-title{font-size:32px}}

/* ── Type 11: List (레시피/리스트형 정보) ── */
.page-list-type{background:var(--cream);color:var(--ink);align-items:center}
.page-list-type .list-inner{width:100%;max-width:560px}
.page-list-type .list-label{font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--orange);margin-bottom:8px}
.page-list-type .list-title{font-family:var(--serif);font-size:26px;line-height:1.4;margin-bottom:28px}
.page-list-type .list-items{display:flex;flex-direction:column;gap:14px}
.list-row{display:flex;align-items:baseline;gap:16px;padding-bottom:14px;border-bottom:1px solid var(--hairline-light)}
.list-row .list-n{font-family:var(--serif);font-size:16px;color:var(--orange);min-width:28px}
.list-row .list-body{flex:1}
.list-row .list-name{font-family:var(--serif);font-size:16px;line-height:1.5}
.list-row .list-desc{font-size:12px;color:rgba(0,0,0,0.45);margin-top:4px;line-height:1.6}
@media(min-width:768px){.page-list-type .list-title{font-size:32px}.list-row .list-name{font-size:18px}}

/* ── Type 12: Milestone (숫자/단어 강조) ── */
.page-milestone{background:var(--dark);color:var(--cream);align-items:center;text-align:center}
.page-milestone .ms-number{
  font-family:var(--serif);font-weight:700;font-size:96px;color:var(--orange);
  line-height:1;letter-spacing:0.02em;
}
.page-milestone .ms-label{font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-top:16px}
.page-milestone .ms-desc{font-family:var(--serif);font-size:18px;line-height:1.7;margin-top:28px;max-width:480px;color:rgba(250,245,238,0.85)}
@media(min-width:768px){.page-milestone .ms-number{font-size:160px}.page-milestone .ms-desc{font-size:22px}}

/* ── Type 13: Botanical — 전시 카탈로그 스타일 ── */
.page-botanical{
  background:#F5F2ED;color:var(--ink);padding:0;
  display:flex;flex-direction:column;min-height:100vh;
}
.page-botanical .bot-wrap{
  width:100%;flex:1;display:flex;flex-direction:column;
  padding:40px 32px 0;gap:0;
}
/* 상단: 라벨(좌) + 번호(우) */
.page-botanical .bot-header{
  display:flex;justify-content:space-between;align-items:flex-start;
  margin-bottom:12px;
}
.page-botanical .bot-tag{
  font-family:var(--sans);font-size:9px;letter-spacing:0.22em;
  text-transform:uppercase;color:rgba(0,0,0,0.38);padding-top:3px;
}
.page-botanical .bot-number{
  font-family:'Helvetica Neue',Arial,sans-serif;font-weight:900;
  font-size:clamp(52px,14vw,80px);line-height:0.85;
  color:var(--ink);letter-spacing:-0.02em;
}
/* 타이틀 */
.page-botanical .bot-title{
  font-family:var(--serif);font-weight:700;
  font-size:clamp(22px,6vw,34px);line-height:1.18;
  color:var(--ink);margin-bottom:14px;word-break:keep-all;
}
/* 이중 언어 서브라벨 */
.page-botanical .bot-sublabels{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
  margin-bottom:20px;padding-bottom:16px;
  border-bottom:1px solid rgba(0,0,0,0.1);
}
.page-botanical .bot-sublabel-item{
  font-family:var(--sans);font-size:10px;font-weight:300;
  color:rgba(0,0,0,0.45);line-height:1.5;
}
.page-botanical .bot-sublabel-item .sub-heading{
  display:block;font-size:8px;letter-spacing:0.14em;
  text-transform:uppercase;color:rgba(0,0,0,0.28);margin-bottom:3px;
}
/* 사진 — position:relative 컨테이너로 남은 공간 채우고 하단에 딱 붙음 */
.page-botanical .bot-frame{
  flex:1;width:100%;position:relative;overflow:hidden;
  background:#e8e4de;min-height:120px;
}
.page-botanical .bot-frame img{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;
}
/* 하단 캡션 — 사진 바깥, 페이지 맨 아래, 최대 2줄 */
.page-botanical .bot-caption{
  padding:10px 32px 18px;font-family:var(--serif);font-style:italic;
  font-size:12px;color:rgba(0,0,0,0.4);letter-spacing:0.03em;
  background:#F5F2ED;flex-shrink:0;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}


.notfound .big{font-family:var(--serif);font-size:24px}
.notfound a{color:var(--orange);font-size:12px;letter-spacing:0.08em}
</style>

<body>

<div class="topbar" id="topbar">
  <a class="back" href="./index.html">
    <span class="back-title">← SAPMANRI</span>
    <span class="build-tag">2026-06-29 01:30 KST</span>
  </a>
  <div class="topbar-right">
    <div class="indicator" id="indicator"></div>
    <div class="lang-toggle">
      <button class="lang-btn active" id="btnKo" onclick="setLang('ko')">KO</button>
      <button class="lang-btn" id="btnEn" onclick="setLang('en')">EN</button>
    </div>
    <button class="btn-pdf" id="pdfBtn" onclick="exportPdf()">↓ PDF 저장</button>
  </div>
</div>

<div class="pdf-overlay" id="pdfOverlay">
  <div class="pdf-overlay-title">PDF 생성 중</div>
  <div class="pdf-bar-wrap"><div class="pdf-bar" id="pdfBar"></div></div>
  <div class="pdf-overlay-sub" id="pdfSub">페이지를 캡처하고 있습니다…</div>
</div>

<div class="pages" id="pages">
  <div class="notfound"><div class="big">불러오는 중…</div></div>
</div>

<script>
function esc(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function nl(s) { return esc(s).replace(/\n/g, '<br>'); }

const params = new URLSearchParams(location.search);
const issueId = params.get('id');
let _allIssuesCache = [];

let SAPMANRI_LANG = 'ko';

function setLang(lang) {
  SAPMANRI_LANG = lang;
  document.getElementById('btnKo').className = 'lang-btn' + (lang === 'ko' ? ' active' : '');
  document.getElementById('btnEn').className = 'lang-btn' + (lang === 'en' ? ' active' : '');
  // 현재 호 다시 렌더링 + 옵저버 재초기화 (블러 reveal, 패럴랙스 등)
  if (_currentIssue) {
    renderIssue(_currentIssue);
    initInteractions();
  }
}

// 한/영 텍스트 선택 헬퍼 — EN 없으면 KO fallback
function t(ko, en) {
  if (SAPMANRI_LANG === 'en') return (en && en.trim()) ? en : (ko || '');
  return ko || '';
}
// 배열용 언어 선택 헬퍼
function tArr(koArr, enArr) {
  if (SAPMANRI_LANG === 'en' && Array.isArray(enArr) && enArr.length) return enArr;
  return koArr || [];
}

let _currentIssue = null;

function renderIssue(issue) {
  const pages = issue.pages || [];
  const NOT_PAIRABLE = new Set(['cover', 'index', 'closing', 'spread']);
  let pageHtml = '';
  let pairBuffer = [];
  function flushPair() {
    if (!pairBuffer.length) return;
    if (pairBuffer.length === 2) {
      pageHtml += `<div class="spread-pair">${pairBuffer[0]}${pairBuffer[1]}</div>`;
    } else {
      pageHtml += pairBuffer[0];
    }
    pairBuffer = [];
  }
  pages.forEach((p, i) => {
    const rendered = renderPage(p, i, pages, issue);
    if (NOT_PAIRABLE.has(p.type)) {
      flushPair();
      pageHtml += rendered;
    } else {
      pairBuffer.push(rendered);
      if (pairBuffer.length === 2) flushPair();
    }
  });
  flushPair();
  document.getElementById('pages').innerHTML = pageHtml;
  // 스프레드 크롭 정밀 보정 (이미지 로드 후 계산)
  requestAnimationFrame(() => fixSpreadCrops());
}

// ── 스프레드 크롭 정밀 보정 (이미지 실제 비율 기반) ──────────────
function fixSpreadCrops() {
  const leftSections = document.querySelectorAll('.page-spread.half-left');
  leftSections.forEach(leftSec => {
    const rightSec = leftSec.nextElementSibling;
    if (!rightSec || !rightSec.classList.contains('half-right')) return;

    const leftImg  = leftSec.querySelector('.spread-half-img');
    const rightImg = rightSec.querySelector('.spread-half-img');
    if (!leftImg || !rightImg) return;

    const splitX = parseFloat(leftSec.dataset.splitx || '50');

    const probe = new Image();
    probe.onload = function() {
      const W = leftSec.clientWidth  || window.innerWidth;
      const H = leftSec.clientHeight || window.innerHeight;
      if (!W || !H) return;

      // object-fit:cover 기준 렌더링 너비 계산
      const imgRatio = this.naturalWidth / this.naturalHeight;
      const containerRatio = W / H;
      let renderedW;
      if (imgRatio > containerRatio) {
        // landscape image → width extends beyond container
        renderedW = H * imgRatio;
      } else {
        // portrait image → fills width, height may crop
        renderedW = W;
      }

      const maxOffset = renderedW - W;
      if (maxOffset <= 0) return; // 이미지가 컨테이너보다 좁으면 크롭 불필요

      const splitPx = (splitX / 100) * renderedW;

      // 왼쪽: 오른쪽 끝이 splitPx에 오도록
      const leftOffset  = Math.max(0, Math.min(maxOffset, splitPx - W));
      // 오른쪽: 왼쪽 끝이 splitPx에 오도록
      const rightOffset = Math.max(0, Math.min(maxOffset, splitPx));

      leftImg.style.objectPosition  = `${(leftOffset  / maxOffset * 100).toFixed(1)}% 50%`;
      rightImg.style.objectPosition = `${(rightOffset / maxOffset * 100).toFixed(1)}% 50%`;
    };
    probe.src = leftImg.src;
  });
}

async function load() {
  let issue = null;
  try {
    const res = await fetch('./issues.json?t=' + Date.now(), { cache: 'no-store' });
    const data = await res.json();
    issue = (data.issues || []).find(x => x.id === issueId) || (data.issues || [])[0];
  } catch (e) {}

  if (!issue) {
    document.getElementById('pages').innerHTML = `
      <div class="notfound">
        <div class="big">호를 찾을 수 없어요</div>
        <a href="./index.html">← 전체 목록으로</a>
      </div>`;
    return;
  }

  _currentIssue = issue;
  document.title = `SAPMANRI · ${issue.title || ''}`;
  renderIssue(issue);
  initInteractions();
}

// 스크롤/관찰자/패럴랙스 등 DOM 상호작용 초기화
// renderIssue()로 DOM이 다시 그려질 때마다(언어 전환 등) 재호출 필요
let _scrollHandlerAttached = false;
function initInteractions() {
  const pageEls = [...document.querySelectorAll('.page')];
  const topbar = document.getElementById('topbar');

  function visiblePageEls() {
    return pageEls.filter(el => getComputedStyle(el).display !== 'none');
  }

  // ── 탑바 자동 숨김: 스크롤 다운 → 숨김 / 업 → 표시 (리스너는 최초 1회만 부착) ──
  if (!_scrollHandlerAttached) {
    _scrollHandlerAttached = true;
    let lastScrollY = window.scrollY;
    let ticking = false;
    window.addEventListener('scroll', () => {
      if (ticking) return;
      ticking = true;
      requestAnimationFrame(() => {
        const currentY = window.scrollY;
        const diff = currentY - lastScrollY;
        if (diff > 8 && currentY > 80) {
          topbar.classList.add('hidden');
        } else if (diff < -8 || currentY < 60) {
          topbar.classList.remove('hidden');
        }
        lastScrollY = currentY;
        ticking = false;
      });
    }, { passive: true });
  }

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting && e.intersectionRatio > 0.5) {
        const isDark = e.target.classList.contains('dark') || e.target.classList.contains('page-cover') ||
                        e.target.classList.contains('page-index') || e.target.classList.contains('page-quote') ||
                        e.target.classList.contains('page-closing') || e.target.classList.contains('page-spread') ||
                        e.target.classList.contains('page-spread-desktop') || e.target.classList.contains('page-fullbleed');
        topbar.classList.toggle('on-dark', isDark);
        const visible = visiblePageEls();
        const idx = visible.indexOf(e.target);
        if (idx >= 0) document.getElementById('indicator').textContent = `${String(idx+1).padStart(2,'0')} / ${visible.length}`;
      }
    });
  }, { threshold: [0.5] });
  pageEls.forEach(el => observer.observe(el));
  const initial = visiblePageEls();
  document.getElementById('indicator').textContent = `${initial.length} pages`;

  // 표지/풀블리드 사진: 화면에 처음 들어올 때 블러→선명, 흑백→컬러로 전환 (잡지 페이지가 드러나는 느낌)
  const revealEls = [...document.querySelectorAll('.page-cover, .page-fullbleed')];
  const revealObserver = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('in-view');
        revealObserver.unobserve(e.target);
      }
    });
  }, { threshold: 0.15 });
  revealEls.forEach(el => revealObserver.observe(el));

  // 풀블리드/스프레드 사진에 미세한 패럴랙스 효과 (스크롤에 따라 사진이 살짝 다른 속도로 이동)
  if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    const parallaxImgs = [...document.querySelectorAll('.page-fullbleed .fb-img-wrap img, .page-spread .spread-img-wrap img')]
      .map(img => {
        const parts = getComputedStyle(img).objectPosition.split(' ');
        return { img, baseX: parts[0], baseY: parseFloat(parts[1]) || 50 };
      });
    const PARALLAX_RANGE = 6; // object-position % 이동 범위 (양쪽 합 12%)
    let ticking = false;
    function updateParallax() {
      const vh = window.innerHeight;
      parallaxImgs.forEach(({ img, baseX, baseY }) => {
        const rect = img.getBoundingClientRect();
        if (rect.bottom < -vh || rect.top > vh * 2) return; // 화면에서 먼 요소는 스킵
        const center = rect.top + rect.height / 2;
        const ratio = (center - vh / 2) / vh; // 화면 중앙 기준 -1~1 근처
        const y = baseY + Math.max(-1, Math.min(1, ratio)) * PARALLAX_RANGE;
        img.style.objectPosition = `${baseX} ${y}%`;
      });
      ticking = false;
    }
    window.addEventListener('scroll', () => {
      if (!ticking) { requestAnimationFrame(updateParallax); ticking = true; }
    }, { passive: true });
    updateParallax();
  }
}

function renderPage(p, i, allPages, issue) {
  switch (p.type) {
    case 'cover': return renderCover(p, issue);
    case 'fullbleed': return renderFullbleed(p);
    case 'index': return renderIndex(p);
    case 'split': return renderSplit(p);
    case 'grid': return renderGrid(p);
    case 'quote': return renderQuote(p);
    case 'closing': return renderClosing(p, issue);
    case 'spread': return renderSpread(p);
    case 'essay': return renderEssay(p);
    case 'dialogue': return renderDialogue(p);
    case 'list': return renderListPage(p);
    case 'milestone': return renderMilestone(p);
    case 'botanical': return renderBotanical(p);
    default: return '';
  }
}

function renderCover(p, issue) {
  const headlineArr = tArr(p.headline, p.headline_en);
  const tocArr      = tArr(p.toc,      p.toc_en);
  const headline = headlineArr.map(l => `<span>${esc(l)}</span>`).join('');
  const toc = tocArr.map((item, i) => `<div class="toc-item"><span class="n">${String(i+1).padStart(2,'0')}</span>${esc(item)}</div>`).join('');
  return `
  <section class="page page-cover">
    ${p.image ? `<div class="bg-photo" style="background-image:url('${esc(p.image)}')"></div>` : ''}
    <div class="content">
      <div class="top-mark">SAPMANRI<span class="sub">오늘도 느리게 · slow days</span></div>
      <div class="headline">${headline}</div>
      <div class="info-row">
        <div class="issue-no">${esc(issue.number || '')}<br>${esc(issue.date || '')}</div>
        <div class="toc">${toc}</div>
      </div>
    </div>
  </section>`;
}

function renderFullbleed(p) {
  const caption = t(p.caption, p.caption_en) || '';
  const isShort = caption.length <= 30 && !caption.includes('\n\n');
  const captionCls = isShort ? 'caption short' : 'caption';
  const hasFocal = typeof p.focalX === 'number' && typeof p.focalY === 'number';
  const focalStyle = hasFocal ? ` style="object-position:${p.focalX}% ${p.focalY}%"` : '';
  return `
  <section class="page page-fullbleed">
    ${p.image ? `<div class="fb-img-wrap"><img src="${esc(p.image)}" alt="" loading="lazy"${focalStyle}></div>` : ''}
    ${caption ? `<div class="${captionCls}">${nl(caption)}</div>` : ''}
  </section>`;
}

function renderIndex(p) {
  const itemsArr = tArr(p.items, p.items_en);
  const items = itemsArr.map((item, i) => `<div class="index-item"><div class="n">${String(i+1).padStart(2,'0')}</div><div class="t">${esc(item)}</div></div>`).join('');
  return `
  <section class="page page-index">
    <div class="label">${esc(t(p.label, p.label_en) || 'Contents · 이번 호 이야기')}</div>
    <div class="list">${items}</div>
  </section>`;
}

function renderSplit(p) {
  const darkCls = p.darkText ? ' dark-text' : '';
  return `
  <section class="page page-split${darkCls}">
    <div class="split-photo">${p.image ? `<img src="${esc(p.image)}" alt="" loading="lazy">` : ''}</div>
    <div class="split-text">
      ${p.label ? `<div class="split-label">${esc(t(p.label, p.label_en))}</div>` : ''}
      <div class="split-body">${nl(t(p.text, p.text_en))}</div>
    </div>
  </section>`;
}

function renderGrid(p) {
  const imgs = p.images || [];
  const layoutCls = imgs.length === 3 ? ' layout-1plus2' : ` count-${imgs.length}`;
  const imgsHtml = imgs.map((src, i) => `<img class="g${i}" src="${esc(src)}" alt="" loading="lazy">`).join('');
  return `
  <section class="page cream page-grid">
    ${p.label ? `<div class="grid-label">${esc(t(p.label, p.label_en))}</div>` : ''}
    <div class="grid-photos${layoutCls}">${imgsHtml}</div>
    ${p.caption ? `<div class="grid-caption">${esc(t(p.caption, p.caption_en))}</div>` : ''}
  </section>`;
}

function renderQuote(p) {
  return `
  <section class="page page-quote">
    <div class="line"></div>
    <div class="quote-text">${nl(t(p.text, p.text_en))}</div>
    ${p.context ? `<div class="quote-context">${esc(t(p.context, p.context_en))}</div>` : ''}
    <div class="line"></div>
  </section>`;
}

function renderClosing(p, issue) {
  const isYoutubeLink = (s) => typeof s === 'string' && /(youtube\.com|youtu\.be)/.test(s);
  let youtubeUrl = issue && issue.youtubeUrl;
  let cta = p.cta;
  if (isYoutubeLink(cta)) {
    if (!youtubeUrl) youtubeUrl = cta;
    cta = ''; // cta가 유튜브 링크 자체면 버튼으로 대체하고 텍스트는 비움 (issue.youtubeUrl과 중복 표시 방지)
  }
  const youtubeBtn = youtubeUrl ? `
    <a class="youtube-btn" href="${esc(youtubeUrl)}" target="_blank" rel="noopener">
      <span class="yt-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </span>
      <span>이번 호 영상으로 보기</span>
    </a>` : '';
  return `
  <section class="page page-closing">
    <div class="closing-text">${nl(t(p.text, p.text_en))}</div>
    <div>
      ${youtubeBtn}
      ${cta || !youtubeUrl ? `<div class="closing-cta">${cta || '유튜브에서 더 보기 · <a href="https://www.youtube.com/@sapmanri" target="_blank">@sapmanri</a>'}</div>` : ''}
      <div class="big-mark">SAPMANRI</div>
    </div>
  </section>`;
}

function renderSpread(p) {
  const leftCaption  = p.captionLeft  || p.caption || '';
  const rightCaption = p.captionRight || '';
  const imgStyle = `position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;display:block;`;

  // ── 데스크탑: 원본 이미지 하나로 좌우 캡션 (기존 그대로) ──
  const img = esc(p.image || p.imageLeft || '');
  const desktop = `
  <section class="page page-spread-desktop">
    <div class="spread-img-wrap">${img ? `<img src="${img}" alt="" loading="lazy">` : ''}</div>
    ${leftCaption  ? `<div class="spread-caption-left">${nl(t(leftCaption,  p.captionLeft_en))}</div>`  : ''}
    ${rightCaption ? `<div class="spread-caption-right">${nl(t(rightCaption, p.captionRight_en))}</div>` : ''}
  </section>`;

  // ── 모바일: imageLeft/imageRight 있으면 그대로, 없으면 splitX 크롭 ──
  let mobileLeft, mobileRight;
  if (p.imageLeft && p.imageRight) {
    // 신규 발행본: 이미 잘린 두 장
    mobileLeft = `
  <section class="page page-spread half-left">
    <div class="spread-img-wrap"><img src="${esc(p.imageLeft)}"  alt="" loading="lazy" style="${imgStyle}"></div>
    ${leftCaption  ? `<div class="spread-caption">${nl(t(leftCaption,  p.captionLeft_en))}</div>`  : ''}
  </section>`;
    mobileRight = `
  <section class="page page-spread half-right">
    <div class="spread-img-wrap"><img src="${esc(p.imageRight)}" alt="" loading="lazy" style="${imgStyle}"></div>
    ${rightCaption ? `<div class="spread-caption">${nl(t(rightCaption, p.captionRight_en))}</div>` : ''}
  </section>`;
  } else {
    // 구 발행본: splitX 기반 object-position (기존 방식 유지)
    const sx = typeof p.splitX === 'number' ? Math.max(5, Math.min(95, p.splitX)) : 50;
    const leftPos  = `${(sx / 2).toFixed(1)}% 50%`;
    const rightPos = `${(50 + sx / 2).toFixed(1)}% 50%`;
    const src = esc(p.image || '');
    mobileLeft = `
  <section class="page page-spread half-left" data-splitx="${sx}">
    <div class="spread-img-wrap">${src ? `<img src="${src}" alt="" loading="lazy" style="${imgStyle}object-position:${leftPos}" class="spread-half-img">` : ''}</div>
    ${leftCaption  ? `<div class="spread-caption">${nl(t(leftCaption,  p.captionLeft_en))}</div>`  : ''}
  </section>`;
    mobileRight = `
  <section class="page page-spread half-right" data-splitx="${sx}">
    <div class="spread-img-wrap">${src ? `<img src="${src}" alt="" loading="lazy" style="${imgStyle}object-position:${rightPos}" class="spread-half-img">` : ''}</div>
    ${rightCaption ? `<div class="spread-caption">${nl(t(rightCaption, p.captionRight_en))}</div>` : ''}
  </section>`;
  }

  return desktop + mobileLeft + mobileRight;
}

function renderEssay(p) {
  const darkCls = p.dark ? ' dark' : '';
  return `
  <section class="page page-essay${darkCls}">
    <div class="essay-inner">
      ${p.label ? `<div class="essay-label">${esc(t(p.label, p.label_en))}</div>` : ''}
      ${p.title ? `<div class="essay-title">${esc(t(p.title, p.title_en))}</div>` : ''}
      <div class="essay-body">${nl(t(p.text, p.text_en))}</div>
    </div>
  </section>`;
}

function renderDialogue(p) {
  let lines = (p.lines || []);
  let title = '';
  // 첫 줄이 "# 제목" 형식의 헤더면 대화 버블이 아닌 페이지 제목으로 분리
  if (lines.length && /^#\s+/.test((lines[0].text || '').trim())) {
    title = lines[0].text.trim().replace(/^#\s+/, '');
    lines = lines.slice(1);
  }
  const lineHtml = lines.map(l => {
    const sideCls = l.side === 'right' ? ' right' : '';
    const lineText = t(l.text, l.text_en);
    return `
    <div class="dlg-line${sideCls}">
      ${l.speaker ? `<div class="dlg-speaker">${esc(l.speaker)}</div>` : ''}
      <div class="dlg-text">${esc(lineText || '')}</div>
    </div>`;
  }).join('');
  return `
  <section class="page page-dialogue">
    <div class="dlg-inner">
      ${p.label ? `<div class="dlg-label">${esc(t(p.label, p.label_en))}</div>` : ''}
      ${title ? `<div class="dlg-title">${esc(title)}</div>` : ''}
      ${lineHtml}
    </div>
  </section>`;
}

function renderListPage(p) {
  let listItems = (p.items || []);
  let title = p.title || '';
  // 첫 항목이 설명 없이 제목 역할을 하는 경우, 리스트 항목이 아닌 페이지 제목으로 분리
  if (!title && listItems.length > 1 && !(listItems[0].desc || '').trim()) {
    title = listItems[0].name || '';
    listItems = listItems.slice(1);
  }
  const items = listItems.map((it, i) => `
    <div class="list-row">
      <div class="list-n">${String(i+1).padStart(2,'0')}</div>
      <div class="list-body">
        <div class="list-name">${esc(it.name || '')}</div>
        ${it.desc ? `<div class="list-desc">${esc(it.desc)}</div>` : ''}
      </div>
    </div>`).join('');
  return `
  <section class="page page-list-type">
    <div class="list-inner">
      ${p.label ? `<div class="list-label">${esc(t(p.label, p.label_en))}</div>` : ''}
      ${title ? `<div class="list-title">${esc(title)}</div>` : ''}
      <div class="list-items">${items}</div>
    </div>
  </section>`;
}

function renderMilestone(p) {
  return `
  <section class="page page-milestone">
    <div class="ms-number">${esc(p.number || '')}</div>
    ${p.label ? `<div class="ms-label">${esc(t(p.label, p.label_en))}</div>` : ''}
    ${p.text ? `<div class="ms-desc">${nl(t(p.text, p.text_en))}</div>` : ''}
  </section>`;
}

function renderBotanical(p) {
  const tag      = p.tag      || 'Botanical Notes';
  const number   = p.number   || '';
  const title    = p.title    || '';
  const subtitle = p.subtitle || '';
  const caption  = p.caption  || '';
  const img      = p.image    || '';

  // 이중 언어 서브라벨: subtitle을 '/' 또는 줄바꿈으로 구분 (없으면 단일)
  let subKo = subtitle, subEn = '';
  const divider = subtitle.indexOf('/');
  if (divider > -1) {
    subKo = subtitle.slice(0, divider).trim();
    subEn = subtitle.slice(divider + 1).trim();
  }

  return `
  <section class="page page-botanical">
    <div class="bot-wrap">
      <div class="bot-header">
        <div class="bot-tag">${esc(tag)}</div>
        ${number ? `<div class="bot-number">${esc(number)}</div>` : ''}
      </div>
      ${title ? `<div class="bot-title">${nl(t(title, p.title_en))}</div>` : ''}
      ${(subKo || subEn) ? `
      <div class="bot-sublabels">
        ${subKo ? `<div class="bot-sublabel-item"><span class="sub-heading">Exhibition</span>${esc(subKo)}</div>` : ''}
        ${subEn ? `<div class="bot-sublabel-item"><span class="sub-heading">전시</span>${esc(subEn)}</div>` : ''}
      </div>` : ''}
      <div class="bot-frame">${img ? `<img src="${esc(img)}" alt="" loading="lazy">` : ''}</div>
      ${caption ? `<div class="bot-caption">${esc(t(caption, p.caption_en))}</div>` : ''}
    </div>
  </section>`;
}

load();

</script>

<!-- PDF 내보내기 라이브러리 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
async function exportPdf() {
  const btn     = document.getElementById('pdfBtn');
  const overlay = document.getElementById('pdfOverlay');
  const bar     = document.getElementById('pdfBar');
  const sub     = document.getElementById('pdfSub');
  const topbar  = document.getElementById('topbar');

  btn.disabled = true;
  overlay.classList.add('active');
  topbar.style.display = 'none';

  // ── 모바일 레이아웃 강제 (화면 크기 무관하게 항상 1페이지씩) ──
  const PDF_MOBILE_W = 390;  // 고정 캡처 너비 (px)
  const PDF_W_MM     = 105;  // PDF 출력 너비 (mm) — A6 폭 기준, 소장용에 적합

  const forceStyle = document.createElement('style');
  forceStyle.id    = 'pdf-force-mobile';
  forceStyle.textContent = `
    .page.page-spread-desktop { display: none !important; }
    .page.page-spread          { display: flex !important; }
    #pages { max-width: ${PDF_MOBILE_W}px !important; }
  `;
  document.head.appendChild(forceStyle);

  // 레이아웃 재계산 대기
  await new Promise(r => setTimeout(r, 120));

  // desktop spread 제외하고 모든 페이지 수집
  const pages = [...document.querySelectorAll('.pages .page:not(.page-spread-desktop)')];

  if (!pages.length) {
    alert('페이지를 먼저 불러오세요.');
    forceStyle.remove();
    topbar.style.display = '';
    btn.disabled = false;
    overlay.classList.remove('active');
    return;
  }

  try {
    const { jsPDF } = window.jspdf;
    const canvases  = [];

    // 1단계: 전체 캡처 (고정 390px 너비 기준)
    for (let i = 0; i < pages.length; i++) {
      sub.textContent = `캡처 중… (${i + 1} / ${pages.length})`;
      bar.style.width = `${Math.round((i / pages.length) * 80)}%`;

      const page = pages[i];
      const canvas = await html2canvas(page, {
        scale        : 2,
        useCORS      : true,
        allowTaint   : true,
        backgroundColor: null,
        scrollX      : 0,
        scrollY      : 0,
        width        : PDF_MOBILE_W,
        height       : page.scrollHeight,
        windowWidth  : PDF_MOBILE_W,      // 미디어쿼리도 모바일 기준 적용
        windowHeight : page.scrollHeight,
      });
      canvases.push(canvas);
    }

    // 2단계: PDF 조합
    sub.textContent = 'PDF 조합 중…';
    bar.style.width = '85%';

    let pdf = null;
    for (let i = 0; i < canvases.length; i++) {
      const canvas  = canvases[i];
      const ratio   = canvas.height / canvas.width;
      const pageH   = Math.round(PDF_W_MM * ratio);

      if (i === 0) {
        pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: [PDF_W_MM, pageH] });
      } else {
        pdf.addPage([PDF_W_MM, pageH], 'portrait');
      }
      const imgData = canvas.toDataURL('image/jpeg', 0.92);
      pdf.addImage(imgData, 'JPEG', 0, 0, PDF_W_MM, pageH);
    }

    bar.style.width  = '100%';
    sub.textContent  = '저장 중…';

    const issueId = new URLSearchParams(location.search).get('id') || 'magazine';
    pdf.save(`SAPMANRI_${issueId}.pdf`);

  } catch (e) {
    alert('PDF 생성 중 오류가 발생했습니다: ' + e.message);
    console.error(e);
  } finally {
    forceStyle.remove();       // 모바일 강제 스타일 제거
    topbar.style.display = '';
    btn.disabled = false;
    overlay.classList.remove('active');
    bar.style.width = '0%';
  }
}
</script>
</body>
</html>
