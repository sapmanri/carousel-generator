<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAPMANRI · Magazine Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Sans+KR:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1a1a;--s1:#222222;--s2:#2a2a2a;--s3:#323232;
  --border:#333333;--border2:#444444;
  --text:#ffffff;--muted:rgba(255,255,255,0.6);--dim:rgba(255,255,255,0.3);
  --accent:#b87a6e;--accent2:#8a5a50;--green:#8aaa88;--red:#c47a6a;--orange:#E8762C;
  --serif:"Gowun Batang","Cormorant Garamond",Georgia,serif;
  --sans:"Noto Sans KR","Helvetica Neue",Arial,sans-serif;
  --mono:'JetBrains Mono',monospace;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--sans);font-weight:300;min-height:100vh}
a{color:inherit}

header{
  height:48px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 20px;
}
.logo{font-family:var(--serif);font-size:14px;letter-spacing:0.08em;color:var(--muted)}
.logo em{color:var(--orange);font-style:normal}
.header-right{display:flex;align-items:center;gap:8px}
.btn-ghost{
  background:none;border:1px solid var(--border);color:var(--muted);
  font-family:var(--mono);font-size:10px;padding:5px 10px;border-radius:4px;cursor:pointer;
  transition:all .15s;white-space:nowrap;
}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.btn-ghost.ok{color:var(--green);border-color:var(--green)}
.key-field{
  background:var(--s1);border:1px solid var(--border);color:var(--text);
  font-family:var(--mono);font-size:11px;padding:5px 10px;border-radius:4px;
  width:0;overflow:hidden;opacity:0;transition:width .3s,opacity .3s;outline:none;
}
.key-field.open{width:190px;opacity:1}
.key-field:focus{border-color:var(--accent)}

.app{max-width:1100px;margin:0 auto;padding:20px;display:flex;flex-direction:column;gap:20px}

/* ── 섹션 ── */
.section{border:1px solid var(--border);border-radius:6px;padding:16px;background:var(--s1)}
.section-title{
  font-family:var(--mono);font-size:10px;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--dim);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;
}

/* ── 호 정보 ── */
.issue-meta{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.issue-meta .full{grid-column:1/-1}
.field label{display:block;font-size:10px;letter-spacing:0.1em;color:var(--dim);margin-bottom:6px;text-transform:uppercase}
.field input,.field textarea{
  width:100%;background:var(--s2);border:1px solid var(--border);color:var(--text);
  font-family:var(--sans);font-weight:300;font-size:13px;padding:8px 10px;border-radius:4px;outline:none;
}
.field input:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:60px;font-family:var(--serif);line-height:1.7}

/* ── 업로드 ── */
.upload-zone{
  border:1px dashed var(--border);border-radius:6px;padding:24px;text-align:center;
  cursor:pointer;transition:all .2s;color:var(--dim);font-size:12px;
}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--accent);color:var(--muted)}
.upload-zone input{display:none}

.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:10px;margin-top:14px}
.photo-card{
  position:relative;border:1px solid var(--border);border-radius:4px;overflow:hidden;
  cursor:grab;background:var(--s2);
}
.photo-card img{width:100%;aspect-ratio:1;object-fit:cover;display:block}
.photo-card .pc-num{
  position:absolute;top:4px;left:4px;background:rgba(0,0,0,0.6);color:var(--text);
  font-family:var(--mono);font-size:9px;padding:2px 5px;border-radius:3px;
}
.photo-card .pc-remove{
  position:absolute;top:4px;right:4px;width:18px;height:18px;border-radius:50%;
  background:var(--red);border:none;color:#fff;font-size:11px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;line-height:1;
}
.photo-card .pc-status{
  position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.55);
  color:var(--dim);font-family:var(--mono);font-size:8px;padding:3px 5px;letter-spacing:0.04em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.photo-card.analyzed .pc-status{color:var(--green)}
.photo-card.dragging{opacity:0.4}

/* ── 페이지 빌더 ── */
.page-list{display:flex;flex-direction:column;gap:10px}
.page-card{
  border:1px solid var(--border);border-radius:6px;background:var(--s2);
  padding:12px;display:flex;flex-direction:column;gap:10px;
}
.page-card-head{display:flex;align-items:center;justify-content:space-between;gap:8px}
.page-card-head .ptag{
  font-family:var(--mono);font-size:10px;letter-spacing:0.1em;color:var(--accent);
  background:var(--s3);padding:3px 8px;border-radius:3px;
}
.page-card-head select{
  background:var(--s1);border:1px solid var(--border);color:var(--text);
  font-family:var(--mono);font-size:10px;padding:4px 6px;border-radius:4px;
}
.page-card-head .pc-actions{display:flex;gap:6px;margin-left:auto}
.page-card-head .icon-btn{
  background:none;border:1px solid var(--border);color:var(--dim);
  width:24px;height:24px;border-radius:4px;cursor:pointer;font-size:12px;
  display:flex;align-items:center;justify-content:center;
}
.page-card-head .icon-btn:hover{color:var(--text);border-color:var(--border2)}
.page-card-body{display:flex;flex-direction:column;gap:8px}
.page-card-body .row{display:flex;gap:8px;flex-wrap:wrap}
.page-card-body .row input,
.page-card-body .row select,
.page-card-body .row textarea{
  background:var(--s2);border:1px solid var(--border);color:var(--text);
  font-family:var(--sans);font-weight:300;font-size:13px;padding:8px 10px;border-radius:4px;outline:none;
}
.page-card-body .row input:focus,
.page-card-body .row select:focus,
.page-card-body .row textarea:focus{border-color:var(--accent)}
.page-card-body .row input::placeholder,
.page-card-body .row textarea::placeholder{color:var(--dim)}
.page-card-body .row input{flex:1;min-width:0}
.page-card-body .row .w-fixed{flex:0 0 90px}
.page-card-body .row select{flex:none;cursor:pointer}
.page-card-body .row textarea{flex:1;font-family:var(--serif);line-height:1.7;resize:vertical;min-height:60px}
.thumb-pick{
  width:60px;height:60px;border:1px solid var(--border);border-radius:4px;object-fit:cover;
  cursor:pointer;background:var(--s1);flex-shrink:0;
}
.thumb-pick.empty{display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:9px;text-align:center;font-family:var(--mono)}
.thumb-pick.selected{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent2)}

.gen-row{display:flex;gap:6px;align-items:flex-start}
.gen-row textarea{flex:1}
.gen-row input{
  flex:1;background:var(--s2);border:1px solid var(--border);color:var(--text);
  font-family:var(--sans);font-weight:300;font-size:13px;padding:8px 10px;border-radius:4px;outline:none;
}
.gen-row input:focus{border-color:var(--accent)}
.gen-row input::placeholder{color:var(--dim)}
.btn-gen{
  background:var(--s3);border:1px solid var(--border);color:var(--text);
  font-family:var(--mono);font-size:10px;padding:8px 10px;border-radius:4px;cursor:pointer;
  white-space:nowrap;transition:all .15s;
}
.btn-gen:hover{border-color:var(--accent);color:var(--accent)}
.btn-gen:disabled{opacity:0.35;cursor:not-allowed}

.add-page-row{display:flex;gap:8px;flex-wrap:wrap}
.add-page-row select{
  background:var(--s2);border:1px solid var(--border);color:var(--text);
  font-family:var(--mono);font-size:11px;padding:7px 10px;border-radius:4px;flex:1;min-width:140px;
}
.btn-primary{
  background:var(--accent2);border:1px solid var(--accent);color:var(--text);
  font-family:var(--sans);font-size:12px;font-weight:400;padding:10px 16px;border-radius:4px;
  cursor:pointer;transition:all .15s;
}
.btn-primary:hover{background:var(--accent)}
.btn-primary:disabled{opacity:0.35;cursor:not-allowed}

/* ── 발행 영역 ── */
.publish-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.publish-status{font-family:var(--mono);font-size:11px;color:var(--dim)}
.publish-status.ok{color:var(--green)}
.publish-status.err{color:var(--red)}

/* ── 호 선택 ── */
.issue-select-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.issue-select-row select{
  background:var(--s2);border:1px solid var(--border);color:var(--text);
  font-family:var(--mono);font-size:11px;padding:7px 10px;border-radius:4px;flex:1;min-width:160px;
}

/* ── 미니 라벨 ── */
.hint{font-size:11px;color:var(--dim);line-height:1.6}

/* ── 토스트 ── */
.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--s3);border:1px solid var(--border2);color:var(--text);
  font-size:12px;padding:10px 18px;border-radius:6px;opacity:0;
  transition:all .25s;pointer-events:none;z-index:200;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.spinner{
  display:inline-block;width:10px;height:10px;border:1.5px solid var(--dim);
  border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;
  margin-right:6px;vertical-align:-1px;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header>
  <div class="logo"><em>SAPMANRI</em> · Magazine Editor</div>
  <div class="header-right">
    <input type="password" class="key-field" id="apiKeyField" placeholder="Anthropic API Key">
    <button class="btn-ghost" id="apiKeyBtn" onclick="toggleField('apiKeyField','apiKeyBtn',API_KEY_STORAGE)">API Key</button>
    <input type="password" class="key-field" id="ghTokenField" placeholder="GitHub Token">
    <button class="btn-ghost" id="ghTokenBtn" onclick="toggleField('ghTokenField','ghTokenBtn',GH_TOKEN_KEY)">GitHub</button>
    <a class="btn-ghost" href="./index.html" target="_blank">매거진 보기 ↗</a>
  </div>
</header>

<div class="app">

  <!-- 호 선택 -->
  <div class="section">
    <div class="section-title">발행 호 선택</div>
    <div class="issue-select-row">
      <select id="issueSelect" onchange="onIssueSelect()">
        <option value="__new__">+ 새 호 만들기</option>
      </select>
      <button class="btn-ghost" onclick="loadIssuesFromGithub()">새로고침</button>
      <button class="btn-ghost" id="hideIssueBtn" onclick="toggleHideIssue()" style="display:none">숨김</button>
      <button class="btn-ghost" id="deleteIssueBtn" onclick="deleteIssue()" style="display:none;color:var(--red,#e07070);border-color:var(--red,#e07070)">삭제</button>
    </div>
    <div class="hint" id="ghLoadStatus"></div>
  </div>

  <!-- 호 정보 -->
  <div class="section">
    <div class="section-title">호 정보</div>
    <div class="issue-meta">
      <div class="field"><label>ID (URL용, 영문/숫자/하이픈)</label><input id="fId" placeholder="2026-06-2"></div>
      <div class="field"><label>호 번호</label><input id="fNumber" placeholder="Vol. 12"></div>
      <div class="field"><label>제목</label><input id="fTitle" placeholder="내 손으로 만든 작은 불빛 하나"></div>
      <div class="field"><label>부제</label><input id="fSubtitle" placeholder="Wigong-ri, Gapyeong"></div>
      <div class="field"><label>발행일</label><input id="fDate" type="date"></div>
      <div class="field full"><label>유튜브 영상 링크 (선택)</label><input id="fYoutubeUrl" placeholder="https://www.youtube.com/watch?v=..."></div>
      <div class="field"><label>표지 이미지 (사진 업로드 후 선택)</label>
        <img id="fCoverPreview" class="thumb-pick empty" onclick="pickCover()">
      </div>
    </div>
  </div>

  <!-- 사진 업로드 -->
  <div class="section">
    <div class="section-title">사진 업로드 <span class="hint" id="photoCount"></span></div>
    <label class="upload-zone" id="uploadZone">
      여기를 클릭하거나 사진을 드래그해서 업로드하세요<br>
      <span class="hint">"전체 사진 분석"을 누르면 분석 + 페이지 구성 + 글까지 자동으로 채워드려요. 이후 자유롭게 수정하세요.</span>
      <input type="file" id="fileInput" accept="image/*" multiple onchange="onFilesSelected(this.files)">
    </label>
    <div class="photo-grid" id="photoGrid"></div>
    <div style="margin-top:10px;display:flex;gap:8px">
      <button class="btn-ghost" onclick="analyzeAllPhotos()">전체 사진 분석 → 자동 구성</button>
      <button class="btn-ghost" onclick="openMagazineLibraryPicker()">📁 라이브러리에서 선택</button>
      <span class="hint" id="analyzeStatus"></span>
    </div>
  </div>

  <!-- 페이지 빌더 -->
  <div class="section">
    <div class="section-title">페이지 구성</div>
    <div class="page-list" id="pageList"></div>
    <div class="add-page-row" style="margin-top:14px">
      <select id="newPageType">
        <option value="cover">표지 (Cover)</option>
        <option value="fullbleed">풀블리드 화보 (Full Bleed)</option>
        <option value="index">목차 (Index)</option>
        <option value="split">2단 사진+글 (Split)</option>
        <option value="grid">그리드 콜라주 (Grid)</option>
        <option value="quote">인용 (Quote)</option>
        <option value="spread">스프레드 (와이드 사진 2페이지)</option>
        <option value="essay">에세이 (글만)</option>
        <option value="dialogue">대화형 캡션</option>
        <option value="list">리스트 (레시피/정보)</option>
        <option value="milestone">마일스톤 (숫자/단어 강조)</option>
        <option value="botanical">보태니컬 (잡지 속 잡지)</option>
        <option value="closing">클로징 (Closing)</option>
      </select>
      <button class="btn-primary" onclick="addPage()">+ 페이지 추가</button>
    </div>
  </div>

  <!-- 발행 -->
  <div class="section">
    <div class="section-title">발행</div>
    <div class="publish-bar">
      <button class="btn-primary" onclick="publish()" id="publishBtn">발행하기 (GitHub에 저장)</button>
      <span class="publish-status" id="publishStatus"></span>
    </div>
    <div class="hint" style="margin-top:8px">
      사진은 <code>magazine/images/&lt;호ID&gt;/</code>로 커밋되고, 페이지 데이터는 <code>magazine/issues.json</code>에 저장됩니다.
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="./image-library.js?v=20260613b"></script>
<script src="./editor-core.js?v=20260613f"></script>
</body>
</html>
