<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAPMANRI · 감성찾아삽만리 매거진</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#E8762C;
  --cream:#FAF5EE;
  --dark:#120E0C;
  --sage:#B2CDA8;
  --hairline:rgba(255,255,255,0.08);
  --serif:"Gowun Batang",Georgia,serif;
  --sans:"Noto Sans KR","Helvetica Neue",Arial,sans-serif;
}
html,body{background:var(--dark);color:var(--cream);font-family:var(--sans);min-height:100vh}
a{color:inherit;text-decoration:none}

/* ── 상단 바 ── */
header{
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:28px 24px 18px;flex-wrap:wrap;gap:12px;
}
.wordmark{font-family:var(--serif);font-weight:700;font-size:28px;color:var(--orange);letter-spacing:0.06em}
.wordmark .sub{display:block;font-family:var(--sans);font-weight:300;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-top:4px}
.wordmark .build-tag{display:block;font-family:var(--mono,monospace);font-weight:300;font-size:9px;letter-spacing:0.08em;color:rgba(255,255,255,0.25);margin-top:6px;text-transform:none}
.meta{text-align:right;font-size:11px;letter-spacing:0.08em;color:rgba(255,255,255,0.45);line-height:1.8}
.meta .vol{color:var(--sage)}

/* ── 정렬 토글 ── */
.toolbar{
  display:flex;justify-content:space-between;align-items:center;
  padding:0 24px 18px;border-bottom:1px solid var(--hairline);
}
.sort-toggle{display:flex;gap:14px;font-size:11px;letter-spacing:0.1em;color:rgba(255,255,255,0.35)}
.sort-toggle button{background:none;border:none;color:inherit;font-family:var(--sans);font-size:11px;letter-spacing:0.1em;cursor:pointer;padding:0;transition:color .15s}
.sort-toggle button.active{color:var(--orange)}
.count{font-size:11px;letter-spacing:0.1em;color:rgba(255,255,255,0.35)}

/* ── 그리드: 불규칙한 벤토 레이아웃 ── */
.grid{
  display:grid;grid-template-columns:repeat(6,1fr);grid-auto-flow:dense;
  gap:10px;padding:24px;
}
@media(min-width:640px){.grid{gap:14px}}
@media(min-width:980px){.grid{gap:18px;padding:32px}}

.card{display:block;cursor:pointer;position:relative;grid-column:span 3;grid-row:span 1}
.card .thumb-wrap{
  position:relative;width:100%;aspect-ratio:4/5;overflow:hidden;
  background:#1d1815;border-radius:1px;
}
.card .thumb-wrap img{
  width:100%;height:100%;object-fit:cover;display:block;
  transition:transform .6s cubic-bezier(.2,.7,.2,1);
}
.card:hover .thumb-wrap img{transform:scale(1.04)}
.card .thumb-wrap::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(0,0,0,0) 40%,rgba(0,0,0,0.75) 100%);
  pointer-events:none;
}
.card .num{
  position:absolute;top:10px;left:12px;font-family:var(--serif);font-weight:700;
  font-size:14px;color:var(--orange);text-shadow:0 1px 4px rgba(0,0,0,.5);z-index:2;
}
.card .overlay-text{
  position:absolute;left:12px;right:12px;bottom:10px;z-index:2;
}
.card .title{font-family:var(--serif);font-size:14px;line-height:1.35;color:var(--cream)}
.card .sub{font-size:10px;letter-spacing:0.05em;color:rgba(255,255,255,0.55);margin-top:3px}

/* 불규칙 크기 패턴 — 6칸 그리드 기준으로 너비와 비율을 다양하게 섞음 */
.card.size-big{grid-column:span 4}
.card.size-big .thumb-wrap{aspect-ratio:16/10}
.card.size-big .title{font-size:20px;font-weight:700}
.card.size-big .num{font-size:20px}

.card.size-wide{grid-column:span 2}
.card.size-wide .thumb-wrap{aspect-ratio:4/5}
.card.size-wide .title{font-size:13px;font-weight:300}

.card.size-tall{grid-column:span 2}
.card.size-tall .thumb-wrap{aspect-ratio:16/10}
.card.size-tall .title{font-size:18px;font-weight:500}
.card.size-tall .num{font-size:18px}

.card.size-square{grid-column:span 3}
.card.size-square .thumb-wrap{aspect-ratio:1/1}
.card.size-square .title{font-size:15px;font-weight:400}

.card.size-small{grid-column:span 2}
.card.size-small .thumb-wrap{aspect-ratio:1/1}
.card.size-small .title{font-size:12px;font-weight:300}
.card.size-small .num{font-size:11px}

@media(max-width:639px){
  /* 모바일: 6칸 기준 span 절반으로 압축, 너무 잘게 쪼개지지 않도록 */
  .card.size-big{grid-column:span 6}
  .card.size-big .thumb-wrap{aspect-ratio:16/10}
  .card.size-wide{grid-column:span 4}
  .card.size-wide .thumb-wrap{aspect-ratio:3/2}
  .card.size-tall{grid-column:span 3}
  .card.size-tall .thumb-wrap{aspect-ratio:4/5}
  .card.size-square{grid-column:span 3}
  .card.size-small{grid-column:span 3}
}

@media(min-width:980px){
  .card .title{font-size:16px}
  .card.size-big .title{font-size:26px}
  .card.size-tall .title{font-size:20px}
}

/* ── 피처드(최신호) 카드 — Feldman 큰 타일 ── */
.featured{
  grid-column:1/-1;position:relative;width:100%;aspect-ratio:16/10;overflow:hidden;
  border-radius:1px;cursor:pointer;background:#1d1815;margin-bottom:4px;
}
@media(min-width:640px){.featured{aspect-ratio:21/9}}
.featured img{
  width:100%;height:100%;object-fit:cover;display:block;
  transition:transform .8s cubic-bezier(.2,.7,.2,1);
}
.featured:hover img{transform:scale(1.02)}
.featured::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(0,0,0,0) 35%,rgba(0,0,0,0.8) 100%);
  pointer-events:none;
}
.featured .featured-inner{
  position:absolute;left:16px;right:16px;bottom:16px;z-index:2;
  display:flex;justify-content:space-between;align-items:flex-end;gap:16px;
}
.featured .featured-tag{
  font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--orange);margin-bottom:8px;
}
.featured .featured-title{
  font-family:var(--serif);font-size:24px;line-height:1.3;color:var(--cream);
}
.featured .featured-sub{font-size:11px;letter-spacing:0.05em;color:rgba(255,255,255,0.55);margin-top:6px}
.featured .featured-num{
  font-family:var(--serif);font-weight:700;font-size:36px;color:var(--orange);
  text-shadow:0 1px 6px rgba(0,0,0,.5);flex-shrink:0;
}
@media(min-width:640px){
  .featured .featured-inner{left:32px;right:32px;bottom:32px}
  .featured .featured-title{font-size:42px}
  .featured .featured-num{font-size:64px}
}

/* ── 빈 상태 ── */
.empty{
  grid-column:1/-1;text-align:center;padding:80px 20px;color:rgba(255,255,255,0.3);
  font-size:12px;letter-spacing:0.08em;line-height:2;
}
.empty .big{font-family:var(--serif);font-size:20px;color:rgba(255,255,255,0.5);display:block;margin-bottom:10px}

/* ── 하단 워터마크 ── */
footer{
  padding:60px 24px 40px;text-align:right;overflow:hidden;
}
footer .water{
  font-family:var(--serif);font-style:italic;font-size:54px;
  color:rgba(255,255,255,0.06);letter-spacing:0.02em;white-space:nowrap;
}
@media(min-width:980px){footer .water{font-size:96px}}
footer .tag{font-size:10px;letter-spacing:0.18em;color:rgba(255,255,255,0.25);text-transform:uppercase;margin-top:-8px}
</style>
</head>
<body>

<header>
  <div class="wordmark">SAPMANRI<span class="sub">오늘도 느리게 · slow days</span><span class="build-tag">Last update: 2026-06-13 14:55 KST</span></div>
  <div class="meta" id="metaInfo">불러오는 중…</div>
</header>

<div class="toolbar">
  <div class="sort-toggle">
    <button class="active" onclick="setSort('latest')" id="sortLatest">최신순</button>
    <button onclick="setSort('alpha')" id="sortAlpha">가나다순</button>
  </div>
  <div style="display:flex;align-items:center;gap:14px">
    <a href="../postcards/index.html" class="count" style="color:var(--orange)">postcards ↗</a>
    <div class="count" id="countLabel"></div>
  </div>
</div>

<div class="grid" id="grid">
  <div class="empty">불러오는 중…</div>
</div>

<footer>
  <div class="water">Projects</div>
  <div class="tag">감성찾아삽만리 · slow living, rural korea</div>
</footer>

<script>
let issues = [];
let sortMode = 'latest';

async function load() {
  try {
    const res = await fetch('./issues.json?t=' + Date.now(), { cache: 'no-store' });
    const data = await res.json();
    issues = (data.issues || []).filter(iss => !iss.hidden);
  } catch (e) {
    issues = [];
  }
  render();
}

function setSort(mode) {
  sortMode = mode;
  document.getElementById('sortLatest').classList.toggle('active', mode === 'latest');
  document.getElementById('sortAlpha').classList.toggle('active', mode === 'alpha');
  render();
}

function render() {
  const grid = document.getElementById('grid');
  const meta = document.getElementById('metaInfo');
  const count = document.getElementById('countLabel');

  if (!issues.length) {
    grid.innerHTML = `<div class="empty"><span class="big">아직 발행된 호가 없어요</span>editor.html에서 첫 호를 만들어보세요</div>`;
    meta.textContent = '';
    count.textContent = '';
    return;
  }

  const sorted = [...issues].sort((a, b) => {
    if (sortMode === 'alpha') return (a.title || '').localeCompare(b.title || '', 'ko');
    return (b.date || '').localeCompare(a.date || '');
  });

  const latest = [...issues].sort((a, b) => (b.date || '').localeCompare(a.date || ''))[0];
  meta.innerHTML = `<span class="vol">${esc(latest.number || latest.id || '')}</span><br>${esc(latest.date || '')}`;
  count.textContent = `총 ${issues.length}개의 이야기`;

  const totalNum = (issue) => String(issues.length - issues.findIndex(x => x.id === issue.id)).padStart(2, '0');

  let html = '';
  // 최신순 정렬일 때만 첫 항목을 큰 피처드 타일로
  if (sortMode === 'latest' && sorted.length > 0) {
    const featured = sorted[0];
    html += `
    <a class="featured" href="./issue.html?id=${encodeURIComponent(featured.id)}">
      <img src="${esc(featured.cover || '')}" alt="${esc(featured.title || '')}" loading="lazy" onerror="this.style.opacity=0">
      <div class="featured-inner">
        <div>
          <div class="featured-tag">Latest · ${esc(featured.date || featured.number || '')}</div>
          <div class="featured-title">${esc(featured.title || featured.id || '제목 없음')}</div>
          <div class="featured-sub">${esc(featured.subtitle || '')}</div>
        </div>
        <div class="featured-num">${totalNum(featured)}.</div>
      </div>
    </a>`;
  }

  const rest = (sortMode === 'latest') ? sorted.slice(1) : sorted;
  // 6칸 그리드 기준, 합이 6이 되도록 묶은 사이즈 패턴을 반복 — 큰/작은/넓은/좁은 타일이 불규칙하게 섞임
  const sizePattern = ['size-big', 'size-small', 'size-square', 'size-square', 'size-tall', 'size-tall', 'size-wide', 'size-wide', 'size-small', 'size-big'];
  html += rest.map((issue, i) => {
    const sizeCls = sizePattern[i % sizePattern.length];
    return `
    <a class="card ${sizeCls}" href="./issue.html?id=${encodeURIComponent(issue.id)}">
      <div class="thumb-wrap">
        <img src="${esc(issue.cover || '')}" alt="${esc(issue.title || '')}" loading="lazy" onerror="this.style.opacity=0">
        <div class="num">${totalNum(issue)}.</div>
        <div class="overlay-text">
          <div class="title">${esc(issue.title || issue.id || '제목 없음')}</div>
          <div class="sub">${esc(issue.subtitle || issue.date || '')}</div>
        </div>
      </div>
    </a>`;
  }).join('');

  grid.innerHTML = html;
}

function esc(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

load();
</script>
</body>
</html>
