<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sapmanri tools</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #e8e8e8;
    font-family: 'Georgia', serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container {
    text-align: center;
    padding: 40px 20px;
  }
  .brand {
    font-size: 13px;
    letter-spacing: 0.2em;
    color: #666;
    margin-bottom: 48px;
    text-transform: lowercase;
  }
  .tools {
    display: flex;
    flex-direction: column;
    gap: 16px;
    align-items: center;
  }
  a {
    display: block;
    width: 300px;
    padding: 20px 32px;
    border: 1px solid #2a2a2a;
    color: #e8e8e8;
    text-decoration: none;
    font-size: 14px;
    letter-spacing: 0.05em;
    transition: border-color 0.2s, color 0.2s;
  }
  a:hover {
    border-color: #666;
    color: #fff;
  }
  a .sub {
    display: block;
    font-size: 11px;
    color: #555;
    margin-top: 4px;
    letter-spacing: 0.08em;
  }
  a:hover .sub { color: #888; }
</style>
</head>
<body>
<div class="container">
  <div class="brand">@sapmanri</div>
  <div class="tools">
    <a href="/skyline_music_matcher.html">
      Skyline Music Matcher
      <span class="sub">능선 × 음악</span>
    </a>
    <a href="/carousel_ai_generator.html">
      Carousel Generator
      <span class="sub">카드 슬라이드 생성기</span>
    </a>
    <a href="/writing_studio.html">
      Writing Studio
      <span class="sub">글쓰기 도구</span>
    </a>
    <a href="/design_docs.html">
      Design Docs
      <span class="sub">디자인 시스템 모음</span>
    </a>
  </div>
</div>
</body>
</html>
