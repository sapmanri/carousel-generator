<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAPMANRI Design Docs</title>
<style>
  :root {
    --orange: #E8762C;
    --terracotta: #C8633A;
    --cream: #FAF5EE;
    --sage: #B2CDA8;
    --dark: #120E0C;
    --bg: #0a0a0a;
    --panel: #151312;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --muted: #888;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Georgia', serif;
    min-height: 100vh;
    line-height: 1.6;
  }
  header {
    padding: 48px 24px 24px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  header .brand {
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--orange);
    text-transform: lowercase;
    margin-bottom: 12px;
  }
  header h1 {
    font-size: 28px;
    font-weight: normal;
    margin-bottom: 8px;
  }
  header p {
    font-size: 13px;
    color: var(--muted);
    font-family: 'Helvetica Neue', Arial, sans-serif;
  }
  header a.back {
    display: inline-block;
    margin-top: 20px;
    font-size: 12px;
    color: var(--muted);
    text-decoration: none;
    border: 1px solid var(--border);
    padding: 8px 18px;
    letter-spacing: 0.05em;
    transition: border-color 0.2s, color 0.2s;
  }
  header a.back:hover { border-color: var(--orange); color: var(--orange); }

  .grid {
    max-width: 1000px;
    margin: 0 auto;
    padding: 40px 24px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 28px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .card:hover {
    border-color: var(--orange);
    transform: translateY(-2px);
  }
  .card .id-label {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--orange);
    text-transform: uppercase;
  }
  .card h2 {
    font-size: 20px;
    font-weight: normal;
    color: var(--text);
  }
  .card .subtitle {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 12px;
    color: var(--muted);
  }
  .card .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .card .tags span {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 10px;
    letter-spacing: 0.05em;
    color: var(--sage);
    border: 1px solid #2f3a2a;
    padding: 3px 8px;
    border-radius: 2px;
  }

  /* Modal viewer */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
    overflow-y: auto;
  }
  .overlay.active { display: flex; }
  .modal {
    background: var(--cream);
    color: var(--dark);
    max-width: 760px;
    width: 100%;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .modal-header {
    background: var(--dark);
    color: var(--cream);
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
  }
  .modal-header .modal-title {
    font-size: 14px;
    letter-spacing: 0.05em;
    font-family: 'Helvetica Neue', Arial, sans-serif;
  }
  .modal-header button {
    background: none;
    border: 1px solid var(--orange);
    color: var(--orange);
    font-size: 12px;
    padding: 6px 14px;
    cursor: pointer;
    letter-spacing: 0.05em;
    font-family: 'Helvetica Neue', Arial, sans-serif;
  }
  .modal-header button:hover {
    background: var(--orange);
    color: var(--dark);
  }
  .modal-body {
    padding: 32px 36px 48px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 14px;
    line-height: 1.85;
  }
  .modal-body h1, .modal-body h2, .modal-body h3 {
    font-family: 'Georgia', serif;
    color: var(--terracotta);
    margin: 28px 0 12px;
    line-height: 1.3;
  }
  .modal-body h1 { font-size: 24px; border-bottom: 2px solid var(--orange); padding-bottom: 8px;}
  .modal-body h2 { font-size: 19px; }
  .modal-body h3 { font-size: 16px; }
  .modal-body p { margin: 10px 0; }
  .modal-body ul, .modal-body ol { margin: 10px 0 10px 24px; }
  .modal-body li { margin: 4px 0; }
  .modal-body code {
    background: #ece4d8;
    padding: 2px 5px;
    border-radius: 3px;
    font-size: 12.5px;
  }
  .modal-body hr {
    border: none;
    border-top: 1px solid #ddd0bf;
    margin: 24px 0;
  }
  .modal-body table {
    width: 100%;
    border-collapse: collapse;
    margin: 12px 0;
    font-size: 13px;
  }
  .modal-body th, .modal-body td {
    border: 1px solid #ddd0bf;
    padding: 8px 10px;
    text-align: left;
  }
  .modal-body th { background: #f0e6d8; color: var(--terracotta); }
  .modal-body strong { color: var(--terracotta); }

  .loading, .error {
    text-align: center;
    color: var(--muted);
    padding: 60px 20px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 13px;
    grid-column: 1 / -1;
  }
</style>
</head>
<body>

<header>
  <div class="brand">@sapmanri</div>
  <h1>Design Docs</h1>
  <p>채널 디자인 시스템 · 매거진 스타일 가이드 모음</p>
  <a class="back" href="./index.html">← sapmanri tools</a>
</header>

<div class="grid" id="grid">
  <div class="loading">불러오는 중...</div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle"></span>
      <button onclick="closeModal()">닫기 ✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
const BASE = 'https://raw.githubusercontent.com/sapmanri/carousel-generator/main/design-docs/';

async function loadGallery() {
  const grid = document.getElementById('grid');
  try {
    const res = await fetch(BASE + 'manifest.json?t=' + Date.now());
    const docs = await res.json();
    grid.innerHTML = '';
    docs.forEach(doc => {
      const card = document.createElement('div');
      card.className = 'card';
      card.onclick = () => openDoc(doc);
      card.innerHTML = `
        <div class="id-label">${doc.id}</div>
        <h2>${doc.title}</h2>
        <div class="subtitle">${doc.subtitle || ''}</div>
        <div class="tags">${(doc.tags||[]).map(t => `<span>${t}</span>`).join('')}</div>
      `;
      grid.appendChild(card);
    });
  } catch (e) {
    grid.innerHTML = '<div class="error">목록을 불러오지 못했습니다: ' + e.message + '</div>';
  }
}

// Minimal markdown -> HTML renderer (tables, headers, lists, bold, code, hr)
function renderMarkdown(md) {
  const lines = md.split('\n');
  let html = '';
  let inList = false;
  let inTable = false;
  let tableRows = [];

  function flushList() {
    if (inList) { html += '</ul>'; inList = false; }
  }
  function flushTable() {
    if (inTable) {
      html += '<table>';
      tableRows.forEach((cells, i) => {
        const tag = i === 0 ? 'th' : 'td';
        html += '<tr>' + cells.map(c => `<${tag}>${inline(c)}</${tag}>`).join('') + '</tr>';
      });
      html += '</table>';
      inTable = false;
      tableRows = [];
    }
  }
  function inline(text) {
    return text
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/`(.+?)`/g, '<code>$1</code>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>');
  }

  for (let raw of lines) {
    const line = raw.trimEnd();

    if (/^\s*\|.*\|\s*$/.test(line)) {
      if (/^\s*\|[\s:|-]+\|\s*$/.test(line)) continue; // separator row
      const cells = line.split('|').slice(1, -1).map(c => c.trim());
      inTable = true;
      tableRows.push(cells);
      continue;
    } else {
      flushTable();
    }

    if (line.startsWith('### ')) { flushList(); html += `<h3>${inline(line.slice(4))}</h3>`; continue; }
    if (line.startsWith('## ')) { flushList(); html += `<h2>${inline(line.slice(3))}</h2>`; continue; }
    if (line.startsWith('# ')) { flushList(); html += `<h1>${inline(line.slice(2))}</h1>`; continue; }
    if (line === '---') { flushList(); html += '<hr>'; continue; }
    if (/^[-*]\s+/.test(line)) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += `<li>${inline(line.replace(/^[-*]\s+/, ''))}</li>`;
      continue;
    }
    if (/^\d+\.\s+/.test(line)) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += `<li>${inline(line.replace(/^\d+\.\s+/, ''))}</li>`;
      continue;
    }
    flushList();
    if (line === '') { continue; }
    html += `<p>${inline(line)}</p>`;
  }
  flushList();
  flushTable();
  return html;
}

async function openDoc(doc) {
  const overlay = document.getElementById('overlay');
  const title = document.getElementById('modalTitle');
  const body = document.getElementById('modalBody');
  title.textContent = doc.title;
  body.innerHTML = '<p style="text-align:center;color:#999;">불러오는 중...</p>';
  overlay.classList.add('active');
  try {
    const res = await fetch(BASE + doc.file + '?t=' + Date.now());
    const text = await res.text();
    body.innerHTML = renderMarkdown(text);
  } catch (e) {
    body.innerHTML = '<p>문서를 불러오지 못했습니다: ' + e.message + '</p>';
  }
}

function closeModal() {
  document.getElementById('overlay').classList.remove('active');
}
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target.id === 'overlay') closeModal();
});

loadGallery();
</script>

</body>
</html>
