<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>감성찾아삽만리 · Design Docs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1a1a;--canvas:#faf9f7;--paper:#f2f0ec;--paper-warm:#ede9e3;
  --mid:#888580;--mute:#b5b2ad;--hairline:#d8d5d0;
  --accent:#b87a6e;
  --serif:"Cormorant Garamond","Noto Serif KR",Georgia,serif;
  --sans:"Noto Sans KR","Helvetica Neue",Arial,sans-serif;
}
body{background:#1a1a1a;font-family:var(--sans);color:#fff;min-height:100vh;padding:24px 16px}
.app{max-width:960px;margin:0 auto;display:flex;flex-direction:column;gap:16px}

.header{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:10px}
.logo{font-family:var(--serif);font-size:18px;font-weight:300;color:var(--canvas);letter-spacing:0.04em}
.logo span{font-family:var(--sans);font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--mute);display:block;margin-top:2px}
.back-link{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--mute);text-decoration:none;border:1px solid rgba(255,255,255,0.1);border-radius:2px;padding:7px 14px;transition:border-color 0.2s,color 0.2s}
.back-link:hover{border-color:rgba(255,255,255,0.3);color:var(--canvas)}

.section-label{font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--mute);margin:8px 0 -4px}

/* card grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.card{
  display:flex;flex-direction:column;gap:0;
  border:1px solid rgba(255,255,255,0.08);border-radius:2px;
  background:rgba(255,255,255,0.02);cursor:pointer;overflow:hidden;
  transition:border-color 0.2s,background 0.2s;
}
.card:hover{border-color:rgba(255,255,255,0.25);background:rgba(255,255,255,0.04)}
.card .thumb{width:100%;aspect-ratio:16/10;background:#111;overflow:hidden;display:block;border-bottom:1px solid rgba(255,255,255,0.08)}
.card .thumb img,.card .thumb svg{width:100%;height:100%;display:block;object-fit:cover}
.card .card-body{padding:14px 16px 16px;display:flex;flex-direction:column;gap:6px}
.card .id-label{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent)}
.card .name{font-family:var(--serif);font-size:17px;font-weight:300;color:var(--canvas);letter-spacing:0.02em}
.card .desc{font-size:11px;color:var(--mute);letter-spacing:0.04em}
.card .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.card .tags span{font-size:9px;letter-spacing:0.06em;color:var(--mute);border:0.5px solid rgba(255,255,255,0.12);border-radius:2px;padding:3px 8px}

.loading,.error{grid-column:1/-1;text-align:center;color:var(--mute);padding:48px 16px;font-size:12px;letter-spacing:0.06em}

/* modal viewer */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.overlay.active{display:flex}
.modal{background:var(--canvas);color:var(--ink);max-width:760px;width:100%;border-radius:2px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.modal-header{background:var(--ink);color:var(--canvas);padding:14px 22px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0}
.modal-header .modal-title{font-family:var(--serif);font-size:15px;font-weight:300;letter-spacing:0.02em}
.modal-header button{background:none;border:1px solid var(--accent);color:var(--accent);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;padding:6px 14px;border-radius:2px;cursor:pointer;font-family:var(--sans);transition:background 0.15s,color 0.15s}
.modal-header button:hover{background:var(--accent);color:var(--ink)}
.modal-body{padding:30px 34px 46px;font-family:var(--sans);font-size:13px;line-height:1.85}
.modal-body h1,.modal-body h2,.modal-body h3{font-family:var(--serif);font-weight:400;color:var(--accent);margin:26px 0 12px;line-height:1.3}
.modal-body h1{font-size:24px;border-bottom:1px solid var(--hairline);padding-bottom:8px}
.modal-body h2{font-size:19px}
.modal-body h3{font-size:16px}
.modal-body p{margin:10px 0}
.modal-body ul,.modal-body ol{margin:10px 0 10px 22px}
.modal-body li{margin:4px 0}
.modal-body code{background:var(--paper);padding:2px 5px;border-radius:2px;font-size:12px}
.modal-body hr{border:none;border-top:1px solid var(--hairline);margin:22px 0}
.modal-body table{width:100%;border-collapse:collapse;margin:12px 0;font-size:12.5px}
.modal-body th,.modal-body td{border:1px solid var(--hairline);padding:8px 10px;text-align:left}
.modal-body th{background:var(--paper);color:var(--accent)}
.modal-body strong{color:var(--accent)}

footer{font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.18);text-align:center;padding:24px 0 8px}
</style>
</head>
<body>
<div class="app">

<div class="header">
  <div class="logo">감성찾아삽만리<span>Design Docs v1.0.0</span></div>
  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
    <div id="ghKeyWrap" style="display:flex;align-items:center;gap:8px">
      <input type="password" id="ghTokenInput" placeholder="github_pat_... (md 수정 권한)" autocomplete="off"
        style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:2px;padding:6px 10px;color:#fff;font-family:sans-serif;font-size:11px;outline:none;width:210px"
        oninput="saveGhToken(this.value)" />
    </div>
    <div id="ghKeyStatus" style="display:none;cursor:pointer;font-size:10px;letter-spacing:0.1em;color:var(--mute);text-transform:uppercase;padding:6px 10px;border:0.5px solid rgba(255,255,255,0.1);border-radius:2px"
      onclick="document.getElementById('ghKeyWrap').style.display='flex';document.getElementById('ghKeyStatus').style.display='none';">🗂 연결됨</div>
    <a class="back-link" href="/index.html">← Tools</a>
  </div>
</div>

<div class="section-label">디자인 시스템 모음 · 매거진 스타일 가이드</div>

<div class="grid" id="grid">
  <div class="loading">불러오는 중...</div>
</div>

<footer>@sapmanri · carousel-generator</footer>

</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle"></span>
      <button onclick="closeModal()">닫기 ✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ── GitHub Token (캐러셀 생성기 / Skyline과 동일한 키 공유) ──
const GH_TOKEN_KEY = 'cg_sapmanri_gh_token';
function getGhToken() {
  try { return localStorage.getItem(GH_TOKEN_KEY) || ''; } catch(e) { return ''; }
}
function saveGhToken(val) {
  try { localStorage.setItem(GH_TOKEN_KEY, val); } catch(e) {}
  updateGhKeyVisibility();
}
function updateGhKeyVisibility() {
  const token = getGhToken();
  const wrap = document.getElementById('ghKeyWrap');
  const status = document.getElementById('ghKeyStatus');
  if (!wrap || !status) return;
  if (token) { wrap.style.display = 'none'; status.style.display = 'block'; }
  else { wrap.style.display = 'flex'; status.style.display = 'none'; }
}
window.addEventListener('load', () => {
  const saved = getGhToken();
  const input = document.getElementById('ghTokenInput');
  if (saved && input) input.value = saved;
  updateGhKeyVisibility();
});

const BASE = 'https://raw.githubusercontent.com/sapmanri/carousel-generator/main/design-docs/';

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderThumb(doc) {
  if (doc.thumbnail) {
    return `<img src="${BASE}${doc.thumbnail}" alt="${esc(doc.title)}" loading="lazy" onerror="this.parentElement.innerHTML = svgFor(window.__docs.find(d=>d.id==='${doc.id}'))">`;
  }
  return svgFor(doc);
}

function svgFor(doc) {
  const p = (doc && doc.preview) || {};
  const pal = p.palette && p.palette.length === 4 ? p.palette : ['#E8762C', '#FAF5EE', '#B2CDA8', '#120E0C'];
  const [orange, cream, sage, dark] = pal;
  if (p.type === 'grid') {
    return svgGrid(p, orange, cream, sage, dark);
  }
  if (p.type === 'swatch') {
    return svgSwatch(p, pal);
  }
  return svgCover(p, orange, cream, sage, dark);
}

// Mini palette + type sample diagram (for carousel style guides)
function svgSwatch(p, pal) {
  const [c1, c2, c3, c4] = pal;
  const name = esc(p.name || 'STYLE');
  const sample = esc(p.sample || '디자인 시스템');
  const fonts = (p.fonts || []).join(' / ');
  // text color chosen for contrast against c2 (the "canvas" color of the style)
  const isLightCanvas = (() => {
    const hex = c2.replace('#','');
    const r = parseInt(hex.substr(0,2),16), g = parseInt(hex.substr(2,2),16), b = parseInt(hex.substr(4,2),16);
    return (r*299 + g*587 + b*114) / 1000 > 140;
  })();
  const textColor = isLightCanvas ? '#1a1a1a' : '#ffffff';
  const muteColor = isLightCanvas ? '#888580' : 'rgba(255,255,255,0.5)';
  return `
  <svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
    <rect width="320" height="200" fill="${c2}"/>
    <text x="24" y="36" font-family="Georgia, serif" font-size="22" font-weight="300" fill="${textColor}" letter-spacing="2">${name}</text>
    <text x="24" y="54" font-family="Helvetica, Arial, sans-serif" font-size="7" fill="${muteColor}" letter-spacing="1">${esc(fonts)}</text>
    <text x="24" y="120" font-family="Georgia, serif" font-size="17" font-weight="300" fill="${textColor}">${sample}</text>
    <text x="24" y="142" font-family="Helvetica, Arial, sans-serif" font-style="italic" font-size="8" fill="${muteColor}">Aa Bb Cc · 가나다라</text>
    <g transform="translate(24,164)">
      <rect x="0" y="0" width="28" height="20" fill="${c1}"/>
      <rect x="32" y="0" width="28" height="20" fill="${c2}" stroke="${muteColor}" stroke-width="0.5"/>
      <rect x="64" y="0" width="28" height="20" fill="${c3}"/>
      <rect x="96" y="0" width="28" height="20" fill="${c4}"/>
    </g>
    <text x="296" y="190" font-family="Helvetica, Arial, sans-serif" font-size="7" fill="${muteColor}" text-anchor="end" letter-spacing="2">SAPMANRI CAROUSEL</text>
  </svg>`;
}


// Mini cover-layout diagram (based on jeonwon_magazine_style.md structure)
function svgCover(p, orange, cream, sage, dark) {
  const wordmark = esc(p.wordmark || 'SAPMANRI');
  const sub = esc(p.sub || '');
  const label = esc(p.label || '');
  const headline = (p.headline && p.headline.length) ? p.headline : ['헤드라인', '두 줄'];
  return `
  <svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
    <rect width="320" height="200" fill="${dark}"/>
    <rect x="0" y="0" width="320" height="200" fill="${dark}" opacity="0.92"/>
    <rect x="40" y="60" width="240" height="110" fill="${sage}" opacity="0.18"/>
    <rect x="60" y="80" width="200" height="70" fill="${sage}" opacity="0.25"/>
    <text x="160" y="32" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="${orange}" text-anchor="middle" letter-spacing="3">${wordmark}</text>
    <text x="160" y="46" font-family="Helvetica, Arial, sans-serif" font-size="7" fill="${sage}" text-anchor="middle" letter-spacing="1">${sub}</text>
    <rect x="22" y="64" width="32" height="14" fill="${orange}"/>
    <text x="38" y="74" font-family="Helvetica, Arial, sans-serif" font-size="7" fill="${dark}" text-anchor="middle">${label}</text>
    <text x="22" y="98" font-family="Georgia, serif" font-size="15" fill="${cream}" font-weight="bold">${esc(headline[0])}</text>
    <text x="22" y="116" font-family="Georgia, serif" font-size="15" fill="${cream}" font-weight="bold">${esc(headline[1] || '')}</text>
    <text x="22" y="186" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="${cream}" font-weight="bold">2026</text>
    <text x="46" y="186" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="${sage}">| 6월 2주</text>
    <line x1="200" y1="160" x2="298" y2="160" stroke="${orange}" stroke-width="1" opacity="0.5"/>
    <text x="298" y="172" font-family="Helvetica, Arial, sans-serif" font-size="7" fill="${cream}" text-anchor="end">장미 울타리 · 쥘리 앙드리외</text>
    <text x="298" y="184" font-family="Helvetica, Arial, sans-serif" font-size="7" fill="${cream}" text-anchor="end">직조 전등 만들기</text>
  </svg>`;
}

// Mini carousel-grid diagram (based on magazine_inner_pages.md page types)
function svgGrid(p, orange, cream, sage, dark) {
  const n = p.pages || 7;
  const cols = 4, rows = 2;
  const pad = 8, gap = 6;
  const cellW = (320 - pad * 2 - gap * (cols - 1)) / cols;
  const cellH = (200 - pad * 2 - gap * (rows - 1)) / rows;
  let cells = '';
  const fills = [orange, cream, sage, dark, cream, sage, orange, dark];
  for (let i = 0; i < cols * rows; i++) {
    const col = i % cols, row = Math.floor(i / cols);
    const x = pad + col * (cellW + gap);
    const y = pad + row * (cellH + gap);
    if (i < n) {
      const fill = fills[i % fills.length];
      const txtFill = (fill === cream) ? dark : cream;
      cells += `<rect x="${x}" y="${y}" width="${cellW}" height="${cellH}" fill="${fill}" opacity="0.85"/>`;
      cells += `<text x="${x + 6}" y="${y + 16}" font-family="Helvetica, Arial, sans-serif" font-size="9" font-weight="bold" fill="${txtFill}">${String(i+1).padStart(2,'0')}</text>`;
    } else {
      cells += `<rect x="${x}" y="${y}" width="${cellW}" height="${cellH}" fill="${dark}" opacity="0.3" stroke="${orange}" stroke-width="0.5" stroke-dasharray="3 3"/>`;
    }
  }
  return `
  <svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
    <rect width="320" height="200" fill="${dark}"/>
    ${cells}
    <text x="160" y="195" font-family="Helvetica, Arial, sans-serif" font-size="8" fill="${orange}" text-anchor="middle" letter-spacing="2">SAPMANRI · ${n}-PAGE CAROUSEL</text>
  </svg>`;
}

async function loadGallery() {
  const grid = document.getElementById('grid');
  try {
    const res = await fetch(BASE + 'manifest.json?t=' + Date.now());
    const docs = await res.json();
    window.__docs = docs;
    grid.innerHTML = '';
    docs.forEach(doc => {
      const card = document.createElement('div');
      card.className = 'card';
      card.onclick = () => openDoc(doc);
      card.innerHTML = `
        <div class="thumb">${renderThumb(doc)}</div>
        <div class="card-body">
          <div class="id-label">${doc.id}</div>
          <div class="name">${doc.title}</div>
          <div class="desc">${doc.subtitle || ''}</div>
          <div class="tags">${(doc.tags||[]).map(t => `<span>${t}</span>`).join('')}</div>
        </div>
      `;
      grid.appendChild(card);
    });
  } catch (e) {
    grid.innerHTML = '<div class="error">목록을 불러오지 못했습니다: ' + e.message + '</div>';
  }
}

// Minimal markdown -> HTML renderer (tables, headers, lists, bold, code, hr)
function renderMarkdown(md) {
  const lines = md.split('\n');
  let html = '';
  let inList = false;
  let inTable = false;
  let tableRows = [];

  function flushList() {
    if (inList) { html += '</ul>'; inList = false; }
  }
  function flushTable() {
    if (inTable) {
      html += '<table>';
      tableRows.forEach((cells, i) => {
        const tag = i === 0 ? 'th' : 'td';
        html += '<tr>' + cells.map(c => `<${tag}>${inline(c)}</${tag}>`).join('') + '</tr>';
      });
      html += '</table>';
      inTable = false;
      tableRows = [];
    }
  }
  function inline(text) {
    return text
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/`(.+?)`/g, '<code>$1</code>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>');
  }

  for (let raw of lines) {
    const line = raw.trimEnd();

    if (/^\s*\|.*\|\s*$/.test(line)) {
      if (/^\s*\|[\s:|-]+\|\s*$/.test(line)) continue; // separator row
      const cells = line.split('|').slice(1, -1).map(c => c.trim());
      inTable = true;
      tableRows.push(cells);
      continue;
    } else {
      flushTable();
    }

    if (line.startsWith('### ')) { flushList(); html += `<h3>${inline(line.slice(4))}</h3>`; continue; }
    if (line.startsWith('## ')) { flushList(); html += `<h2>${inline(line.slice(3))}</h2>`; continue; }
    if (line.startsWith('# ')) { flushList(); html += `<h1>${inline(line.slice(2))}</h1>`; continue; }
    if (line === '---') { flushList(); html += '<hr>'; continue; }
    if (/^[-*]\s+/.test(line)) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += `<li>${inline(line.replace(/^[-*]\s+/, ''))}</li>`;
      continue;
    }
    if (/^\d+\.\s+/.test(line)) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += `<li>${inline(line.replace(/^\d+\.\s+/, ''))}</li>`;
      continue;
    }
    flushList();
    if (line === '') { continue; }
    html += `<p>${inline(line)}</p>`;
  }
  flushList();
  flushTable();
  return html;
}

async function openDoc(doc) {
  const overlay = document.getElementById('overlay');
  const title = document.getElementById('modalTitle');
  const body = document.getElementById('modalBody');
  title.textContent = doc.title;
  body.innerHTML = '<p style="text-align:center;color:#999;">불러오는 중...</p>';
  overlay.classList.add('active');
  try {
    const res = await fetch(BASE + doc.file + '?t=' + Date.now());
    const text = await res.text();
    body.innerHTML = renderMarkdown(text);
  } catch (e) {
    body.innerHTML = '<p>문서를 불러오지 못했습니다: ' + e.message + '</p>';
  }
}

function closeModal() {
  document.getElementById('overlay').classList.remove('active');
}
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target.id === 'overlay') closeModal();
});

loadGallery();
</script>

</body>
</html>
