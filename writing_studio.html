<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Writing Studio v2.3.2 · sapmanri</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400&family=Noto+Sans+KR:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0c0c0c;
  --s1: #141414;
  --s2: #1c1c1c;
  --s3: #242424;
  --border: #282828;
  --border2: #353535;
  --text: #e2ddd6;
  --muted: #7a7570;
  --dim: #434040;
  --accent: #c9a96e;
  --accent2: #8a7a5a;
  --green: #8aaa88;
  --red: #c47a6a;
  --serif: 'Noto Serif KR', serif;
  --sans: 'Noto Sans KR', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
html, body { height: 100%; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); font-weight: 300; display: flex; flex-direction: column; overflow: hidden; }

/* ── 헤더 ── */
header {
  height: 48px; flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
}
.logo { font-family: var(--serif); font-size: 13px; letter-spacing: 0.1em; color: var(--muted); }
.logo em { color: var(--accent); font-style: normal; }

.header-nav { display: flex; gap: 2px; }
.nav-tab {
  background: none; border: none; color: var(--dim);
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em;
  padding: 6px 14px; border-radius: 4px; cursor: pointer;
  transition: all 0.15s;
}
.nav-tab:hover { color: var(--muted); background: var(--s2); }
.nav-tab.active { color: var(--text); background: var(--s2); }

.header-right { display: flex; align-items: center; gap: 8px; }
.api-key-wrap { position: relative; }
.api-key-field {
  background: var(--s1); border: 1px solid var(--border); color: var(--text);
  font-family: var(--mono); font-size: 11px; padding: 5px 10px;
  border-radius: 4px; width: 0; overflow: hidden; opacity: 0;
  transition: width 0.3s, opacity 0.3s; outline: none;
}
.api-key-field.open { width: 200px; opacity: 1; }
.api-key-field:focus { border-color: var(--accent); }
.btn-ghost {
  background: none; border: 1px solid var(--border); color: var(--muted);
  font-family: var(--mono); font-size: 10px; padding: 5px 10px;
  border-radius: 4px; cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.btn-ghost:hover { border-color: var(--border2); color: var(--text); }

/* ── 탭 패널 ── */
.tab-panel { display: none; flex: 1; overflow: hidden; }
.tab-panel.active { display: flex; }

/* ══════════════════════════════
   TAB 1 — 쓰기
══════════════════════════════ */
.write-layout { display: flex; flex: 1; overflow: hidden; }

/* 왼쪽 설정 */
.write-left {
  width: 220px; flex-shrink: 0;
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow-y: auto;
}
.section { padding: 16px; border-bottom: 1px solid var(--border); }
.section-label {
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.16em;
  color: var(--dim); text-transform: uppercase; margin-bottom: 10px;
}
.type-list, .mode-list { display: flex; flex-direction: column; gap: 3px; }
.type-btn, .mode-btn {
  background: none; border: 1px solid transparent; color: var(--muted);
  font-family: var(--sans); font-weight: 300; font-size: 12px;
  padding: 7px 10px; border-radius: 4px; cursor: pointer; text-align: left;
  display: flex; align-items: center; gap: 8px; transition: all 0.15s;
}
.type-btn:hover, .mode-btn:hover { color: var(--text); background: var(--s2); }
.type-btn.active, .mode-btn.active {
  color: var(--text); background: var(--s2); border-color: var(--border);
}
.type-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--dim); flex-shrink: 0; transition: background 0.3s;
}
.type-btn.active .type-dot { background: var(--accent); }

.ctx-textarea {
  width: 100%; background: var(--s1); border: 1px solid var(--border);
  color: var(--text); font-family: var(--sans); font-weight: 300;
  font-size: 12px; line-height: 1.7; padding: 9px 10px;
  border-radius: 4px; resize: vertical; min-height: 90px;
  outline: none; transition: border-color 0.15s;
}
.ctx-textarea:focus { border-color: var(--accent); }
.ctx-textarea::placeholder { color: var(--dim); }

.btn-generate {
  width: 100%; margin-top: 8px;
  background: var(--s2); border: 1px solid var(--border); color: var(--text);
  font-family: var(--sans); font-size: 12px; font-weight: 400;
  padding: 9px; border-radius: 4px; cursor: pointer; transition: all 0.15s;
}
.btn-generate:hover { border-color: var(--accent); color: var(--accent); }
.btn-generate:disabled { opacity: 0.35; cursor: not-allowed; }

.image-attach-area {
  margin-top: 8px; border: 1px dashed var(--border); border-radius: 4px;
  padding: 0; overflow: hidden; transition: border-color 0.2s;
}
.image-attach-area.has-image { border-color: var(--accent2); border-style: solid; }
.image-attach-area.dragover { border-color: var(--accent); background: rgba(201,169,110,0.05); }

.image-attach-inner {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; cursor: pointer;
}
.image-attach-inner:hover { background: var(--s2); }

.image-preview-wrap { position: relative; }
.image-preview {
  width: 44px; height: 44px; object-fit: cover;
  border-radius: 3px; display: block;
}
.image-remove-btn {
  position: absolute; top: -4px; right: -4px;
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--red); border: none; color: white;
  font-size: 9px; cursor: pointer; line-height: 14px; text-align: center;
  display: flex; align-items: center; justify-content: center;
}

.image-attach-label {
  font-family: var(--mono); font-size: 10px; color: var(--dim);
  flex: 1; line-height: 1.5;
}
.image-attach-label span { color: var(--muted); }

/* 예시 사용 현황 */
.example-stat {
  font-family: var(--mono); font-size: 10px; color: var(--dim);
  line-height: 1.8;
}
.example-stat span { color: var(--accent); }

/* 에디터 중앙 */
.write-center { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.editor-bar {
  height: 38px; flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 6px; padding: 0 16px;
}
.bar-btn {
  background: none; border: none; color: var(--dim);
  font-family: var(--mono); font-size: 10px; padding: 3px 7px;
  border-radius: 3px; cursor: pointer; transition: all 0.15s;
}
.bar-btn:hover { color: var(--text); background: var(--s2); }
.bar-sep { width: 1px; height: 14px; background: var(--border); }
.char-count { margin-left: auto; font-family: var(--mono); font-size: 10px; color: var(--dim); }

.editor-box { flex: 1; display: flex; overflow: hidden; }
.main-editor {
  flex: 1; background: transparent; border: none;
  color: var(--text); font-family: var(--serif); font-weight: 300;
  font-size: 15px; line-height: 2; padding: 28px 36px;
  outline: none; resize: none; overflow-y: auto;
}
.main-editor::placeholder { color: var(--dim); font-style: italic; }

/* 오른쪽: diff / 피드백 */
.write-right {
  width: 280px; flex-shrink: 0;
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.right-header {
  height: 38px; flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 14px;
  font-family: var(--mono); font-size: 10px; color: var(--dim); letter-spacing: 0.1em;
}
.right-scroll { flex: 1; overflow-y: auto; padding: 14px; }

/* diff 패널 */
.diff-block { margin-bottom: 14px; }
.diff-label {
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em;
  color: var(--dim); text-transform: uppercase; margin-bottom: 6px;
}
.diff-text {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: 4px; padding: 10px; font-size: 12px; line-height: 1.75;
  color: var(--muted); white-space: pre-wrap; word-break: break-word;
  max-height: 160px; overflow-y: auto;
}
.diff-text.original { border-color: var(--dim); }
.diff-text.edited { border-color: var(--green); color: var(--text); }

.save-pair-btn {
  width: 100%; margin-top: 8px;
  background: none; border: 1px solid var(--green); color: var(--green);
  font-family: var(--mono); font-size: 10px; padding: 7px;
  border-radius: 4px; cursor: pointer; transition: all 0.15s;
}
.save-pair-btn:hover { background: var(--green); color: var(--bg); }

.no-diff {
  padding: 24px 0; text-align: center;
  font-size: 12px; color: var(--dim); line-height: 1.8;
}

/* ══════════════════════════════
   TAB 2 — 예시 글
══════════════════════════════ */
.examples-layout { display: flex; flex: 1; overflow: hidden; }
.examples-left {
  width: 200px; flex-shrink: 0;
  border-right: 1px solid var(--border);
  padding: 16px 12px; display: flex; flex-direction: column; gap: 3px;
}
.ex-filter-btn {
  background: none; border: 1px solid transparent; color: var(--muted);
  font-family: var(--sans); font-weight: 300; font-size: 12px;
  padding: 7px 10px; border-radius: 4px; cursor: pointer; text-align: left;
  transition: all 0.15s; display: flex; align-items: center; justify-content: space-between;
}
.ex-filter-btn:hover { color: var(--text); background: var(--s2); }
.ex-filter-btn.active { color: var(--text); background: var(--s2); border-color: var(--border); }
.ex-count { font-family: var(--mono); font-size: 10px; color: var(--dim); }

.examples-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.examples-toolbar {
  height: 48px; flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px; padding: 0 16px;
}
.examples-toolbar input {
  flex: 1; background: var(--s1); border: 1px solid var(--border); color: var(--text);
  font-family: var(--sans); font-weight: 300; font-size: 12px;
  padding: 6px 10px; border-radius: 4px; outline: none;
}
.examples-toolbar input:focus { border-color: var(--accent); }
.examples-toolbar input::placeholder { color: var(--dim); }
.btn-primary {
  background: var(--s2); border: 1px solid var(--border); color: var(--text);
  font-family: var(--sans); font-size: 12px; padding: 6px 14px;
  border-radius: 4px; cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.btn-primary:hover { border-color: var(--accent); color: var(--accent); }

.examples-grid { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
.example-card {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: 5px; overflow: hidden; transition: border-color 0.15s;
}
.example-card:hover { border-color: var(--border2); }
.example-card-header {
  padding: 9px 12px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.example-card-meta { font-family: var(--mono); font-size: 10px; color: var(--dim); }
.example-card-actions { display: flex; gap: 6px; }
.icon-btn {
  background: none; border: none; color: var(--dim);
  font-size: 11px; cursor: pointer; padding: 2px 5px;
  border-radius: 3px; transition: color 0.15s;
}
.icon-btn:hover { color: var(--red); }
.icon-btn.use:hover { color: var(--green); }
.example-card-body {
  padding: 12px; font-size: 12px; line-height: 1.8;
  color: var(--muted); white-space: pre-wrap; word-break: break-word;
  max-height: 120px; overflow: hidden; cursor: pointer;
  transition: max-height 0.3s;
}
.example-card-body.expanded { max-height: 400px; }

/* 새 예시 모달 */
.modal-backdrop {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 100;
  align-items: center; justify-content: center;
}
.modal-backdrop.open { display: flex; }
.modal {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: 8px; width: 560px; max-width: 90vw;
  display: flex; flex-direction: column; max-height: 80vh;
}
.modal-header {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  font-family: var(--mono); font-size: 12px; color: var(--text);
}
.modal-close {
  background: none; border: none; color: var(--dim);
  font-size: 16px; cursor: pointer; transition: color 0.15s;
}
.modal-close:hover { color: var(--text); }
.modal-body { padding: 20px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
.modal-label { font-family: var(--mono); font-size: 10px; color: var(--dim); letter-spacing: 0.1em; margin-bottom: 6px; }
.modal-select {
  width: 100%; background: var(--s2); border: 1px solid var(--border); color: var(--text);
  font-family: var(--sans); font-weight: 300; font-size: 12px;
  padding: 7px 10px; border-radius: 4px; outline: none;
}
.modal-textarea {
  width: 100%; background: var(--s2); border: 1px solid var(--border); color: var(--text);
  font-family: var(--serif); font-weight: 300; font-size: 13px; line-height: 1.9;
  padding: 10px 12px; border-radius: 4px; resize: vertical; min-height: 200px;
  outline: none; transition: border-color 0.15s;
}
.modal-textarea:focus { border-color: var(--accent); }
.modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
.btn-save {
  background: var(--accent2); border: 1px solid var(--accent); color: var(--text);
  font-family: var(--sans); font-size: 12px; padding: 7px 20px;
  border-radius: 4px; cursor: pointer; transition: all 0.15s;
}
.btn-save:hover { background: var(--accent); }

/* ══════════════════════════════
   TAB 3 — 문체 프로필
══════════════════════════════ */
.profile-layout { flex: 1; overflow-y: auto; padding: 32px; max-width: 760px; margin: 0 auto; width: 100%; }
.profile-section { margin-bottom: 36px; }
.profile-section-title {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em;
  color: var(--accent); text-transform: uppercase; margin-bottom: 16px;
  padding-bottom: 8px; border-bottom: 1px solid var(--border);
}
.rule-list { display: flex; flex-direction: column; gap: 8px; }
.rule-item {
  background: var(--s1); border: 1px solid var(--border); border-radius: 4px;
  padding: 10px 12px; display: flex; align-items: flex-start; gap: 10px;
  font-size: 13px; line-height: 1.7; color: var(--muted);
}
.rule-item .rule-dot {
  width: 4px; height: 4px; border-radius: 50%; background: var(--accent);
  flex-shrink: 0; margin-top: 8px;
}
.rule-item button {
  margin-left: auto; background: none; border: none; color: var(--dim);
  font-size: 10px; cursor: pointer; padding: 2px; flex-shrink: 0;
  transition: color 0.15s;
}
.rule-item button:hover { color: var(--red); }

.add-rule-row { display: flex; gap: 8px; margin-top: 10px; }
.add-rule-input {
  flex: 1; background: var(--s1); border: 1px solid var(--border); color: var(--text);
  font-family: var(--sans); font-weight: 300; font-size: 12px;
  padding: 7px 10px; border-radius: 4px; outline: none;
}
.add-rule-input:focus { border-color: var(--accent); }
.add-rule-input::placeholder { color: var(--dim); }

.feedback-pair {
  background: var(--s1); border: 1px solid var(--border); border-radius: 5px;
  overflow: hidden; margin-bottom: 8px;
}
.feedback-pair-header {
  padding: 8px 12px; border-bottom: 1px solid var(--border);
  font-family: var(--mono); font-size: 10px; color: var(--dim);
  display: flex; align-items: center; justify-content: space-between;
}
.feedback-pair-body { display: flex; }
.fp-col { flex: 1; padding: 10px 12px; font-size: 12px; line-height: 1.75; }
.fp-col:first-child { border-right: 1px solid var(--border); color: var(--dim); }
.fp-col:last-child { color: var(--text); }
.fp-label {
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em;
  margin-bottom: 6px; text-transform: uppercase;
}
.fp-label.orig { color: var(--dim); }
.fp-label.edit { color: var(--green); }

.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.stat-box {
  background: var(--s1); border: 1px solid var(--border); border-radius: 4px;
  padding: 14px; text-align: center;
}
.stat-num { font-family: var(--mono); font-size: 22px; color: var(--accent); }
.stat-lbl { font-size: 11px; color: var(--dim); margin-top: 4px; }

.export-row { display: flex; gap: 8px; margin-top: 16px; }

.btn-analyze {
  width: 100%;
  background: none; border: 1px solid var(--accent2); color: var(--accent);
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em;
  padding: 9px; border-radius: 4px; cursor: pointer; transition: all 0.2s;
}
.btn-analyze:hover { background: var(--accent2); color: var(--bg); }
.btn-analyze:disabled { opacity: 0.35; cursor: not-allowed; }

.suggest-card {
  background: var(--s2); border: 1px solid var(--border);
  border-radius: 5px; padding: 12px 14px; margin-bottom: 8px;
  font-size: 13px; line-height: 1.75; color: var(--text);
  display: flex; align-items: flex-start; gap: 10px;
}
.suggest-card .suggest-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex-shrink:0; margin-top:8px; }
.suggest-card .suggest-actions { margin-left: auto; display: flex; gap: 6px; flex-shrink:0; }
.btn-accept { background: none; border: 1px solid var(--green); color: var(--green); font-family: var(--mono); font-size: 10px; padding: 3px 8px; border-radius: 3px; cursor: pointer; transition: all 0.15s; }
.btn-accept:hover { background: var(--green); color: var(--bg); }
.btn-reject { background: none; border: 1px solid var(--dim); color: var(--dim); font-family: var(--mono); font-size: 10px; padding: 3px 8px; border-radius: 3px; cursor: pointer; transition: all 0.15s; }
.btn-reject:hover { border-color: var(--red); color: var(--red); }

/* 공통 */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.empty-hint { padding: 32px; text-align: center; color: var(--dim); font-size: 12px; line-height: 2; }

/* 토스트 */
.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: var(--s2); border: 1px solid var(--border2); color: var(--text);
  font-family: var(--mono); font-size: 11px; padding: 8px 16px;
  border-radius: 5px; z-index: 999; opacity: 0;
  transition: opacity 0.3s; pointer-events: none;
}
.toast.show { opacity: 1; }

/* 로딩 스피너 */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  display: inline-block; width: 10px; height: 10px;
  border: 1px solid var(--dim); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.8s linear infinite;
  margin-right: 6px;
}
</style>
</head>
<body>

<!-- 헤더 -->
<header>
  <div class="logo">Writing Studio · <em>sapmanri</em> <span style="font-family:var(--mono);font-size:10px;color:var(--dim);margin-left:6px">v2.3.2</span></div>
  <nav class="header-nav">
    <button class="nav-tab active" onclick="switchTab('write')">쓰기</button>
    <button class="nav-tab" onclick="switchTab('examples')">예시 글</button>
    <button class="nav-tab" onclick="switchTab('profile')">문체 프로필</button>
  </nav>
  <div class="header-right">
    <div class="api-key-wrap" id="apiKeyWrap" style="display:none;align-items:center;gap:4px">
      <input type="password" class="api-key-field open" id="apiKey" placeholder="sk-ant-..." autocomplete="off"
        onkeydown="if(event.key==='Enter') saveApiKey()">
      <button class="btn-ghost" onclick="saveApiKey()">저장</button>
    </div>
    <button class="btn-ghost" id="apiKeyBtn" onclick="toggleApiKey()">API Key</button>
  </div>
</header>

<!-- ══ TAB 1: 쓰기 ══ -->
<div class="tab-panel active" id="tab-write">
  <div class="write-layout">

    <!-- 왼쪽 -->
    <aside class="write-left">
      <div class="section">
        <div class="section-label">글 타입</div>
        <div class="type-list">
          <button class="type-btn active" data-type="instagram" onclick="setType(this)">
            <span class="type-dot"></span>인스타 캡션
          </button>
          <button class="type-btn" data-type="youtube" onclick="setType(this)">
            <span class="type-dot"></span>유튜브 설명란
          </button>
          <button class="type-btn" data-type="blog" onclick="setType(this)">
            <span class="type-dot"></span>블로그 글
          </button>
          <button class="type-btn" data-type="ui" onclick="setType(this)">
            <span class="type-dot"></span>UI 문구
          </button>
        </div>
      </div>

      <div class="section">
        <div class="section-label">컨텍스트</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
// 데이터 레이어
// ══════════════════════════════════════════

// ── 기본 Vase 문체 규칙 (초기값) ──
const DEFAULT_RULES = [
  '감정을 직접 설명하지 않는다. 사물과 장면을 통해 감정이 드러나게 한다.',
  '짧은 문장과 긴 문장을 리듬감 있게 교차한다. 같은 길이의 문장이 연속되면 단조로워진다.',
  '결론을 서두르지 않는다. 독자와 함께 천천히 도달한다.',
  '여백을 남긴다. 모든 것을 설명하려 하지 않는다.',
  '\'그러나\', \'하지만\' 같은 역접 접속사보다 장면의 전환으로 대비를 표현한다.',
  '계절과 빛, 소리, 온도 같은 감각적 디테일을 구체적으로 쓴다.',
  '고양이 빼빼와 콩이 등장할 때는 사람처럼 묘사하지 않는다. 그냥 그 자리에 있는 것으로 충분하다.',
  '마침표로 끝나는 짧은 한 문장이 문단 전체를 마무리할 때 가장 강하다.',
];

const DB_KEY = 'ws_sapmanri_v2';
let db = loadDB();

function loadDB() {
  try {
    const raw = localStorage.getItem(DB_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return {
    examples: [],
    pairs: [],
    rules: [...DEFAULT_RULES],
  };
}

function saveDB() {
  localStorage.setItem(DB_KEY, JSON.stringify(db));
  updateStats();
}

// ══════════════════════════════════════════
// 탭 전환
// ══════════════════════════════════════════
function switchTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(t => {
    if (t.textContent.trim() === ({write:'쓰기', examples:'예시 글', profile:'문체 프로필'}[name])) t.classList.add('active');
  });
  if (name === 'examples') renderExamples();
  if (name === 'profile') renderProfile();
}

// ══════════════════════════════════════════
// API Key
// ══════════════════════════════════════════
// toggleApiKey & getKey → 위로 이동

// ══════════════════════════════════════════
// 글 타입
// ══════════════════════════════════════════
let currentType = 'instagram';
function setType(btn) {
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentType = btn.dataset.type;
}

const TYPE_LABEL = { instagram: '인스타 캡션', youtube: '유튜브', blog: '블로그', ui: 'UI 문구' };

const TYPE_INSTRUCTION = {
  instagram: `인스타그램 캡션을 작성한다.
- 첫 줄: 짧고 선언적인 한 문장 (질문이나 해시태그 없이)
- 본문: 2-4문장 산문, 장면 묘사 위주
- 마지막: 해시태그 5개 (#sapmanri #slowliving 고정, 나머지 3개는 내용 기반)
- 총 150-220자 (해시태그 제외)`,

  youtube: `유튜브 영상 설명란을 작성한다.
- 첫 2줄: 핵심 키워드 포함, 자연스러운 문장 (검색 최적화)
- 본문: 3-5문장 영상 소개
- 해시태그: 5-8개
- 한국어 기본, 필요시 영어 병기`,

  blog: `네이버 블로그 포스트를 작성한다.
- 핵심 키워드 자연스럽게 10회 이상 포함
- 1500자 이상
- SEO 최적화된 첫 단락`,

  ui: `앱/웹 UI 문구를 작성한다.
- 간결하고 능동태
- 버튼, 레이블, 빈 상태 메시지 등 필요한 요소별로 작성
- 3가지 버전 제안`,
};

// ══════════════════════════════════════════
// 글 생성 (핵심: 예시 + 피드백 + 규칙 주입)
// ══════════════════════════════════════════
let lastOriginal = '';

// ══════════════════════════════════════════
// API Key — localStorage 저장
// ══════════════════════════════════════════
const API_KEY_STORAGE = 'ws_sapmanri_apikey';

function initApiKey() {
  const saved = localStorage.getItem(API_KEY_STORAGE);
  if (saved) {
    document.getElementById('apiKey').value = saved;
    document.getElementById('apiKeyBtn').textContent = 'API Key ✓';
    document.getElementById('apiKeyBtn').style.color = 'var(--accent)';
  }
}

function toggleApiKey() {
  const wrap = document.getElementById('apiKeyWrap');
  const isOpen = wrap.style.display !== 'none';
  wrap.style.display = isOpen ? 'none' : 'flex';
  if (!isOpen) document.getElementById('apiKey').focus();
}

function saveApiKey() {
  const val = document.getElementById('apiKey').value.trim();
  if (!val) { toast('키를 입력해주세요.'); return; }
  localStorage.setItem(API_KEY_STORAGE, val);
  document.getElementById('apiKeyWrap').style.display = 'none';
  document.getElementById('apiKeyBtn').textContent = 'API Key ✓';
  document.getElementById('apiKeyBtn').style.color = 'var(--accent)';
  toast('API Key 저장됨.');
}

function getKey() {
  const v = document.getElementById('apiKey').value.trim()
    || localStorage.getItem(API_KEY_STORAGE) || '';
  if (!v) { toast('API Key를 입력해주세요.'); toggleApiKey(); return null; }
  return v;
}

// ── 이미지 관련 ──
let attachedImageBase64 = null;
let attachedImageType = null;

function triggerImagePicker() {
  document.getElementById('imageFileInput').click();
}

function onImageSelected(e) {
  const file = e.target.files[0];
  if (file) loadImageFile(file);
}

function onImageDragOver(e) {
  e.preventDefault();
  document.getElementById('imageAttachArea').classList.add('dragover');
}
function onImageDragLeave(e) {
  document.getElementById('imageAttachArea').classList.remove('dragover');
}
function onImageDrop(e) {
  e.preventDefault();
  document.getElementById('imageAttachArea').classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) loadImageFile(file);
}

function loadImageFile(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    const dataUrl = ev.target.result;
    attachedImageBase64 = dataUrl.split(',')[1];
    attachedImageType = file.type;
    document.getElementById('imagePreview').src = dataUrl;
    document.getElementById('imagePreviewWrap').style.display = 'block';
    document.getElementById('imageAttachLabel').innerHTML = `<span style="color:var(--accent)">${file.name}</span><br>이미지 분석 후 글 생성`;
    document.getElementById('imageAttachArea').classList.add('has-image');
  };
  reader.readAsDataURL(file);
}

function removeImage(e) {
  e.stopPropagation();
  attachedImageBase64 = null;
  attachedImageType = null;
  document.getElementById('imagePreview').src = '';
  document.getElementById('imagePreviewWrap').style.display = 'none';
  document.getElementById('imageAttachLabel').innerHTML = '<span>📎 이미지 첨부</span><br>클릭하거나 드래그';
  document.getElementById('imageAttachArea').classList.remove('has-image');
  document.getElementById('imageFileInput').value = '';
}

async function generateText() {
  const key = getKey(); if (!key) return;
  const ctx = document.getElementById('ctxInput').value.trim();
  if (!ctx && !attachedImageBase64) { toast('컨텍스트나 이미지를 입력해주세요.'); return; }

  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>생성 중…';

  // 1. 관련 예시 선택 (같은 타입 최대 5개, 최신순)
  const typeExamples = db.examples
    .filter(e => e.type === currentType)
    .slice(-5);

  // 2. 피드백 쌍 선택 (최대 4개)
  const typePairs = db.pairs
    .filter(p => p.type === currentType)
    .slice(-4);

  // 3. 시스템 프롬프트 구성
  let system = `당신은 한국 크리에이터 Vase Lim(@sapmanri)의 글쓰기 도구입니다.
Vase의 문체로 글을 씁니다. 아래의 규칙, 예시, 피드백 패턴을 철저히 따르세요.

## 문체 규칙
${db.rules.map((r, i) => `${i+1}. ${r}`).join('\n')}

## 글 타입 지시
${TYPE_INSTRUCTION[currentType]}`;

  if (typeExamples.length > 0) {
    system += `\n\n## Vase가 직접 쓴 예시 글 (이 문체와 어조를 그대로 따르세요)\n`;
    typeExamples.forEach((e, i) => {
      system += `\n--- 예시 ${i+1} ---\n${e.text}\n`;
    });
  }

  if (typePairs.length > 0) {
    system += `\n\n## 피드백 패턴 (AI 초안 → Vase 수정본. 이 패턴에서 Vase의 선호를 파악하세요)\n`;
    typePairs.forEach((p, i) => {
      system += `\n--- 패턴 ${i+1} ---\n[AI 초안]: ${p.original}\n[Vase 수정]: ${p.edited}\n`;
    });
  }

  // 4. 메시지 구성 (이미지 포함 여부)
  let userContent;
  if (attachedImageBase64) {
    userContent = [
      {
        type: 'image',
        source: { type: 'base64', media_type: attachedImageType, data: attachedImageBase64 }
      },
      {
        type: 'text',
        text: ctx
          ? `이 이미지를 보고, 아래 내용도 참고해서 글을 써주세요.\n\n${ctx}`
          : '이 이미지를 보고 글을 써주세요. 이미지의 분위기, 빛, 계절, 감각적 디테일을 Vase 문체로 담아주세요.'
      }
    ];
  } else {
    userContent = `다음 내용을 바탕으로 글을 써주세요:\n\n${ctx}`;
  }

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 1500,
        system,
        messages: [{ role: 'user', content: userContent }],
      }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const text = data.content?.[0]?.text || '';

    lastOriginal = text;
    document.getElementById('mainEditor').value = text;
    onEditorInput();
    renderDiff(text, null);
    document.getElementById('savePairBtnTop').style.display = 'block';
    toast('생성 완료');
  } catch(e) {
    toast('오류: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '글 생성하기 →';
  }
}

// ══════════════════════════════════════════
// 에디터
// ══════════════════════════════════════════
function onEditorInput() {
  const val = document.getElementById('mainEditor').value;
  document.getElementById('charCount').textContent = val.length.toLocaleString() + '자';
  if (lastOriginal && val !== lastOriginal) renderDiff(lastOriginal, val);
}

function clearEditor() {
  if (!document.getElementById('mainEditor').value) return;
  if (!confirm('에디터를 지울까요?')) return;
  document.getElementById('mainEditor').value = '';
  lastOriginal = '';
  onEditorInput();
  document.getElementById('diffPanel').innerHTML = '<div class="no-diff">글을 생성하면<br>원본이 여기 표시돼요.<br><br>수정 후 저장하면<br>문체 학습에 반영됩니다.</div>';
  document.getElementById('savePairBtnTop').style.display = 'none';
}

async function copyEditor() {
  const v = document.getElementById('mainEditor').value;
  if (!v) return;
  await navigator.clipboard.writeText(v);
  toast('복사했습니다.');
}

function saveAsExample() {
  const text = document.getElementById('mainEditor').value.trim();
  if (!text) { toast('저장할 내용이 없어요.'); return; }
  db.examples.push({ id: Date.now(), type: currentType, text, date: new Date().toLocaleDateString('ko-KR') });

  toast('예시 글로 저장했습니다.');
  updateExampleStat();
}

// ══════════════════════════════════════════
// 피드백 쌍 저장
// ══════════════════════════════════════════
function savePair() {
  const edited = document.getElementById('mainEditor').value.trim();
  if (!lastOriginal || !edited) { toast('원본과 수정본이 모두 있어야 합니다.'); return; }
  if (edited === lastOriginal) { toast('수정된 내용이 없어요.'); return; }
  db.pairs.push({
    id: Date.now(), type: currentType,
    original: lastOriginal, edited,
    date: new Date().toLocaleDateString('ko-KR'),
  });
  saveDB();
  lastOriginal = edited; // 저장 후 현재 버전이 새 기준
  toast('피드백 저장 완료. 다음 생성부터 반영됩니다.');
  updateExampleStat();
}

// ══════════════════════════════════════════
// 예시 글 탭
// ══════════════════════════════════════════
let currentFilter = 'all';
function setExFilter(btn) {
  document.querySelectorAll('.ex-filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.filter;
  renderExamples();
}

function renderExamples() {
  const search = document.getElementById('exSearch')?.value.toLowerCase() || '';
  const grid = document.getElementById('examplesGrid');
  grid.innerHTML = '';

  // 필터
  let items = [];
  if (currentFilter === 'feedback') {
    items = db.pairs.map(p => ({ ...p, _kind: 'pair' }));
  } else {
    items = db.examples
      .filter(e => currentFilter === 'all' || e.type === currentFilter)
      .map(e => ({ ...e, _kind: 'example' }));
  }

  if (search) items = items.filter(i =>
    (i.text || i.original || '').toLowerCase().includes(search)
  );

  // 카운트 업데이트
  updateFilterCounts();

  if (items.length === 0) {
    grid.innerHTML = '<div class="empty-hint">저장된 예시가 없어요.<br>직접 쓴 글을 추가하거나<br>생성 후 수정하면 피드백 쌍이 쌓입니다.</div>';
    return;
  }

  items.slice().reverse().forEach(item => {
    const card = document.createElement('div');
    card.className = 'example-card';
    if (item._kind === 'pair') {
      card.innerHTML = `
        <div class="example-card-header">
          <span class="example-card-meta">피드백 쌍 · ${TYPE_LABEL[item.type]} · ${item.date}</span>
          <div class="example-card-actions">
            <button class="icon-btn" onclick="deletePair(${item.id})">삭제</button>
          </div>
        </div>
        <div style="display:flex">
          <div style="flex:1; padding:10px 12px; font-size:12px; line-height:1.75; color:var(--dim); border-right:1px solid var(--border)">
            <div style="font-family:var(--mono);font-size:9px;color:var(--dim);margin-bottom:4px">AI 원본</div>
            ${escHtml(item.original.slice(0,200))}${item.original.length>200?'…':''}
          </div>
          <div style="flex:1; padding:10px 12px; font-size:12px; line-height:1.75; color:var(--text)">
            <div style="font-family:var(--mono);font-size:9px;color:var(--green);margin-bottom:4px">수정본</div>
            ${escHtml(item.edited.slice(0,200))}${item.edited.length>200?'…':''}
          </div>
        </div>`;
    } else {
      card.innerHTML = `
        <div class="example-card-header">
          <span class="example-card-meta">${TYPE_LABEL[item.type]} · ${item.date}</span>
          <div class="example-card-actions">
            <button class="icon-btn use" onclick="loadToEditor(${item.id})">불러오기</button>
            <button class="icon-btn" onclick="deleteExample(${item.id})">삭제</button>
          </div>
        </div>
        <div class="example-card-body" onclick="this.classList.toggle('expanded')">${escHtml(item.text)}</div>`;
    }
    grid.appendChild(card);
  });
}

function updateFilterCounts() {
  document.getElementById('fc-all').textContent = db.examples.length;
  ['instagram','youtube','blog','ui'].forEach(t => {
    const el = document.getElementById('fc-' + t);
    if (el) el.textContent = db.examples.filter(e => e.type === t).length;
  });
  document.getElementById('fc-feedback').textContent = db.pairs.length;
}

function loadToEditor(id) {
  const ex = db.examples.find(e => e.id === id);
  if (!ex) return;
  document.getElementById('mainEditor').value = ex.text;
  onEditorInput();
  switchTab('write');
  toast('에디터로 불러왔습니다.');
}

function deleteExample(id) {
  if (!confirm('삭제할까요?')) return;
  db.examples = db.examples.filter(e => e.id !== id);
  saveDB(); renderExamples();
}
function deletePair(id) {
  if (!confirm('삭제할까요?')) return;
  db.pairs = db.pairs.filter(p => p.id !== id);
  saveDB(); renderExamples();
}

// 모달

}
function closeAddModal() {

}

function deleteRule(i) {
  if (!confirm('이 규칙을 삭제할까요?')) return;
  db.rules.splice(i, 1);
  saveDB(); renderProfile();
}

// ══════════════════════════════════════════
// 내보내기 / 가져오기
// ══════════════════════════════════════════
function exportData() {
  const json = JSON.stringify(db, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `sapmanri_writing_studio_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  toast('내보냈습니다.');
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (confirm(`가져오면 현재 데이터와 병합됩니다. 계속할까요?\n예시 ${data.examples?.length||0}개, 피드백 ${data.pairs?.length||0}개, 규칙 ${data.rules?.length||0}개`)) {
          db.examples = [...db.examples, ...(data.examples||[])];
          db.pairs = [...db.pairs, ...(data.pairs||[])];
          if (data.rules?.length) db.rules = data.rules;
          saveDB(); renderExamples(); renderProfile();
          toast('가져왔습니다.');
        }
      } catch { toast('파일 형식 오류'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function resetAll() {
  if (!confirm('모든 예시, 피드백, 규칙이 삭제됩니다. 정말 초기화할까요?')) return;
  db = { examples: [], pairs: [], rules: [...DEFAULT_RULES] };
  saveDB(); renderExamples(); renderProfile();
  toast('초기화했습니다.');
}

// ══════════════════════════════════════════
// 문체 분석 → 규칙 제안
// ══════════════════════════════════════════
let pendingSuggestions = [];

async function analyzeStyle() {
  const key = getKey(); if (!key) return;
  if (db.pairs.length === 0 && db.examples.length === 0) {
    toast('피드백 쌍이나 예시 글이 있어야 분석할 수 있어요.');
    return;
  }

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>분석 중…';

  // 분석용 프롬프트 구성
  let prompt = `당신은 글쓰기 문체 분석 전문가입니다.
아래는 한국 크리에이터 Vase Lim(@sapmanri)의 글쓰기 데이터입니다.

## 현재 등록된 문체 규칙
${db.rules.map((r,i) => `${i+1}. ${r}`).join('\n')}

`;

  if (db.pairs.length > 0) {
    prompt += `## AI 초안 → Vase 수정본 패턴 (${db.pairs.length}개)
`;
    db.pairs.forEach((p, i) => {
      prompt += `\n[패턴 ${i+1}] (${TYPE_LABEL[p.type]})\nAI 원본: ${p.original.slice(0,300)}\nVase 수정: ${p.edited.slice(0,300)}\n`;
    });
  }

  if (db.examples.length > 0) {
    prompt += `\n## Vase가 직접 쓴 예시 글 (${db.examples.length}개, 최근 5개)
`;
    db.examples.slice(-5).forEach((e, i) => {
      prompt += `\n[예시 ${i+1}] (${TYPE_LABEL[e.type]})\n${e.text.slice(0,400)}\n`;
    });
  }

  prompt += `
## 분석 요청
위 데이터를 바탕으로:
1. 수정 패턴에서 반복되는 문체 특징을 찾아내세요
2. 기존 규칙과 중복되지 않는 새 규칙을 3-6개 제안하세요
3. 각 규칙은 구체적이고 실행 가능한 한 문장으로 작성하세요

응답은 반드시 아래 JSON 형식으로만 답하세요. 설명이나 마크다운 없이 순수 JSON만:
{"suggestions": ["규칙1", "규칙2", "규칙3"]}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }],
      }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    let text = data.content?.[0]?.text || '';
    text = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(text);
    pendingSuggestions = parsed.suggestions || [];

    openAnalyzeModal(pendingSuggestions);
  } catch(e) {
    toast('분석 오류: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '✦ 피드백 패턴 분석 → 규칙 제안';
  }
}

function openAnalyzeModal(suggestions) {
  const body = document.getElementById('analyzeModalBody');
  if (suggestions.length === 0) {
    body.innerHTML = '<div style="color:var(--dim);font-size:12px">새로 제안할 규칙이 없어요. 피드백 쌍을 더 쌓은 후 다시 시도해보세요.</div>';
  } else {
    body.innerHTML = '<div style="font-family:var(--mono);font-size:10px;color:var(--dim);margin-bottom:12px">추가할 규칙을 선택하세요</div>';
    suggestions.forEach((s, i) => {
      const el = document.createElement('div');
      el.className = 'suggest-card';
      el.id = 'suggest-' + i;
      el.innerHTML = `
        <span class="suggest-dot"></span>
        <span style="flex:1">${escHtml(s)}</span>
        <div class="suggest-actions">
          <button class="btn-accept" onclick="acceptSuggestion(${i})">추가</button>
          <button class="btn-reject" onclick="rejectSuggestion(${i})">건너뜀</button>
        </div>`;
      body.appendChild(el);
    });
  }
  document.getElementById('analyzeModal').classList.add('open');
}

function closeAnalyzeModal() {
  document.getElementById('analyzeModal').classList.remove('open');
}

function acceptSuggestion(i) {
  const s = pendingSuggestions[i];
  if (!s) return;
  db.rules.push(s);
  saveDB();
  const card = document.getElementById('suggest-' + i);
  if (card) {
    card.style.opacity = '0.4';
    card.querySelector('.suggest-actions').innerHTML = '<span style="font-family:var(--mono);font-size:10px;color:var(--green)">✓ 추가됨</span>';
  }
  renderProfile();
  toast('규칙 추가됨');
}

function rejectSuggestion(i) {
  const card = document.getElementById('suggest-' + i);
  if (card) {
    card.style.opacity = '0.3';
    card.querySelector('.suggest-actions').innerHTML = '<span style="font-family:var(--mono);font-size:10px;color:var(--dim)">건너뜀</span>';
  }
}

function acceptAllSuggestions() {
  pendingSuggestions.forEach((s, i) => {
    const card = document.getElementById('suggest-' + i);
    if (card && !card.style.opacity) acceptSuggestion(i);
  });
  toast('전체 추가됐습니다.');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

function updateStats() {
  updateExampleStat();
  updateFilterCounts();
}

function updateExampleStat() {
  document.getElementById('exCount').textContent = db.examples.length;
  document.getElementById('pairCount').textContent = db.pairs.length;
}

const SEED_ESSAYS = [{"id": 1000, "type": "blog", "text": "[봄바람 - 마음 먼저 다녀간 계절]\n\n봄바람은\n꽃보다 먼저 와서\n마음을 먼저 흔들고 간다.\n\n아직 나무는\n제 색을 다 꺼내지 못했고,\n길가의 풀들도\n잠에서 덜 깬 얼굴인데,\n바람은 먼저\n계절의 문턱을 넘어와\n내 마음 한쪽을\n가만히 건드린다.\n\n봄은 늘\n눈에 보이는 것보다\n먼저 마음에 닿는다.\n\n꽃이 피어서 봄이 아니라,\n어느 날 문득\n닫아두었던 창을 열고 싶어지는 마음.\n조금 가벼운 옷을 꺼내고,\n오래 미뤄둔 산책을 생각하고,\n이유 없이\n괜찮아질 것 같은 기분이\n잠깐 들 때.\n\n아,\n봄이 왔구나.\n\n그렇게 알게 된다.\n\n봄바람은\n꽃보다 먼저 와서\n마음을 먼저 흔들고 간다.\n\n아직 피지 않은 것들에게\n너무 서두르지 말라고,\n그래도 때가 되면\n각자의 방식으로\n피어나게 될 거라고.\n\n그렇게 조용히\n먼저 다녀간다.", "date": "2026.06.10", "category": "기억"}, {"id": 2000, "type": "blog", "text": "[질투 - 내 안의 빈자리가 소리내는 일]\n\n질투는\n참 못난 얼굴을 하고 찾아온다.\n\n부럽다고 말하기엔\n자존심이 상하고,\n축하한다고 말하기엔\n마음 한구석이 자꾸만 시큰거리는 감정.\n\n그래서 우리는 질투를\n되도록 들키지 않으려 한다.\n\n그런데 가만히 들여다보면\n질투는 내가 나쁘다는 증거가 아니라\n내 안의 빈자리가\n소리 내는 일인지도 모른다.\n\n내가 정말 원했던 것.\n끝내 갖지 못한 것.\n아직 포기하지 못한 것.\n\n그런 마음들이\n누군가의 성취 앞에서\n잠깐 고개를 드는 것이다.\n\n그러니 질투가 찾아온 날에는\n나를 너무 미워하지 말고\n조용히 물어보면 좋겠다.\n\n나는 지금\n무엇이 아픈 걸까.\n\n질투는 때때로\n내가 바라던 삶의 방향을\n가장 서툰 방식으로 알려주는\n마음의 신호일지도 모르니까.", "date": "2026.06.10", "category": "관계"}, {"id": 3000, "type": "blog", "text": "[글 - 글쓰기]\n\n글을 쓴다는 건\n마음을 잘 포장하는 일이 아니라\n마음이 놓인 자리를\n가만히 들여다보는 일에 가깝다.\n\n처음에는 내가 글을 정하는 것 같지만\n어느 순간부터는\n글이 스스로\n자기 얼굴을 드러낸다.\n\n그때 할 일은\n억지로 꾸미는 것이 아니라\n드러난 얼굴을\n조용히 닦아주는 일이다.\n\n문장은 그렇게\n나보다 조금 늦게\n나를 알아본다.", "date": "2026.06.10", "category": "창작"}, {"id": 4000, "type": "blog", "text": "[잠깐 멈춰 - 마음이 따라올 시간을 주는 일]\n\n잠깐 멈춰.\n\n너무 멀리 가려고 애쓰지 말고\n너무 빨리 괜찮아지려 하지 말고\n잠깐만 멈춰.\n\n숨이 차다는 건\n네가 게을렀다는 뜻이 아니라\n그만큼 오래 걸어왔다는 뜻일지도 몰라.\n\n마음은 늘\n몸보다 조금 늦게 도착해서\n우리가 지나온 길 위에\n한참을 서성이다 오곤 하니까.\n\n그러니 가끔은\n앞으로 나아가는 일보다\n내 마음이 어디쯤 오고 있는지\n돌아보는 일이 먼저일 때가 있다.\n\n잠깐 멈춰.\n\n이 말은\n그만두라는 말이 아니라\n다시 가기 위해\n너를 한 번 불러 세우는 말이다.\n\n발끝에 작은 정지선 하나 그어두고\n그 앞에서 숨을 고르는 일.\n\n오늘의 너를\n오늘 안에 데려오는 일.", "date": "2026.06.10", "category": "멈춤"}, {"id": 5000, "type": "blog", "text": "[미니멀 - 마음이 덜 새어 나가는 일]\n\n미니멀이라 하면\n으레 물건 수를 줄이는 삶을 먼저 떠올리게 된다.\n\n내게 미니멀은\n꼭 비워낸 방의 풍경만을 뜻하지는 않는 듯하다.\n\n갯수를 덜어내는 일이 아니라,\n마음을 어지럽히는 것들을\n조금씩 덜어내는 태도에 더 가깝다.\n\n복잡한 세상 속을 살다 보면\n정작 나를 위해 써야 할 마음이,\n쓸데없는 걱정과 소모 속에서\n쉽게 닳아버릴 때가 있다.\n\n그래서 미니멀은\n물건의 숫자보다도\n마음이 덜 새어 나가는 일.\n\n내가 나로 남기 위해\n불필요한 소음들을\n조용히 치워내는 일이다.", "date": "2026.06.10", "category": "멈춤"}, {"id": 6000, "type": "blog", "text": "[낡음 - 낡다]\n\n어제보다\n조금 더 낡은 내가 되었다.\n\n낡는다는 건\n초라해진다는 뜻이 아니라\n그만큼 오랜 세월\n잘 버텨왔다는 뜻일지도 모른다.\n\n삶이 오래된 것들에게만\n조용히 달아주는\n작은 훈장처럼.\n\n손때 묻은 물건이\n버려지지 않고 더 깊어지듯,\n사람도 조금씩 낡아가며\n자기만의 빛을 갖게 되는지도 모른다.", "date": "2026.06.10", "category": "상실"}, {"id": 7000, "type": "blog", "text": "[별것이 별것인데로]\n\n별것이\n별것 있나요.\n\n하나 남은 빵을 집어 온 일,\n좋은 커피숍을 찾아\n맛난 커피 한 잔 마신 일.\n\n누가 보기엔\n별것 아닌 하루겠지만\n내겐 모두\n별것 없는 별것이었다.\n\n우리 그냥\n별것 없이\n별것으로 살아봐요.\n\n대단한 일이 없어도\n마음이 잠깐 웃었다면\n그걸로 된 거니까요.\n\n오늘도\n별것 없어 별것인 날이었다.\n\n그래서\n더 좋았다.", "date": "2026.06.10", "category": "일상"}, {"id": 8000, "type": "blog", "text": "[글이 다시 나에게 돌아오는 일]\n\n꿈보다\n해몽이라는 말이 있다.\n\n내 안에서 나온 말인데도\n누군가 다시 읽어주면\n나는 그제야\n내가 무슨 말을 하고 있었는지\n알게 될 때가 있다.\n\n내가 심은 줄도 몰랐던\n말씨 하나가\n누군가의 시선으로\n작은 꽃처럼 피어날 때,\n\n나는 알게 된다.\n글도 사람처럼\n혼자 자라지 않는다는 걸.\n\n누군가 오래 바라봐주고\n소리내어 불러주고\n그 말씨 안에 마음을 알아봐줄 때\n비로소\n\n문장은 글이 되고\n글은 마음이 되고\n마음은\n다시 나를 조금 더 단단하게 만든다.", "date": "2026.06.10", "category": "창작"}, {"id": 9000, "type": "blog", "text": "[방과후]\n\n바람따라 언덕길을 오르다\n평지를 만나면 자전거에 올라\n하늘을 보며 걸었어요.\n\n고개를 돌려 강을 바라보며\n내리막을 내달리고,\n길로 뻗어나온 가지에 달린\n사과 한입에 갈증을 풀었지요.\n\n바람 한가득 안은 양팔로\n충주댐을 가늠해 보기도 하고,\n어느 동네 할매 물 한 바가지에\n잊혀진 세상 인심도 찾고,\n버럭하는 소독차 아저씨 고함에\n우하하 웃으며\n뒤돌아 내달리기도 하고,\n\n손잡고 내일보자 하던 친구를\n두 시간 만에 만나\n멋적어 하던 가로수 길.\n\n세상 하릴없던 중학교 시절\n매일 무언가에 이끌리듯\n다녀온 자전거 길이었어요.\n\n세상 근심 없던\n방과 후 나만의 하루 일과.\n\n그때가\n가끔 그립습니다.", "date": "2026.06.10", "category": "기억"}, {"id": 10000, "type": "blog", "text": "[상실 - 빠진 음 한두 개 안은 채]\n\n살다 보면,\n손가락 두 개쯤 잃은 것 같은\n상실이 하나쯤은 있다.\n\n돌이킬 수 없는 시간,\n돌아오지 않는 사람,\n다시 잡지 못하는 순간들.\n\n하지만\n시간은 멈추지 않는다.\n네 발걸음도 멈추지 않는다.\n\n음이 빠진 채로도\n노래가 이어지듯\n상실을 안은 채로\n인생은 계속 흘러간다.\n\n어쩌면 우리는,\n완전한 노래를 부르며\n살아가는 게 아니라\n빠진 음 한두 개 안은 채\n그렇게 살아간다.\n\n연주가 끊이지 않듯\n오늘도 그렇게 살아진다.", "date": "2026.06.10", "category": "상실"}, {"id": 11000, "type": "blog", "text": "[책임감 - 멍든 가면]\n\n참 반듯한 얼굴이지.\n책임감이란 말이야.\n\n성실하고,\n믿음직하고,\n끝까지 해내는 사람의 얼굴.\n\n그래.\n그래서 나는 때때로\n그 말을 가면처럼 쓴다.\n\n작아 보이지 않으려고.\n얕잡아 보이지 않으려고.\n무너져 보이지 않으려고.\n\n괜찮은 척,\n할 수 있는 척,\n아프지 않은 척.\n\n그렇게 하루를 넘기고\n또 하루를 넘기다 보면\n겉은 멀쩡히 서 있는데\n속은 시퍼렇게\n멍이 보인다.\n\n책임감은\n나를 한 걸음 더 걷게 만든 날도 있었지만,\n때로는 나를\n내 마음에서\n너무 멀리 데려가기도 했다.\n\n책임감이란 그 가면 아래\n오래 눌린 얼굴.\n한 번쯤은 조용히\n그 얼굴도 들여다봐야 한다.\n\n끝까지 버티는 것만이\n책임은 아니라고.\n\n무너질 것 같은 나를\n잠시 앉혀두는 일도\n나를 향한\n책임일 수 있다고.", "date": "2026.06.10", "category": "태도"}, {"id": 12000, "type": "blog", "text": "[알고도 묻지 않는 다정함]\n\n너는 그 가면이\n꽤 단단하다고 믿었지.\n\n말끝에 잠깐 묻어나는 숨.\n웃고 난 뒤\n늦게 돌아오는 눈빛.\n별일 아니라는 말 뒤에\n오래 접혀 있던 표정.\n\n그런 것들은\n조금씩\n새어 나오곤 해.\n\n네가 말할 준비가 될 때까지\n그 마음에\n성급히 손을 대지 않는 것.\n재촉하지 않는 것.\n\n네가 잠깐\n숨을 고를 수 있게\n곁의 공기를\n조금 느슨하게\n만들어주는 것.\n\n그 정도의 사람이\n곁에 하나쯤 있다면,\n그 가면도\n그날만큼은\n조금 덜 무겁지 않을까.\n\n알고도\n묻지 않는 다정함.", "date": "2026.06.10", "category": "관계"}, {"id": 13000, "type": "blog", "text": "[나를 감싸는 말]\n\n나는\n네가 잘되기를 바랐다기보다\n네가 잘못되지 않기를\n더 간절히 바랐는지도 모른다.\n\n네가 무너지면\n그 무너짐의 한 조각이\n내게도 날아올까 봐.\n\n그래서\n좋은 말을 골라\n너에게 건넸다.\n\n너를 위하는 얼굴을 하고\n내가 덜 다치려는 말.\n\n네가 정말\n잘됐으면 좋겠어.\n\n그 말 안에는\n너를 향한 바람도 있었지만,\n내가 더는\n죄책감으로 돌아보지 않아도 되기를 바라는\n작은 비겁함도\n함께 들어 있었다.\n\n나는 네게\n다정한 말을 건네며\n사실은\n나를 감싸고 있었다.", "date": "2026.06.10", "category": "관계"}, {"id": 14000, "type": "blog", "text": "[평온함 - 오늘이 어제와 같다는 복]\n\n살다 보니\n오늘이 어제와 같다는 것이\n얼마나 큰 복인지\n조금씩 알게 된다.\n\n별일 없는 하루.\n어제와 비슷한 아침.\n어제와 비슷한 커피.\n어제와 비슷한 길.\n\n한때는\n그런 날들이 지루한 줄 알았다.\n\n그런데 살아보니\n평온함이란\n쉬이 오는 것이 아니었다.\n\n어제의 내가\n어떻게든 버텨내어\n오늘의 내게 넘겨준 자리.\n\n그 위에\n나는 조용히 앉아 있었다.\n\n그래서 오늘도\n손을 모아 감사한다.\n\n큰 행복이 아니어도\n무언가 대단한 일이 없어도\n아무 일 없이\n하루가 흘러갔다는 것.\n\n그것만으로도\n충분히 큰 복이었다.", "date": "2026.06.10", "category": "일상"}, {"id": 15000, "type": "blog", "text": "[보통의 날 - 특별할 것 없는 날들의 행복]\n\n특별할 것 없는\n보통의 날들이\n사실은\n큰 행복이었다는 걸\n조금 늦게\n깨닫게 되는 때가 있다.\n\n아침에 눈을 뜨고,\n커튼 사이로 들어온 빛을 보고,\n따뜻한 물 한 모금으로\n속을 깨우는 일.\n\n별것 아닌 하루가\n별일 없이 흘러가는 일.\n\n행복은 늘\n조금 더 특별한 곳에\n있을 줄 알았다.\n\n그런데 이제는 안다.\n\n밥 냄새가 나는 저녁.\n씻고 나온 뒤의 가벼운 몸.\n좋아하는 컵에 담긴 커피.\n아무 말 없이 곁에 있는 고양이.\n\n그런 것들이\n조용히 나를 붙들고 있었다.\n\n오늘도 특별한 일은 없었다.\n그래서\n조금 다행이었다.", "date": "2026.06.10", "category": "일상"}, {"id": 16000, "type": "blog", "text": "[나이듦 - 물 흐르듯 받아들이는 일]\n\n어제보다 조금 느려진 몸.\n어제보다 조금 흐려진 기억.\n어제보다 조금 더 낡은 얼굴.\n\n그 앞에서\n괜히 마음이 작아질 때가 있다.\n\n하지만 어쩌면\n나이 든다는 건\n초라해지는 일이 아니라\n오래 버텨온 시간의 흔적이\n몸과 마음에\n조용히 남는 일인지도 모른다.\n\n그러니 그냥\n내가 지금 그렇구나,\n하고 받아들이면 어떨까.\n\n물 흐르듯.\n\n억지로 젊음을 붙잡지도 말고,\n괜히 늙음을 밀어내지도 말고.\n\n너도,\n나도,\n그도,\n우리도\n다 지나가는 길 위에 있으니까.", "date": "2026.06.10", "category": "상실"}, {"id": 17000, "type": "blog", "text": "[창 - 보여지는 것과 보이지 않는 것]\n\n창은\n안과 밖을 나누지만\n동시에\n안과 밖을 이어준다.\n\n살다 보면\n사람에게도 창이 있다는 생각을 한다.\n\n보여주는 얼굴과\n보이지 않는 마음.\n말로 꺼낸 것과\n끝내 삼킨 것.\n\n우리는 어쩌면\n있는 그대로를 보여주는 대신\n보여줄 수 있을 만큼만\n창가에 올려두고 사는지도 모른다.\n\n그것이 꼭 거짓은 아니었다.\n\n때로는 창 하나를 사이에 두고\n서로의 불빛만 확인하는 일도\n관계가 될 수 있다.\n\n네가 거기 있구나.\n나도 여기 있어.\n\n그 정도면\n오늘은 충분한 날도 있다.", "date": "2026.06.10", "category": "관계"}, {"id": 18000, "type": "blog", "text": "[사람을 건너 사람을 믿지 말라]\n\n사람을 건너\n사람을 믿지 말라.\n\n누군가의 말로\n누군가를 미워하지 말고,\n누군가의 평가로\n누군가를 쉽게 믿지도 말 것.\n\n사람은\n직접 만나야 알 수 있고,\n직접 겪어야\n조금 보이는 존재였다.\n\n누군가에게는 차가운 사람이\n누군가에게는 한없이 따뜻할 수 있고.\n\n사람은 한 장의 말로\n다 설명되지 않는다.\n\n그러니\n나의 눈으로 보고,\n나의 시간으로 겪고,\n나의 마음으로 판단하는 일.\n\n그것이 때로는\n사람을 더 조심스럽게 믿는 방법이었다.", "date": "2026.06.10", "category": "관계"}, {"id": 19000, "type": "blog", "text": "[타인의 욕망 - 내가 원하는 줄 알았던 것들]\n\n내가 원하는 줄 알았던 것들.\n좋은 집,\n좋은 차,\n괜찮아 보이는 자리,\n남들이 부러워할 만한 삶.\n\n정말 내가 원한 걸까.\n\n아니면\n남들이 좋다고 말하는 것들 앞에서\n나도 모르게\n내 마음이 고개를 끄덕인 걸까.\n\n그러다 문득\n가까스로 얻은 것 앞에서도\n이상하게 마음이 비어 있을 때가 있다.\n\n그제야 알게 된다.\n이건 내 욕망이 아니라\n타인의 시선이 빚어낸\n그럴듯한 모양이었구나.\n\n내 욕망을 찾는 일은\n무언가를 더 갖는 일이 아니라\n내 것이 아닌 마음을\n조금씩 내려놓는 일인지도 모른다.", "date": "2026.06.10", "category": "관계"}, {"id": 20000, "type": "blog", "text": "[정점 - 능력보다 태도로 정해지는 것]\n\n십 년을 해도\n여전히 제자리 같은 날이 있고,\n이십 년을 해도\n아직 부족한 것투성이인 날이 있다.\n\n그럴 때는\n조금 서글퍼진다.\n\n나는 이만큼 했는데\n겨우 여기인가.\n\n하지만 또 살아보니\n꼭대기에 서는 것만이\n삶의 전부는 아니었다.\n\n내가 선 자리에서\n오늘의 나를 부끄럽지 않게 다잡는 일.\n어제보다 조금 더\n나은 태도로\n오늘을 건너는 일.\n\n어쩌면 정점은\n남들이 올려다보는 위치가 아니라\n내가 나를\n끝내 포기하지 않는 태도 안에\n있는지도 모른다.", "date": "2026.06.10", "category": "태도"}, {"id": 21000, "type": "blog", "text": "[지금 - 가장 가까운 과거]\n\n우리는\n현재를 산다고 믿지만\n어쩌면 한 번도\n완전한 현재에\n닿아본 적은 없는지도 모른다.\n\n지금이라고 부르는 것은\n어쩌면\n가장 가까운 과거일지도 모른다.\n\n붙잡는 순간\n이미 지나가버리는 것.\n\n그래서 현재는\n소유하는 시간이 아니라\n스쳐가는 시간을\n잠시 알아차리는 일에\n가까운지도 모른다.\n\n지금을 산다는 건\n완벽한 현재를 붙드는 일이 아니라\n방금 지나간 것들 속에서\n아직 온기가 남아 있는 순간을\n조용히 알아보는 일인지도 모른다.", "date": "2026.06.10", "category": "멈춤"}, {"id": 22000, "type": "blog", "text": "[찰나의 두께]\n\n찰나의 두께.\n\n빛이 도착하고,\n감각이 반응하고,\n뇌가 해석하고,\n마음이 알아차리는\n그 아주 짧은\n지연의 묶음.\n\n그걸 우리는 그냥\n지금이라고 부른다.\n\n지금이라는 말은\n참 이상하다.\n\n말하는 순간\n이미 지나가고,\n붙잡으려는 순간\n손가락 사이로\n조용히 빠져나간다.\n\n어쩌면 지금은\n완벽한 한 점이 아니라\n내가 알아차릴 수 있는\n아주 얇은 시간의 폭인지도 모른다.\n\n조금 늦게 도착했어도\n마음이 알아차렸다면\n그 순간은\n내게 충분히\n지금이었으니까.", "date": "2026.06.10", "category": "멈춤"}, {"id": 23000, "type": "blog", "text": "[과거와 미래 사이 - 오늘을 놓치는 마음]\n\n우리 대부분은\n지금을 살지 않는 것 같다.\n\n지나간 날은 자꾸만\n조금 더 예뻐지고,\n오지 않은 날은 자꾸만\n조금 더 그럴듯해진다.\n\n우리는 그렇게\n이미 지나간 시간과\n아직 오지 않은 시간 사이에\n마음을 오래 걸어둔다.\n\n정작 오늘의 나는\n여기 있는데.\n\n지금 내 손에 쥔 것들,\n지금 내 방에 들어온 빛,\n지금 내 곁에 있는 사람들,\n지금 내 몸이 견디고 있는 하루.\n\n그런 것들은\n너무 가까이 있다는 이유로\n자주 행복의 후보에서 밀려난다.\n\n어쩌면 우리는\n행복하지 않은 게 아니라\n행복을 늘\n다른 시간에\n맡겨두고 사는지도 모른다.\n\n그 사이에서\n오늘은 조용히 지나간다.", "date": "2026.06.10", "category": "멈춤"}, {"id": 24000, "type": "blog", "text": "[풍경의 악보 - 페르마타]\n\n바람 따라\n구름이 음표처럼 흐르고,\n산에 늘어진 그림자는\n길게 끄는\n페르마타.\n\n새소리는\n악보 밖으로 튄\n작은 장식음,\n나뭇잎은\n바람이 넘기는\n얇은 악보.\n\n흐르는 것은\n흐르게 두고,\n머무는 것은\n머물게 둘 일.\n\n세상이 길게 끄는\n음 하나를\n끝까지 들어주는 일.\n\n오늘의 구름은\n바람 따라 흘러가고,\n산의 그림자는\n페르마타처럼\n조금 더 오래\n그 자리에 머문다.", "date": "2026.06.10", "category": "멈춤"}, {"id": 25000, "type": "blog", "text": "[여름엔 그늘마저 푸르고]\n\n여름엔\n그늘마저 푸르고,\n내 그림자는\n더 까맣다.\n\n나무 밑에 고인 그늘은\n검기보다 푸르고,\n그 안에 선 나는\n한낮의 햇빛보다\n내 발끝에 붙은 그림자를\n더 오래 바라본다.\n\n밝은 계절이라고 해서\n모든 것이 환한 것은 아니었다.\n\n여름은\n빛을 키우는 만큼\n그늘도 깊게 만들고,\n초록을 짙게 하는 만큼\n내 안의 어두운 자리도\n또렷하게 보여준다.\n\n그래서 여름엔\n가끔 내가 더 선명해진다.\n\n빛 속에서가 아니라\n그늘 아래에서.\n내 그림자가\n더 까맣게\n나를 따라오는 날에.", "date": "2026.06.10", "category": "일상"}, {"id": 26000, "type": "blog", "text": "[시기 - 닿을 수 있을 것 같은 거리]\n\n시기란 이상하게도\n아주 가까운 거리에서 자란다.\n\n나와 비슷한 줄 알았던 사람이\n나보다 조금 앞서갈 때.\n나도 할 수 있을 것 같았던 일을\n누군가 먼저 해냈을 때.\n\n그때 마음은\n축하와 부러움 사이에서\n잠깐 못난 표정을 짓는다.\n\n너무 멀리 있는 사람에게는\n오히려 질투가 잘 생기지 않는다.\n그 사람은 이미\n내 비교의 세계 바깥에 있으니까.\n\n그래서 질투를 받는다는 건\n어쩌면 내가 누군가의 마음 가까운 곳에서\n조금 앞서 걷고 있다는 뜻일 수도 있다.", "date": "2026.06.10", "category": "태도"}, {"id": 27000, "type": "blog", "text": "[글의 다른 얼굴 - 노래가 되고 장면이 되고]\n\n살면서\n갑자기 든 생각이나,\n어떤 일을 겪고 나서\n한동안 마음에 남은 것들을\n가끔\n끄적여 놓는다.\n\n그런데 신기하게도\n그 글은 읽는 사람마다\n다른 얼굴을 하고 있었다.\n\n누군가는\n그 안에서 노래를 듣고,\n누군가는\n영화의 한 장면을 떠올리고,\n누군가에게는\n그 문장이\n참아온 절규가 되고,\n누군가에게는\n끝내 삼킨 울음이 되고.\n\n나는 그저\n내 하루에서 떨어진 생각 하나를\n주워 적었을 뿐인데,\n그 말은\n누군가의 마음에 닿아\n노래가 되고,\n장면이 되고,\n대사가 되고,\n울음이 된다.", "date": "2026.06.10", "category": "창작"}, {"id": 28000, "type": "blog", "text": "[지금의 나 - 여기까지 온 사람]\n\n어쩌면 우리는\n자주 잊고 사는 것 같다.\n\n지금의 내가\n그저 갑자기\n여기 서 있는 사람이 아니라는 걸.\n\n괜찮은 척 넘긴 하루.\n울음을 삼키고 지나온 밤.\n아무렇지 않은 얼굴로\n다시 문을 열고 나간 아침.\n\n그런 날들이\n조용히 쌓여\n오늘의 나를\n여기까지 데려왔다.\n\n나는 아직\n완성된 사람이 아니고,\n여전히\n부족한 것도 많고,\n가끔은 내가 나를\n감당하기 어려운 날도 있다.\n\n하지만 그래도\n여기까지 왔다.\n\n우리는 자꾸\n아직 가지 못한 곳만 바라보다가\n이미 지나온 길의 길이를\n너무 쉽게 잊는다.\n\n그래서 가끔은\n나를 다그치기 전에\n조용히 물어봐야 한다.\n\n너,\n여기까지 오느라\n얼마나 애썼니.\n\n지금의 나는\n부족한 사람이기 전에\n오래 버텨\n여기까지 도착한 사람이다.", "date": "2026.06.10", "category": "태도"}, {"id": 29000, "type": "blog", "text": "[절제 - 감정이 서 있는 자리]\n\n나는 감정을\n크게 외치고 싶지 않았다.\n\n다만\n작은 장면 앞에\n조금 오래 서 있고 싶었다.\n\n봄바람이 지나간 자리.\n식어가는 커피의 온도.\n창가에 오래 머문 빛.\n말없이 등을 보인 사람.\n\n그런 것들 앞에서\n나는 자주 멈춘다.\n\n감정은 때로\n말보다 오래 머문다.\n\n그러니 모든 것을\n다 말하지 않아도 괜찮다.\n\n다만 그 감정이\n어디쯤 서 있는지\n그 자리를\n조용히 가리켜 보이는 일.\n\n어쩌면 내가 쓰고 싶은 글은\n그 정도의 일인지도 모른다.", "date": "2026.06.10", "category": "창작"}, {"id": 30000, "type": "blog", "text": "[여백 - 다 말하지 않아도 남는 것]\n\n여백은\n비어 있는 자리가 아니라\n무언가가\n조용히 머물 수 있게\n남겨둔 자리인지도 모른다.\n\n글도 그렇다.\n다 말해버리면\n마음이 앉을 곳이 없어진다.\n\n그래서 나는\n조금 남겨두는 글이 좋다.\n\n끝내 하지 않은 말.\n문장 사이에 놓인 숨.\n마침표 뒤에 남은 온기.\n\n그런 것들이\n때로는 말보다 오래\n사람의 마음에 머문다.\n\n여백은\n아무것도 없는 곳이 아니라\n누군가의 마음이\n잠시 쉬어갈 수 있도록\n비워둔 작은 자리다.", "date": "2026.06.10", "category": "창작"}, {"id": 31000, "type": "blog", "text": "[별생각 없는 날 - 조미 김과 묵은 김치]\n\n모두가\n다 특별할 순 없으니까.\n\n조미 김과\n묵은 김치에\n별생각 없이\n밥 한 숟갈 넘기는 날도 있지.\n\n그냥\n배가 고파 밥을 먹고,\n조금 짠 김치에\n물 한 모금 마시고,\n구겨진 하루를\n대충 접어\n한쪽에 놓아두는 날.\n\n그런 날도\n삶이지.\n\n어느 날은\n조금 빛나고,\n또 어느 날은\n아무 의미 없는 듯\n그냥 지나가기도 하지.\n\n그 정도면\n충분한 날도 있지.", "date": "2026.06.10", "category": "일상"}, {"id": 32000, "type": "blog", "text": "[워라밸 - 삶이라는 큰 원 안에 놓인 일]\n\n개인의 삶이 A 이고\n일이 B 라면,\n중요한 건\nA 와 B 를 나란히 놓는 것이 아니라\nA 안에 들어온 B 의 크기를\n어떻게 조절하느냐일 거라고.\n\n일은\n삶의 반대편에 있는 것이 아니라\n내 삶 안에 들어와 있는\n하나의 조각이니까.\n\n다만\n그 조각이 너무 커져서\n삶 전체를 밀어내기 시작하면\n그때 불행은\n조금씩 자리를 넓힌다.\n\n중요한 건\n지금 내가 행복한가.\n\n내 삶이라는 큰 원 안에\n일이 알맞은 크기로\n머물게 하는 일.\n\n나는 지금\n행복한가.\n그리고 이 삶 안에서\n나는 아직\n나로 남아 있는가.", "date": "2026.06.10", "category": "태도"}, {"id": 33000, "type": "blog", "text": "[평온함의 책임 - 오늘이 어제와 같음은]\n\n늘 하루를 마무리하며\n오늘의 평안함에 감사하고,\n이 밤도\n다름없는 평안함을 위해\n기도한다.\n\n특별할 것 없는 여유가\n어제와 같음에\n감사함을 느끼는 하루.\n\n오늘이 어제와 같음은\n나로 말미암은 것이지,\n누군가 타인의 희생과 노력으로\n얻을 수 없다는 것.\n\n오늘의 아픔이\n어제와 같다면,\n내 노력의 부족함도\n어제와 같았구나.\n\n어둠이 무서운 것이 아니라,\n내가 빛나\n어둠을 떨쳐내지 않은\n그 대가가 무서운 것이다.", "date": "2026.06.10", "category": "태도"}, {"id": 34000, "type": "blog", "text": "[내가 먼저 스러지지 않을 마음]\n\n어둠이 무서운 것이 아니라\n작은 촛불 하나로\n더 널리 비추지 못함이\n안타까울 따름이다.\n\n어둠은\n물러가는 것이 아니고,\n초가 스러지면\n찾아오는 것이라.\n\n오래 빛나려면\n오래 타야 하고,\n오래 타려면\n나를 함부로\n다 태워버려서는 안 된다.\n\n작은 불빛 하나를\n지키는 일은\n어둠과 싸우는 일이라기보다\n내 안의 심지를\n조용히 돌보는 일일지도 모른다.\n\n그러니 오늘도\n나는 나를\n너무 몰아세우지 않기로 한다.\n\n내가 먼저 꺼져버리면\n아무것도 오래\n비출 수 없으니까.", "date": "2026.06.10", "category": "태도"}, {"id": 35000, "type": "blog", "text": "[어둠 속, 작은 빛]\n\n어둠이 내려앉은 공간에\n작은 불꽃 하나\n피어난다.\n\n크지 않아도\n어둠을 조금 밀어내며\n스스로를 태워\n내어주는 온기.\n\n어둠 속에서도\n빛을 잃지 않기를.\n누군가에게\n이 작은 빛 하나\n오래도록\n남을 수 있기를.\n\n다만\n오래 밝히기 위해\n내가 먼저\n스러지지 않기를.", "date": "2026.06.10", "category": "태도"}, {"id": 36000, "type": "blog", "text": "[시간 속에 머문 소리]\n\n나무결 위로\n흐르는 선들.\n\n한때는\n손끝에 닿기만 해도\n그 떨림이\n노래가 되었다.\n\n시간을 품은 것들은\n쉽게 사라지지 않는다.\n\n더 이상\n소리 내지 않아도\n그 울림은 어딘가에\n머물러 있을 것이다.\n\n음악이란\n그런 것일까.\n\n사라지는 듯해도\n어디엔가 남아\n때로는 멀리서,\n때로는 마음속에서,\n아무도 모르게\n다시 울려오는 것.\n\n아직 이 손끝에\n소리가 남아 있을까.\n\n아니,\n남아 있겠지.\n\n시간이 머물렀던 자리마다\n소리는 기억이 되어\n쌓이는 법이니까.", "date": "2026.06.10", "category": "기억"}, {"id": 37000, "type": "blog", "text": "[속삭임 - 향기는 기억된다]\n\n연보랏빛 장미들이\n작은 구슬처럼 맺혀\n반짝인다.\n\n바람이 스치면\n조용히 흘러내린다.\n오랜 기다림 끝에\n내뱉는\n한숨처럼.\n\n비가 오고,\n꽃이 피고,\n물방울이 사라지고,\n순간이 지나가고.\n\n향기는\n기억된다.", "date": "2026.06.10", "category": "일상"}, {"id": 38000, "type": "blog", "text": "[숨바꼭질 - 경계와 호기심 사이]\n\n나무 의자 뒤,\n고양이가 숨어 있다.\n\n귀를 세우고\n조용히\n나를 바라본다.\n\n경계와 호기심 사이로\n고요한 숨결이 흐른다.\n\n나는 널 찾았고,\n너는 아직\n그 자리에 머물러 있다.\n\n한 걸음 더 다가가면\n가볍게 사라지겠지.\n\n그래서 나는\n그냥 이 자리에서\n네가 먼저\n움직이길 기다린다.", "date": "2026.06.10", "category": "관계"}, {"id": 39000, "type": "blog", "text": "[멈춰 선 자리 - 한 걸음 전의 숨]\n\n한 걸음 내딛기 전,\n잠시 머무는 순간.\n\n새로운 길 앞에서\n숨을 고르는 중일까.\n\n아직 아무 데도\n가지 않은 것 같지만,\n멈춰 선 자리에서도\n마음은 이미\n조금씩 움직이고 있다.\n\n발끝이\n방향을 정하는 순간,\n또 다른 이야기가\n조용히 시작된다.", "date": "2026.06.10", "category": "멈춤"}, {"id": 40000, "type": "blog", "text": "[그리고 멈춤]\n\n바람은 불고,\n햇살은 머물러,\n날갯짓이 멈춘다.\n\n어디에서 와서\n어디로 가는지 모를\n잠깐의 머묾.\n\n단단함과 가벼움이\n한자리에 놓이고,\n문득\n바람 한 줄기 스치면\n남는 것은\n햇살뿐이다.", "date": "2026.06.10", "category": "멈춤"}];
