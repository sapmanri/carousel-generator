<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Writing Studio · sapmanri</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --border-hover: #3a3a3a;
    --text: #e8e4dc;
    --text-muted: #7a7670;
    --text-dim: #4a4845;

    /* 타입별 액센트 */
    --accent-instagram: #c9a96e;   /* 따뜻한 골드 */
    --accent-youtube:   #8aabca;   /* 차분한 블루 */
    --accent-blog:      #9db89a;   /* 세이지 그린 */
    --accent-ui:        #b8a0c8;   /* 연 라벤더 */
    --accent-active: var(--accent-instagram);

    --radius: 6px;
    --font-serif: 'Noto Serif KR', serif;
    --font-sans: 'Noto Sans KR', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  html { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── 헤더 ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .logo {
    font-family: var(--font-serif);
    font-weight: 300;
    font-size: 15px;
    letter-spacing: 0.12em;
    color: var(--text-muted);
  }
  .logo span {
    color: var(--accent-active);
    transition: color 0.4s;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .api-toggle {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 5px 10px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.2s;
  }
  .api-toggle:hover { border-color: var(--border-hover); color: var(--text); }

  .api-key-row {
    display: none;
    align-items: center;
    gap: 8px;
  }
  .api-key-row.visible { display: flex; }

  .api-key-input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 5px 10px;
    border-radius: var(--radius);
    width: 220px;
    outline: none;
  }
  .api-key-input:focus { border-color: var(--accent-active); }

  /* ── 레이아웃 ── */
  .workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── 왼쪽 패널 ── */
  .panel-left {
    width: 260px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .panel-section {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }

  .panel-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* 타입 선택 */
  .type-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .type-btn {
    background: none;
    border: 1px solid transparent;
    color: var(--text-muted);
    font-family: var(--font-sans);
    font-weight: 300;
    font-size: 13px;
    padding: 8px 12px;
    border-radius: var(--radius);
    cursor: pointer;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: all 0.2s;
  }
  .type-btn:hover { color: var(--text); background: var(--surface2); }
  .type-btn.active {
    color: var(--text);
    background: var(--surface2);
    border-color: var(--border);
  }
  .type-btn .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .type-btn.active .dot { background: var(--accent-active); }

  /* 스타일 선택 */
  .style-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .style-btn {
    background: none;
    border: 1px solid transparent;
    color: var(--text-muted);
    font-family: var(--font-sans);
    font-weight: 300;
    font-size: 12px;
    padding: 6px 12px;
    border-radius: var(--radius);
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
  }
  .style-btn:hover { color: var(--text); background: var(--surface2); }
  .style-btn.active {
    color: var(--accent-active);
    background: var(--surface2);
    border-color: var(--border);
  }

  /* 컨텍스트 입력 */
  .context-area {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-sans);
    font-weight: 300;
    font-size: 12px;
    line-height: 1.7;
    padding: 10px 12px;
    border-radius: var(--radius);
    resize: vertical;
    min-height: 100px;
    outline: none;
    transition: border-color 0.2s;
  }
  .context-area:focus { border-color: var(--accent-active); }
  .context-area::placeholder { color: var(--text-dim); }

  .generate-btn {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-sans);
    font-weight: 400;
    font-size: 13px;
    padding: 10px;
    border-radius: var(--radius);
    cursor: pointer;
    margin-top: 10px;
    transition: all 0.2s;
    letter-spacing: 0.04em;
  }
  .generate-btn:hover {
    background: var(--border);
    border-color: var(--accent-active);
    color: var(--accent-active);
  }
  .generate-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* API 서버 모드 토글 */
  .server-toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-muted);
  }
  .toggle-switch {
    width: 32px;
    height: 18px;
    background: var(--border);
    border-radius: 9px;
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
  }
  .toggle-switch.on { background: var(--accent-active); }
  .toggle-switch::after {
    content: '';
    position: absolute;
    width: 12px;
    height: 12px;
    background: white;
    border-radius: 50%;
    top: 3px;
    left: 3px;
    transition: left 0.2s;
  }
  .toggle-switch.on::after { left: 17px; }

  /* ── 메인 에디터 ── */
  .editor-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .editor-toolbar {
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .toolbar-btn {
    background: none;
    border: 1px solid transparent;
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .toolbar-btn:hover { color: var(--text); background: var(--surface2); }

  .toolbar-divider {
    width: 1px;
    height: 16px;
    background: var(--border);
  }

  .char-count {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
  }

  .editor-main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  .editor-textarea {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: var(--font-serif);
    font-weight: 300;
    font-size: 15px;
    line-height: 1.9;
    padding: 32px 40px;
    outline: none;
    resize: none;
    overflow-y: auto;
  }
  .editor-textarea::placeholder { color: var(--text-dim); font-style: italic; }

  /* ── 오른쪽 패널 (미리보기/출력) ── */
  .panel-right {
    width: 300px;
    flex-shrink: 0;
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-right-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    color: var(--text-dim);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .copy-all-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .copy-all-btn:hover { color: var(--accent-active); border-color: var(--accent-active); }

  .output-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }

  .output-block {
    margin-bottom: 20px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .output-block-header {
    padding: 8px 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .output-block-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  .copy-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 10px;
    cursor: pointer;
    transition: color 0.2s;
    padding: 0;
  }
  .copy-btn:hover { color: var(--accent-active); }

  .output-block-content {
    padding: 12px;
    font-size: 12px;
    line-height: 1.8;
    color: var(--text-muted);
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* 로딩 */
  .loading-indicator {
    display: none;
    padding: 20px;
    text-align: center;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
  }
  .loading-indicator.visible { display: block; }

  .loading-dots::after {
    content: '...';
    animation: dots 1.4s infinite;
  }
  @keyframes dots {
    0%, 20% { content: '.'; }
    40% { content: '..'; }
    60%, 100% { content: '...'; }
  }

  /* API 서버 상태 */
  .server-status {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    display: none;
  }
  .server-status.visible { display: block; }
  .server-status code {
    color: var(--accent-active);
    background: var(--surface);
    padding: 2px 6px;
    border-radius: 3px;
  }

  /* 스크롤바 */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

  /* 빈 상태 */
  .empty-state {
    padding: 40px 20px;
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
    line-height: 1.8;
  }
  .empty-state-icon {
    font-size: 24px;
    margin-bottom: 12px;
    opacity: 0.4;
  }

  /* 반응형 */
  @media (max-width: 900px) {
    .panel-right { display: none; }
  }
  @media (max-width: 640px) {
    .panel-left { width: 200px; }
    header { padding: 14px 16px; }
    .editor-textarea { padding: 20px; }
  }
</style>
</head>
<body>

<!-- 헤더 -->
<header>
  <div class="logo">Writing Studio · <span>sapmanri</span></div>
  <div class="header-right">
    <div class="api-key-row" id="apiKeyRow">
      <input type="password" class="api-key-input" id="apiKeyInput" placeholder="sk-ant-..." autocomplete="off">
    </div>
    <button class="api-toggle" id="apiToggle" onclick="toggleApiKey()">API Key</button>
  </div>
</header>

<!-- 워크스페이스 -->
<div class="workspace">

  <!-- 왼쪽: 설정 패널 -->
  <aside class="panel-left">

    <!-- 글 타입 -->
    <div class="panel-section">
      <div class="panel-label">글 타입</div>
      <div class="type-list">
        <button class="type-btn active" data-type="instagram" onclick="setType(this)">
          <span class="dot"></span> 인스타그램 캡션
        </button>
        <button class="type-btn" data-type="youtube" onclick="setType(this)">
          <span class="dot"></span> 유튜브 설명란
        </button>
        <button class="type-btn" data-type="blog" onclick="setType(this)">
          <span class="dot"></span> 블로그 글
        </button>
        <button class="type-btn" data-type="ui" onclick="setType(this)">
          <span class="dot"></span> UI 문구 / 카드
        </button>
      </div>
    </div>

    <!-- 글쓰기 스타일 -->
    <div class="panel-section">
      <div class="panel-label">글쓰기 스타일</div>
      <div class="style-list">
        <button class="style-btn active" data-style="vase" onclick="setStyle(this)">Vase 문체</button>
        <button class="style-btn" data-style="editorial" onclick="setStyle(this)">에디토리얼</button>
        <button class="style-btn" data-style="seo" onclick="setStyle(this)">SEO 최적화</button>
        <button class="style-btn" data-style="simple" onclick="setStyle(this)">간결체</button>
        <button class="style-btn" data-style="english" onclick="setStyle(this)">영어 (글로벌)</button>
      </div>
    </div>

    <!-- 컨텍스트 -->
    <div class="panel-section">
      <div class="panel-label">컨텍스트</div>
      <textarea class="context-area" id="contextInput"
        placeholder="영상/사진 내용, 주제, 키워드, 분위기 등을 자유롭게 입력하세요"></textarea>
      <button class="generate-btn" id="generateBtn" onclick="generateText()">
        글 생성하기 →
      </button>
    </div>

    <!-- API 서버 모드 -->
    <div class="panel-section">
      <div class="panel-label">외부 앱 연동</div>
      <div class="server-toggle-row">
        <span>API 수신 대기</span>
        <div class="toggle-switch" id="serverToggle" onclick="toggleServer()"></div>
      </div>
    </div>

  </aside>

  <!-- 중앙: 에디터 -->
  <main class="editor-area">
    <div class="editor-toolbar">
      <button class="toolbar-btn" onclick="clearEditor()">지우기</button>
      <div class="toolbar-divider"></div>
      <button class="toolbar-btn" onclick="copyEditor()">복사</button>
      <button class="toolbar-btn" onclick="saveToHistory()">저장</button>
      <span class="char-count" id="charCount">0자</span>
    </div>
    <div class="editor-main">
      <textarea class="editor-textarea" id="editorTextarea"
        placeholder="여기에 직접 쓰거나, 왼쪽에서 글을 생성하세요."
        oninput="updateCharCount()"></textarea>
    </div>
  </main>

  <!-- 오른쪽: 출력 패널 -->
  <aside class="panel-right">
    <div class="panel-right-header">
      <span>출력 / 히스토리</span>
      <button class="copy-all-btn" onclick="copyAll()">전체 복사</button>
    </div>
    <div class="output-scroll" id="outputScroll">
      <div class="loading-indicator" id="loadingIndicator">
        <div class="loading-dots">생성 중</div>
      </div>
      <div class="empty-state" id="emptyState">
        <div class="empty-state-icon">✦</div>
        컨텍스트를 입력하고<br>글을 생성해보세요.
      </div>
    </div>
    <div class="server-status" id="serverStatus">
      POST <code id="serverEndpoint">—</code>
    </div>
  </aside>

</div>

<script>
// ── 상태 ──
let currentType = 'instagram';
let currentStyle = 'vase';
let outputHistory = [];
let serverMode = false;
let serverId = null;

const ACCENT_MAP = {
  instagram: 'var(--accent-instagram)',
  youtube:   'var(--accent-youtube)',
  blog:      'var(--accent-blog)',
  ui:        'var(--accent-ui)',
};

// ── 타입 변경 ──
function setType(btn) {
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentType = btn.dataset.type;
  document.documentElement.style.setProperty('--accent-active', ACCENT_MAP[currentType]);
  updateContextPlaceholder();
}

// ── 스타일 변경 ──
function setStyle(btn) {
  document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentStyle = btn.dataset.style;
}

// ── 컨텍스트 플레이스홀더 ──
const PLACEHOLDERS = {
  instagram: '사진 분위기, 장소, 담고 싶은 감정, 키워드를 입력하세요\n예) 비 오는 가평 오후, 빼빼가 창가에 앉아있는 사진, 고요함',
  youtube:   '영상 제목, 내용 요약, 주요 장면, SEO 키워드를 입력하세요',
  blog:      '글의 주제, 소재, 분위기, 포함할 내용을 입력하세요',
  ui:        '어떤 앱/기능의 문구인지, 어떤 상황인지 설명해주세요',
};
function updateContextPlaceholder() {
  document.getElementById('contextInput').placeholder = PLACEHOLDERS[currentType] || '';
}
updateContextPlaceholder();

// ── API Key ──
function toggleApiKey() {
  const row = document.getElementById('apiKeyRow');
  row.classList.toggle('visible');
}
function getApiKey() {
  const v = document.getElementById('apiKeyInput').value.trim();
  if (!v) { alert('API Key를 입력해주세요.'); return null; }
  return v;
}

// ── 스타일별 시스템 프롬프트 ──
const STYLE_PROMPTS = {
  vase: `당신은 감성찾아삽만리(@sapmanri)의 글쓰기 도구입니다.
Vase Lim의 고유한 문체를 따라 글을 씁니다:
- 감정을 직접 설명하지 않고 사물과 장면을 통해 전달
- 짧은 문장과 긴 문장을 리듬감 있게 섞음
- 결론을 서두르지 않고 독자와 함께 도달
- 한국어, 일상의 고요함을 담는 산문체
- 과하지 않은 표현, 여백을 남기는 문체`,

  editorial: `당신은 Magazine B나 에디터가 쓰는 에디토리얼 문체로 글을 씁니다.
명확하고 정제된 문장, 필요한 정보만 담되 감각적인 표현 사용.`,

  seo: `당신은 한국어 SEO에 최적화된 글을 씁니다.
검색 알고리즘과 독자 모두를 고려, 핵심 키워드를 자연스럽게 포함.
유튜브, 네이버 블로그 기준으로 작성.`,

  simple: `간결하고 명확하게 씁니다. 군더더기 없이, 핵심만.`,

  english: `Write in English, natural and global-friendly tone.
For YouTube or Instagram reach beyond Korea. Clear, evocative, and searchable.`,
};

const TYPE_PROMPTS = {
  instagram: `인스타그램 캡션을 작성합니다.
형식: 첫 줄은 선언적 한 문장 ("이 능선은...의 악보다" 같은 형식은 참고만), 이후 짧은 산문, 마지막에 해시태그 5개 (고정: #sapmanri #slowliving 포함, 나머지 3개는 내용 기반).
총 길이: 150-250자 (해시태그 제외).`,

  youtube: `유튜브 영상 설명란을 작성합니다.
형식:
1. 첫 2줄: SEO + 감성 동시 공략 (검색어 포함, 하지만 자연스럽게)
2. 본문: 3-5문장 영상 소개
3. 챕터 타임스탬프 (있다면 포함)
4. 해시태그: 5-8개
영어와 한국어 병기 가능.`,

  blog: `네이버 블로그 포스트를 작성합니다.
핵심 키워드를 본문에 자연스럽게 10회 이상 포함.
1500자 이상. 서론-본문-결론 구조.
첫 단락이 SEO 핵심 문장으로 시작.`,

  ui: `앱이나 웹의 UI 문구, 카드 텍스트, 버튼 레이블, 빈 상태 메시지 등을 작성합니다.
간결하고 명확하게, 사용자의 관점에서. 능동태.
필요한 경우 다양한 버전으로 제안.`,
};

// ── 글 생성 ──
async function generateText() {
  const apiKey = getApiKey();
  if (!apiKey) return;

  const context = document.getElementById('contextInput').value.trim();
  if (!context) { alert('컨텍스트를 입력해주세요.'); return; }

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.textContent = '생성 중...';

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('loadingIndicator').classList.add('visible');

  const systemPrompt = `${STYLE_PROMPTS[currentStyle]}\n\n${TYPE_PROMPTS[currentType]}`;
  const userPrompt = `다음 내용을 바탕으로 글을 작성해주세요:\n\n${context}`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        system: systemPrompt,
        messages: [{ role: 'user', content: userPrompt }],
      }),
    });

    const data = await response.json();
    if (data.error) throw new Error(data.error.message);

    const text = data.content?.[0]?.text || '';

    // 에디터에 삽입
    document.getElementById('editorTextarea').value = text;
    updateCharCount();

    // 히스토리에 추가
    addToHistory({
      type: currentType,
      style: currentStyle,
      context: context.slice(0, 40) + (context.length > 40 ? '…' : ''),
      text: text,
      time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }),
    });

  } catch (err) {
    alert('오류: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '글 생성하기 →';
    document.getElementById('loadingIndicator').classList.remove('visible');
  }
}

// ── 히스토리 추가 ──
const TYPE_LABELS = { instagram: 'IG 캡션', youtube: 'YT 설명', blog: '블로그', ui: 'UI 문구' };

function addToHistory(item) {
  outputHistory.unshift(item);
  renderHistory();
}

function renderHistory() {
  const scroll = document.getElementById('outputScroll');
  const loading = document.getElementById('loadingIndicator');

  scroll.innerHTML = '';
  scroll.appendChild(loading);

  outputHistory.forEach((item, idx) => {
    const block = document.createElement('div');
    block.className = 'output-block';
    block.innerHTML = `
      <div class="output-block-header">
        <span class="output-block-label">${TYPE_LABELS[item.type]} · ${item.style} · ${item.time}</span>
        <button class="copy-btn" onclick="copyBlock(${idx})">복사</button>
      </div>
      <div class="output-block-content" id="block-${idx}">${escapeHtml(item.text)}</div>
    `;
    block.querySelector('.output-block-content').addEventListener('click', () => {
      document.getElementById('editorTextarea').value = item.text;
      updateCharCount();
    });
    scroll.appendChild(block);
  });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── 에디터 유틸 ──
function updateCharCount() {
  const len = document.getElementById('editorTextarea').value.length;
  document.getElementById('charCount').textContent = len.toLocaleString() + '자';
}

function clearEditor() {
  if (document.getElementById('editorTextarea').value && confirm('에디터 내용을 지우시겠어요?')) {
    document.getElementById('editorTextarea').value = '';
    updateCharCount();
  }
}

async function copyEditor() {
  const text = document.getElementById('editorTextarea').value;
  if (!text) return;
  await navigator.clipboard.writeText(text);
  showToast('복사했습니다.');
}

function saveToHistory() {
  const text = document.getElementById('editorTextarea').value.trim();
  if (!text) return;
  addToHistory({
    type: currentType,
    style: currentStyle,
    context: '수동 저장',
    text: text,
    time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }),
  });
  showToast('저장했습니다.');
}

async function copyBlock(idx) {
  await navigator.clipboard.writeText(outputHistory[idx].text);
  showToast('복사했습니다.');
}

async function copyAll() {
  const all = outputHistory.map(i => `[${TYPE_LABELS[i.type]}]\n${i.text}`).join('\n\n---\n\n');
  await navigator.clipboard.writeText(all);
  showToast('전체 복사했습니다.');
}

// ── 토스트 ──
function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  Object.assign(t.style, {
    position: 'fixed', bottom: '24px', left: '50%', transform: 'translateX(-50%)',
    background: '#2a2a2a', color: '#e8e4dc', border: '1px solid #3a3a3a',
    padding: '8px 16px', borderRadius: '6px', fontSize: '12px',
    fontFamily: "'JetBrains Mono', monospace", zIndex: 9999,
    transition: 'opacity 0.3s',
  });
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 1800);
}

// ── API 서버 모드 (BroadcastChannel 기반) ──
// 같은 origin의 다른 탭/앱이 BroadcastChannel('writing_studio')로 요청을 보내면 처리
let bc = null;

function toggleServer() {
  serverMode = !serverMode;
  const toggle = document.getElementById('serverToggle');
  const statusEl = document.getElementById('serverStatus');
  const endpointEl = document.getElementById('serverEndpoint');

  toggle.classList.toggle('on', serverMode);

  if (serverMode) {
    bc = new BroadcastChannel('writing_studio');
    bc.onmessage = handleServerRequest;
    const origin = window.location.origin + window.location.pathname;
    endpointEl.textContent = 'BroadcastChannel: writing_studio';
    statusEl.classList.add('visible');
    showToast('API 수신 대기 중...');
  } else {
    if (bc) { bc.close(); bc = null; }
    statusEl.classList.remove('visible');
  }
}

async function handleServerRequest(event) {
  const { requestId, type, style, context, apiKey } = event.data;
  if (!requestId) return;

  // 타입·스타일 자동 설정
  if (type) {
    const btn = document.querySelector(`[data-type="${type}"]`);
    if (btn) setType(btn);
  }
  if (style) {
    const btn = document.querySelector(`[data-style="${style}"]`);
    if (btn) setStyle(btn);
  }
  if (context) document.getElementById('contextInput').value = context;
  if (apiKey) document.getElementById('apiKeyInput').value = apiKey;

  // 생성
  const key = apiKey || document.getElementById('apiKeyInput').value.trim();
  if (!key || !context) {
    bc.postMessage({ requestId, error: 'apiKey or context missing' });
    return;
  }

  const systemPrompt = `${STYLE_PROMPTS[style || currentStyle]}\n\n${TYPE_PROMPTS[type || currentType]}`;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        system: systemPrompt,
        messages: [{ role: 'user', content: context }],
      }),
    });
    const data = await res.json();
    const text = data.content?.[0]?.text || '';
    bc.postMessage({ requestId, text });
    addToHistory({ type: type || currentType, style: style || currentStyle, context: context.slice(0,40), text, time: new Date().toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit' }) });
  } catch (err) {
    bc.postMessage({ requestId, error: err.message });
  }
}

// ── 초기화 ──
updateCharCount();
</script>
